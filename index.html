<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CashewPro — Jai Shree Cashew Industries</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f4f0;color:#1a1a1a}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:196px;background:#fff;border-right:1px solid #e0e7e0;display:flex;flex-direction:column;flex-shrink:0}
.sb-head{background:#166534;color:#fff;padding:14px 12px}
.sb-head h2{font-size:15px;font-weight:700;letter-spacing:.3px}
.sb-head p{font-size:10px;opacity:.75;margin-top:2px}
.sb-nav{padding:8px;flex:1;overflow-y:auto}
.sb-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;padding:8px 6px 3px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;color:#4b5563;font-size:12px;font-weight:500;transition:all .15s;margin-bottom:1px;user-select:none}
.sb-item:hover{background:#f0fdf4;color:#166534}
.sb-item.on{background:#dcfce7;color:#166534;font-weight:700}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e0e7e0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h3{font-size:15px;font-weight:700;color:#166534}
.tb-actions{display:flex;gap:8px}
.page{padding:16px;flex:1;overflow-y:auto}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px}
.stat-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:20px;font-weight:700}
.stat-sub{font-size:11px;color:#9ca3af;margin-top:2px}

/* CARD */
.card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:12px}
.card-head{padding:10px 14px;border-bottom:1px solid #f3f4f6;background:#fafafa;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-head h4{font-size:13px;font-weight:700;color:#111}
.filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f9fafb;padding:8px 10px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafff7}
.num{text-align:right;font-family:monospace;font-size:12px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.b-due{background:#fee2e2;color:#dc2626}
.b-partial{background:#fef9c3;color:#92400e}
.b-paid{background:#dcfce7;color:#166534}
.b-pending{background:#e0e7ff;color:#3730a3}
.b-cleared{background:#dcfce7;color:#166534}
.b-bounced{background:#fee2e2;color:#dc2626}

/* BUTTONS */
.btn{padding:6px 12px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:active{opacity:.7}
.btn-green{background:#166534;color:#fff}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db}
.btn-red{background:#fee2e2;color:#dc2626}
.btn-blue{background:#dbeafe;color:#1d4ed8}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:10px}

/* INPUTS */
input,select,textarea{font-family:Arial,sans-serif;font-size:13px}
.inp{width:100%;padding:7px 9px;border:1px solid #d1d5db;border-radius:6px;background:#fff;transition:border-color .15s}
.inp:focus{outline:none;border-color:#166534;box-shadow:0 0 0 2px rgba(22,101,52,.08)}
.inp[readonly]{background:#f9fafb;color:#6b7280}
.inp-sm{padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;height:30px;background:#fff}
.inp-sm:focus{outline:none;border-color:#166534}

/* FORM */
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.4px}
.grid{display:grid;gap:10px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}

/* GRADE ROW */
.grade-row{display:grid;grid-template-columns:2fr .8fr 1fr 1fr 1fr 36px;gap:8px;align-items:end;padding:8px 10px;background:#fafff7;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:6px}

/* NET BOX */
.net-box{background:#f0fdf4;border:2px solid #166534;border-radius:8px;padding:14px;text-align:center;margin-top:10px}
.net-label{font-size:11px;font-weight:700;color:#166534;text-transform:uppercase;letter-spacing:.5px}
.net-val{font-size:28px;font-weight:700;color:#166534;margin-top:2px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:0;width:100%;max-width:580px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-size:15px;font-weight:700;color:#111}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 20px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.modal-close{background:none;border:none;font-size:18px;color:#9ca3af;cursor:pointer;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:#f3f4f6;color:#374151}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;display:none;max-width:320px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
#toast.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
#toast.err{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}

/* DIVIDER */
hr.divider{border:none;border-top:1px solid #e5e7eb;margin:12px 0}

/* SUMMARY BAR */
.sum-bar{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px;font-size:12px}
.sum-bar span strong{color:#166534}
.sum-bar-red{background:#fff1f2;border-color:#fecaca}
.sum-bar-red span strong{color:#dc2626}

/* EMPTY STATE */
.empty{padding:40px 20px;text-align:center;color:#9ca3af;font-size:13px}
.empty-icon{font-size:36px;margin-bottom:8px}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}

/* PRINT ONLY */
@media print{.no-print{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sb-head"><h2>🌿 CashewPro</h2><p>JAI SHREE CASHEW IND.</p></div>
    <div class="sb-nav" id="sb-nav"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <h3 id="page-title">Dashboard</h3>
      <div class="tb-actions">
        <button class="btn btn-green" id="btn-new-bill">+ New Bill</button>
        <button class="btn btn-outline" id="btn-receive">💰 Receive</button>
      </div>
    </div>
    <div class="page" id="page"></div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════
var DB = {
  get: function(k) {
    try { return JSON.parse(localStorage.getItem('cp_' + k)) || []; }
    catch(e) { return []; }
  },
  set: function(k, v) {
    try { localStorage.setItem('cp_' + k, JSON.stringify(v)); }
    catch(e) { console.error('Save failed', e); }
  },
  getObj: function(k, def) {
    try { return JSON.parse(localStorage.getItem('cp_' + k)) || def; }
    catch(e) { return def; }
  },
  setObj: function(k, v) {
    try { localStorage.setItem('cp_' + k, JSON.stringify(v)); }
    catch(e) {}
  }
};

var bills     = DB.get('bills');
var payments  = DB.get('payments');
var cheques   = DB.get('cheques');
var advances  = DB.get('advances');
var expenses  = DB.get('expenses');
var returns_  = DB.get('returns');
var purchases = DB.get('purchases');

var cfg = DB.getObj('settings', {});
if (!cfg.grades)   cfg.grades   = ['W180','W210','W240','W320','W450','SW','LWP','Scorched','PLWP','KK','JK','JH'];
if (!cfg.company)  cfg.company  = 'JAI SHREE CASHEW INDUSTRIES';
if (!cfg.gstin)    cfg.gstin    = '08ADJPP5115H1ZH';
if (!cfg.phone)    cfg.phone    = '7568577968';
if (!cfg.address)  cfg.address  = '41, Barah Ji Ki Gali, Gangori Bazar, Jaipur';

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function fmt(n) {
  return Number(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === 'cls') { e.className = attrs[k]; }
      else if (k === 'html') { e.innerHTML = attrs[k]; }
      else if (k === 'text') { e.textContent = attrs[k]; }
      else if (k.startsWith('on')) { e.addEventListener(k.slice(2), attrs[k]); }
      else { e.setAttribute(k, attrs[k]); }
    });
  }
  if (children) {
    children.forEach(function(c) { if (c) e.appendChild(c); });
  }
  return e;
}

function inp(id, type, placeholder, val, extra) {
  var attrs = { id: id, cls: 'inp', type: type || 'text', placeholder: placeholder || '' };
  if (val !== undefined && val !== null) attrs.value = val;
  if (extra) Object.assign(attrs, extra);
  return el('input', attrs);
}

function sel(id, options, val) {
  var s = el('select', { id: id, cls: 'inp' });
  options.forEach(function(o) {
    var opt = el('option', { value: o.v !== undefined ? o.v : o.l, text: o.l });
    if ((o.v !== undefined ? o.v : o.l) === val) opt.selected = true;
    s.appendChild(opt);
  });
  return s;
}

function fg(labelText, input) {
  return el('div', { cls: 'fg' }, [
    el('label', { text: labelText }),
    input
  ]);
}

function btn(text, cls, handler) {
  return el('button', { cls: 'btn ' + (cls || 'btn-outline'), text: text, onclick: handler });
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type === 'err' ? 'err' : 'ok';
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.style.display = 'none'; }, 3000);
}

function badge(status) {
  var map = {
    due: ['b-due', '🔴 DUE'],
    partial: ['b-partial', '⚡ PARTIAL'],
    paid: ['b-paid', '✅ PAID'],
    Received: ['b-pending', 'RECEIVED'],
    Deposited: ['b-blue', 'DEPOSITED'],
    Cleared: ['b-cleared', 'CLEARED'],
    Bounced: ['b-bounced', 'BOUNCED'],
    Unpaid: ['b-due', 'UNPAID'],
    Paid: ['b-paid', 'PAID'],
    linked: ['b-paid', 'LINKED'],
    pending: ['b-pending', 'PENDING'],
  };
  var info = map[status] || ['b-pending', status];
  return el('span', { cls: 'badge ' + info[0], text: info[1] });
}

function getBillStatus(bill) {
  var paid = payments
    .filter(function(p) { return p.billId === bill.id; })
    .reduce(function(s, p) { return s + (p.amount || 0) + (p.rebate || 0); }, 0);
  var adv = advances
    .filter(function(a) { return a.linkedBillId === bill.id; })
    .reduce(function(s, a) { return s + (a.amount || 0); }, 0);
  var total = paid + adv;
  var bal = (bill.netAmt || 0) - total;
  if (bal <= 0.5) return { status: 'paid', recv: bill.netAmt, bal: 0 };
  if (total > 0)  return { status: 'partial', recv: total, bal: bal };
  return { status: 'due', recv: 0, bal: bill.netAmt || 0 };
}

function fgInp(labelText, id, type, placeholder, val, extra) {
  return fg(labelText, inp(id, type, placeholder, val, extra));
}

function fgSel(labelText, id, options, val) {
  return fg(labelText, sel(id, options, val));
}

function gv(id) {
  var e = document.getElementById(id);
  return e ? e.value : '';
}
function sv(id, v) {
  var e = document.getElementById(id);
  if (e) e.value = (v !== null && v !== undefined) ? v : '';
}

function gn(id) {
  return parseFloat(gv(id)) || 0;
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
var NAV = [
  { section: 'Main' },
  { id: 'dashboard', icon: '📊', label: 'Dashboard' },
  { section: 'Bills' },
  { id: 'new-bill', icon: '➕', label: 'New Bill' },
  { id: 'all-bills', icon: '📋', label: 'All Bills' },
  { id: 'due-list', icon: '⏳', label: 'Due List' },
  { section: 'Payments' },
  { id: 'receive', icon: '💰', label: 'Receive Payment' },
  { id: 'advances', icon: '⬆️', label: 'Advances' },
  { id: 'cheques', icon: '🏦', label: 'Cheques' },
  { section: 'More' },
  { id: 'ledger', icon: '📒', label: 'Party Ledger' },
  { id: 'returns', icon: '↩️', label: 'Returns' },
  { id: 'expenses', icon: '💸', label: 'Expenses' },
  { id: 'purchases', icon: '🛒', label: 'Purchases' },
  { id: 'reports', icon: '📈', label: 'Reports' },
  { id: 'settings', icon: '⚙️', label: 'Settings' },
];

var TITLES = {};
NAV.forEach(function(n) { if (n.id) TITLES[n.id] = n.label; });

var currentPage = '';
var pageState = {};
var PS = pageState;

function buildNav() {
  var nav = document.getElementById('sb-nav');
  NAV.forEach(function(n) {
    if (n.section) {
      nav.appendChild(el('div', { cls: 'sb-label', text: n.section }));
    } else {
      var item = el('div', { cls: 'sb-item', text: n.icon + ' ' + n.label });
      item.dataset.page = n.id;
      item.addEventListener('click', function() { go(n.id); });
      nav.appendChild(item);
    }
  });
}

function go(page) {
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(function(i) {
    i.classList.toggle('on', i.dataset.page === page);
  });
  document.getElementById('page-title').textContent = TITLES[page] || page;
  render(page);
}

function refresh() { go(currentPage); }

// ═══════════════════════════════════════
// TABLE BUILDER
// ═══════════════════════════════════════
function buildTable(cols, rows) {
  var thead = el('thead');
  var htr = el('tr');
  cols.forEach(function(c) {
    htr.appendChild(el('th', { cls: c.num ? 'num' : '', text: c.label }));
  });
  thead.appendChild(htr);

  var tbody = el('tbody');
  if (!rows || !rows.length) {
    var etr = el('tr');
    var etd = el('td', { cls: 'empty', colspan: cols.length });
    etd.setAttribute('colspan', cols.length);
    etd.innerHTML = '<div class="empty-icon">📭</div><div>No records found</div>';
    etr.appendChild(etd);
    tbody.appendChild(etr);
  } else {
    rows.forEach(function(row) {
      var tr = el('tr');
      cols.forEach(function(c) {
        var td = el('td', { cls: c.num ? 'num' : '' });
        var val = row[c.key];
        if (c.render) {
          var rendered = c.render(val, row);
          if (rendered instanceof HTMLElement) td.appendChild(rendered);
          else td.innerHTML = rendered;
        } else {
          td.textContent = val !== undefined && val !== null ? val : '-';
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  var wrap = el('div', { cls: 'tbl-wrap' });
  wrap.appendChild(el('table', {}, [thead, tbody]));
  return wrap;
}

function actionBtns(actions) {
  var div = el('div', { cls: 'filters' });
  actions.forEach(function(a) {
    div.appendChild(btn(a.label, 'btn-xs ' + (a.cls || 'btn-outline'), a.fn));
  });
  return div;
}

// ═══════════════════════════════════════
// MODAL SYSTEM
// ═══════════════════════════════════════
function openModal(title, bodyEl, footerBtns, wide) {
  closeModal();
  var overlay = el('div', { cls: 'overlay show', id: 'modal-overlay' });
  var modal = el('div', { cls: 'modal' });
  if (wide) modal.style.maxWidth = '720px';

  var closeBtn = el('button', { cls: 'modal-close', text: '✕', onclick: closeModal });
  var head = el('div', { cls: 'modal-head' }, [
    el('h3', { text: title }),
    closeBtn
  ]);

  var body = el('div', { cls: 'modal-body' });
  if (bodyEl instanceof HTMLElement) body.appendChild(bodyEl);

  var foot = el('div', { cls: 'modal-foot' });
  foot.appendChild(btn('Cancel', 'btn-outline', closeModal));
  if (footerBtns) {
    footerBtns.forEach(function(b_) {
      foot.appendChild(btn(b_.label, b_.cls || 'btn-green', b_.fn));
    });
  }

  modal.appendChild(head);
  modal.appendChild(body);
  modal.appendChild(foot);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
}

function closeModal() {
  var o = document.getElementById('modal-overlay');
  if (o) o.remove();
}

// ═══════════════════════════════════════
// GRADE ROW SYSTEM
// ═══════════════════════════════════════
var gradeCounter = 0;

function makeGradeRow(gr, onRemove) {
  gradeCounter++;
  var i = gradeCounter;

  var gradeInp = inp('gg-' + i, 'text', 'W320', gr ? gr.grade : '');
  gradeInp.style.textTransform = 'uppercase';

  // Datalist for suggestions
  var dl = el('datalist', { id: 'gdl-' + i });
  cfg.grades.forEach(function(g) {
    dl.appendChild(el('option', { value: g }));
  });
  gradeInp.setAttribute('list', 'gdl-' + i);

  var qtyInp  = inp('gq-' + i, 'number', '0', gr ? (gr.qty || '') : '', { step: '1' });
  var wtInp   = inp('gw-' + i, 'number', '0', gr ? gr.weight : '', { step: '0.01' });
  var rateInp = inp('gr-' + i, 'number', '0', gr ? gr.rate : '', { step: '0.01' });
  var taxInp  = inp('gt-' + i, 'number', '0', gr ? gr.taxable : '', { readonly: true });

  function calc() {
    var w = parseFloat(wtInp.value) || 0;
    var r = parseFloat(rateInp.value) || 0;
    taxInp.value = w && r ? Math.round(w * r * 100) / 100 : '';
    recalcNet();
  }

  gradeInp.addEventListener('input', function() {
    this.value = this.value.toUpperCase();
    calc();
  });
  wtInp.addEventListener('input', calc);
  rateInp.addEventListener('input', calc);

  var removeBtn = el('button', {
    cls: 'btn btn-red btn-sm',
    text: '✕',
    type: 'button',
    onclick: function() {
      row.remove();
      recalcNet();
    }
  });

  var row = el('div', { cls: 'grade-row', id: 'grow-' + i }, [
    el('div', { cls: 'fg' }, [el('label', { text: 'Grade' }), gradeInp, dl]),
    el('div', { cls: 'fg' }, [el('label', { text: 'Qty/Bags' }), qtyInp]),
    el('div', { cls: 'fg' }, [el('label', { text: 'Weight (kg)' }), wtInp]),
    el('div', { cls: 'fg' }, [el('label', { text: 'Rate (₹/kg)' }), rateInp]),
    el('div', { cls: 'fg' }, [el('label', { text: 'Taxable (₹)' }), taxInp]),
    el('div', { style: 'padding-top:20px' }, [removeBtn])
  ]);

  return row;
}

function recalcNet() {
  var rows = document.querySelectorAll('.grade-row');
  var taxable = 0;
  rows.forEach(function(row) {
    var id = row.id.replace('grow-', '');
    var t = parseFloat((document.getElementById('gt-' + id) || {}).value) || 0;
    taxable += t;
  });
  // Auto GST
  var gstPct = parseFloat((document.getElementById('bf-gst-pct') || {value:'0'}).value) || 0;
  if (gstPct > 0 && taxable > 0) {
    var totalGst = Math.round(taxable * (gstPct / 100) * 100) / 100;
    var half = Math.round(totalGst / 2 * 100) / 100;
    var gstType = (document.getElementById('bf-gst-type') || {value:'cgst_sgst'}).value;
    if (gstType === 'igst') {
      sv('bf-igst', totalGst); sv('bf-cgst', 0); sv('bf-sgst', 0);
    } else {
      sv('bf-cgst', half); sv('bf-sgst', half); sv('bf-igst', 0);
    }
  }
  // Auto STP
  var totalWt = 0, wtdRate = 0;
  rows.forEach(function(row) {
    var id = row.id.replace('grow-', '');
    var r = parseFloat((document.getElementById('gr-' + id) || {}).value) || 0;
    var w = parseFloat((document.getElementById('gw-' + id) || {}).value) || 0;
    if (r > 0 && w > 0) { wtdRate += r * w; totalWt += w; }
  });
  if (totalWt > 0) {
    sv('bf-stp', Math.round((wtdRate / totalWt) * (1 + gstPct / 100) * 100) / 100);
  }
  var cgst = gn('bf-cgst'), sgst = gn('bf-sgst'), igst = gn('bf-igst');
  var packing = gn('bf-packing'), round = gn('bf-round');
  var net = taxable + cgst + sgst + igst + packing + round;
  var te = document.getElementById('bf-taxable');
  if (te) te.value = taxable || '';
  var nd = document.getElementById('net-disp');
  if (nd) nd.textContent = '₹' + fmt(net);
}

function getGradeRows() {
  var rows = [];
  document.querySelectorAll('.grade-row').forEach(function(row) {
    var id = row.id.replace('grow-', '');
    var grade  = ((document.getElementById('gg-' + id) || {}).value || '').trim().toUpperCase();
    var weight = parseFloat((document.getElementById('gw-' + id) || {}).value) || 0;
    var rate   = parseFloat((document.getElementById('gr-' + id) || {}).value) || 0;
    if (grade && weight > 0 && rate > 0) {
      var qty = parseFloat((document.getElementById('gq-' + id) || {}).value) || 0;
      rows.push({ grade:grade, qty:qty, weight:weight, rate:rate, taxable:Math.round(weight*rate*100)/100 });
    }
  });
  return rows;
}

  var taxable = rows.reduce(function(s, r) { return s + r.taxable; }, 0);

  var sgst    = gn('bf-sgst');
  var igst    = gn('bf-igst');
  var packing = gn('bf-packing');

function openPayModal(billId) {
  var b = bills.find(function(x) { return x.id === billId; });
  if (!b) return;
  var s = getBillStatus(b);

  var amtInp    = inp('pay-amt', 'number', '0', s.bal);
  var rebateInp = inp('pay-rebate', 'number', '0', '0');
  var netDisp   = el('strong', { text: '₹' + fmt(s.bal), style: 'color:#166534;font-size:15px' });

  function updateNet() {
    var a = parseFloat(amtInp.value) || 0;
    var r = parseFloat(rebateInp.value) || 0;
    netDisp.textContent = '₹' + fmt(a + r);
  }
  amtInp.addEventListener('input', updateNet);
  rebateInp.addEventListener('input', updateNet);

  var modeOpts = ['NEFT','RTGS','CHEQUE','IMPS','UPI','CASH'].map(function(m) { return { l: m }; });

  var info = el('p', {
    style: 'margin-bottom:12px;font-size:12px;color:#6b7280',
    html: '<strong>' + b.party + '</strong> &nbsp;|&nbsp; Bill: ₹' + fmt(b.netAmt) +
          ' &nbsp;|&nbsp; Balance: <strong style="color:#dc2626">₹' + fmt(s.bal) + '</strong>'
  });

  var body = el('div', {}, [
    info,
    el('div', { cls: 'grid g2', style: 'margin-bottom:10px' }, [
      fg('Amount Received (₹)', amtInp),
      fg('Rebate / Discount (₹)', rebateInp),
      fgInp('Date', 'pay-date', 'date', '', today()),
      fgSel('Mode', 'pay-mode', modeOpts, 'NEFT'),
      fgInp('Cheque No', 'pay-chq', 'text', 'Optional', ''),
      fgInp('Remarks', 'pay-rmk', 'text', 'Optional', ''),
    ]),
    el('div', { cls: 'sum-bar', style: 'margin-top:4px' }, [
      el('span', {}, [
        document.createTextNode('Net Settlement: '),
        netDisp
      ]),
      el('span', { text: '(Amount + Rebate)', style: 'color:#9ca3af;font-size:11px' })
    ])
  ]);

  openModal('💰 Receive Payment', body, [{
    label: 'Save Payment',
    fn: function() {
      var amt    = parseFloat(amtInp.value) || 0;
      var rebate = parseFloat(rebateInp.value) || 0;
      var date   = gv('pay-date');
      if (!amt && !rebate) { toast('Amount required!', 'err'); return; }
      if (!date)           { toast('Date required!', 'err'); return; }
      payments.push({
        id: uid(), billId: billId,
        amount: amt, rebate: rebate,
        date: date, mode: gv('pay-mode'),
        chequeNo: gv('pay-chq'), remarks: gv('pay-rmk')
      });
      DB.set('payments', payments);
      toast('✅ Payment saved!');
      closeModal();
      refresh();
    }
  }]);
}

// ── ALL BILLS ──
function pgAllBills() {
  var state = pageState.allBills = pageState.allBills || {
    q:'', sortKey:'date', sortDir:-1, showPay:false, printMode:false, zoom:100, filters:{}
  };
  if (!state.selectedSet) state.selectedSet = new Set();

  var uParty  = Array.from(new Set(bills.map(function(b){return b.party;}))).sort();
  var uBroker = Array.from(new Set(bills.map(function(b){return b.broker||'';}))).sort();
  var uStatus = ['due','partial','paid'];
  var uMonth  = Array.from(new Set(bills.map(function(b){return b.date?b.date.substring(0,7):'';}).filter(Boolean))).sort();
  var uType   = Array.from(new Set(bills.map(function(b){return b.billType||'credit';}))).sort();
  var uGrade  = Array.from(new Set(bills.reduce(function(a,b){return a.concat((b.rows||[]).map(function(r){return r.grade;}));},[])));
  var uBillNo = Array.from(new Set(bills.map(function(b){return b.billNo||'';}).filter(Boolean))).sort();
  uGrade.sort();

  function hasF(k){ return state.filters[k]&&state.filters[k].size>0; }

  function passFilter(b) {
    var s=getBillStatus(b), fs=state.filters;
    if(hasF('status')&&!fs.status.has(s.status)) return false;
    if(hasF('broker')&&!fs.broker.has(b.broker||'')) return false;
    if(hasF('party') &&!fs.party.has(b.party)) return false;
    if(hasF('billType')&&!fs.billType.has(b.billType||'credit')) return false;
    if(hasF('month')){var m=b.date?b.date.substring(0,7):'';if(!fs.month.has(m))return false;}
    if(hasF('grade')){var bg=(b.rows||[]).map(function(r){return r.grade;});if(!bg.some(function(g){return fs.grade.has(g);}))return false;}
    if(hasF('billNo')&&!fs.billNo.has(b.billNo||'')) return false;
    var q=(state.q||'').toLowerCase();
    if(q&&!b.party.toLowerCase().includes(q)&&!(b.billNo||'').toLowerCase().includes(q)&&!(b.broker||'').toLowerCase().includes(q)&&!(b.remarks||'').toLowerCase().includes(q)) return false;
    return true;
  }

  function getSorted() {
    var data=bills.filter(passFilter);
    data.sort(function(a,b2){
      var av,bv;
      if(state.sortKey==='bal')    {av=getBillStatus(a).bal;  bv=getBillStatus(b2).bal;}
      else if(state.sortKey==='recv')  {av=getBillStatus(a).recv; bv=getBillStatus(b2).recv;}
      else if(state.sortKey==='status'){av=getBillStatus(a).status;bv=getBillStatus(b2).status;}
      else{av=a[state.sortKey]||'';bv=b2[state.sortKey]||'';}
      if(typeof av==='number'&&typeof bv==='number') return (av-bv)*state.sortDir;
      return String(av).localeCompare(String(bv))*state.sortDir;
    });
    return data;
  }
  // Filter dropdown on column header
  function mkHdrFilter(key, vals) {
    var isOn = hasF(key);
    var fb = document.createElement('button');
    fb.style.cssText = 'background:none;border:none;cursor:pointer;font-size:10px;padding:0 2px;vertical-align:middle;color:'+(isOn?'#166534':'#9ca3af')+';font-weight:'+(isOn?'700':'400');
    fb.textContent = isOn ? '▼' : '▽';
    fb.title = 'Filter';
    fb.addEventListener('click', function(e) {
      e.stopPropagation();
      document.querySelectorAll('[id^="cfd-"]').forEach(function(d){d.remove();});
      var dropId = 'cfd-'+key;
      var drop = document.createElement('div');
      drop.id = dropId;
      drop.style.cssText = 'position:fixed;background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:9999;min-width:200px;overflow:hidden';
      var rect = fb.getBoundingClientRect();
      drop.style.top = (rect.bottom+2)+'px';
      drop.style.left = Math.min(rect.left, window.innerWidth-210)+'px';
      var si = document.createElement('input');
      si.type='text'; si.placeholder='Search...';
      si.style.cssText='width:100%;padding:7px 10px;border:none;border-bottom:1px solid #e5e7eb;font-size:12px;outline:none;box-sizing:border-box';
      var listEl = document.createElement('div');
      listEl.style.cssText='max-height:200px;overflow-y:auto';
      var cur = state.filters[key] ? new Set(state.filters[key]) : new Set(vals);
      function renderList(q) {
        listEl.innerHTML='';
        var fv = q ? vals.filter(function(v){return String(v).toLowerCase().includes(q.toLowerCase());}) : vals;
        var ai=document.createElement('div'); ai.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-weight:600;border-bottom:1px solid #e5e7eb;font-size:12px';
        var ac=document.createElement('input'); ac.type='checkbox'; ac.style.accentColor='#166534';
        ac.checked=cur.size===vals.length; ac.indeterminate=cur.size>0&&cur.size<vals.length;
        ac.addEventListener('change',function(){if(this.checked)vals.forEach(function(v){cur.add(v);});else cur.clear();renderList(si.value);});
        ai.appendChild(ac); ai.appendChild(document.createTextNode('(Select All)'));
        ai.addEventListener('click',function(e){if(e.target!==ac){ac.checked=!ac.checked;ac.dispatchEvent(new Event('change'));}});
        listEl.appendChild(ai);
        fv.forEach(function(v){
          var item=document.createElement('div'); item.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:12px';
          item.addEventListener('mouseenter',function(){this.style.background='#f0fdf4';});
          item.addEventListener('mouseleave',function(){this.style.background='';});
          var chk=document.createElement('input'); chk.type='checkbox'; chk.style.accentColor='#166534';
          chk.checked=cur.has(v);
          var lbl=document.createElement('span'); lbl.textContent=v!==''&&v!=null?String(v):'(Blank)';
          chk.addEventListener('change',function(){if(this.checked)cur.add(v);else cur.delete(v);});
          item.appendChild(chk); item.appendChild(lbl);
          item.addEventListener('click',function(e){if(e.target!==chk){chk.checked=!chk.checked;chk.dispatchEvent(new Event('change'));}});
          listEl.appendChild(item);
        });
      }
      si.addEventListener('input',function(){renderList(this.value);});
      renderList('');
      var foot=document.createElement('div'); foot.style.cssText='padding:7px 10px;border-top:1px solid #e5e7eb;display:flex;gap:6px;justify-content:flex-end;background:#fafafa';
      var clr=document.createElement('button'); clr.className='btn btn-outline btn-sm'; clr.textContent='Clear';
      var ok=document.createElement('button');  ok.className='btn btn-green btn-sm';  ok.textContent='OK';
      clr.addEventListener('click',function(){state.filters[key]=null;drop.remove();rebuildAll();});
      ok.addEventListener('click',function(){state.filters[key]=cur.size===vals.length?null:cur;drop.remove();rebuildAll();});
      foot.appendChild(clr); foot.appendChild(ok);
      drop.appendChild(si); drop.appendChild(listEl); drop.appendChild(foot);
      document.body.appendChild(drop);
      setTimeout(function(){si.focus();},50);
      var closeH=function(e){if(!drop.contains(e.target)&&e.target!==fb){drop.remove();document.removeEventListener('click',closeH);}};
      setTimeout(function(){document.addEventListener('click',closeH);},0);
    });
    return fb;
  }

  // Top toolbar
  var topBar = document.createElement('div');

  var zLbl=el('span',{text:zoom+'%',style:'font-size:11px;min-width:32px;text-align:center;font-weight:600'});

  var zM=el('button',{style:'background:none;border:none;cursor:pointer;font-size:15px;padding:0 3px',text:'-'});
  var zP=el('button',{style:'background:none;border:none;cursor:pointer;font-size:15px;padding:0 3px',text:'+'});

  zP.addEventListener('click',function(){if(zoom<200){zoom+=10;applyZoom();}});
  zR.addEventListener('click',function(){zoom=100;applyZoom();});
  zWrap.appendChild(zM);zWrap.appendChild(zLbl);zWrap.appendChild(zP);zWrap.appendChild(zR);
  var excelBtn=el('button',{cls:'btn btn-outline btn-sm',text:'📊 Excel',onclick:exportBillsExcel});
  topBar.appendChild(searchInp);topBar.appendChild(clearFilBtn);topBar.appendChild(payTogBtn);
  topBar.appendChild(printSelBtn);topBar.appendChild(printNowBtn);topBar.appendChild(zWrap);topBar.appendChild(excelBtn);

  // Sum bar
  var sumBar=document.createElement('div');

    var tA=d.reduce(function(s,b){return s+b.netAmt;},0);
    var tB=d.reduce(function(s,b){return s+getBillStatus(b).bal;},0);
    var tR=d.reduce(function(s,b){return s+getBillStatus(b).recv;},0);
    var anyF=Object.keys(state.filters).some(function(k){return state.filters[k]!=null;})||!!state.q;

      '<span>Total: <strong>&#8377;'+fmt(tA)+'</strong></span>'+
      '<span>Received: <strong style="color:#166534">&#8377;'+fmt(tR)+'</strong></span>'+
      '<span>Balance: <strong style="color:#dc2626">&#8377;'+fmt(tB)+'</strong></span>'+

  }

  var tblOuter=document.createElement('div'); tblOuter.style.overflow='auto';

    {l:'Broker',k:'broker',fk:'broker',uv:uBroker,num:false},
    {l:'Grade',k:'rows',fk:'grade',uv:uGrade,num:false,noSort:true},
    {l:'Type',k:'billType',fk:'billType',uv:uType,num:false},
    {l:'Net Amt',k:'netAmt',fk:null,uv:null,num:true},
    {l:'Received',k:'recv',fk:null,uv:null,num:true},
    {l:'Balance',k:'bal',fk:null,uv:null,num:true},
    {l:'Status',k:'status',fk:'status',uv:uStatus,num:false},

    {l:'Paid',k:'p_amt',fk:null,uv:null,num:true,pay:true},
    {l:'Rebate',k:'p_reb',fk:null,uv:null,num:true,pay:true},
    {l:'Mode',k:'p_mode',fk:null,uv:null,num:false,pay:true},
    {l:'Cheque',k:'p_chq',fk:null,uv:null,num:false,pay:true},
    {l:'Receipt',k:'p_rcpt',fk:null,uv:null,num:false,pay:true}
  ];
  var actCol={l:'Actions',k:'id',fk:null,uv:null,num:false,noSort:true};
  function getCols(){var c=baseCols.slice();if(state.showPay){for(var i=0;i<payCols.length;i++)c.push(payCols[i]);}c.push(actCol);return c;}

  function buildHeader(d) {
    thead.innerHTML='';
    var htr=document.createElement('tr');
    if(state.printMode){
      var thS=document.createElement('th');thS.style.cssText='width:30px;text-align:center;background:#fef9c3;position:sticky;top:0;z-index:2';
      var saChk=document.createElement('input');saChk.type='checkbox';saChk.title='Select All';
      saChk.addEventListener('change',function(){d.forEach(function(b){if(this.checked)state.selectedSet.add(b.id);else state.selectedSet.delete(b.id);}.bind(this));updatePrintBtn();renderRows(d);});
      thS.appendChild(saChk);htr.appendChild(thS);
    }
    getCols().forEach(function(c){
      var th=document.createElement('th');

      th.style.cssText='white-space:nowrap;user-select:none;position:sticky;top:0;z-index:2'+(c.pay?';background:#d1fae5;color:#166534':'');
      var ns=document.createElement('span');ns.textContent=c.l;th.appendChild(ns);
      if(!c.noSort){
        th.style.cursor='pointer';
        var si=document.createElement('span');si.style.cssText='margin-left:2px;font-size:9px;opacity:'+(state.sortKey===c.k?'1':'0.3');

  function renderRows(d) {

        addTd(lastP?lastP.date||'-':'-',false,true);addTd(lastP?'&#8377;'+fmt(lastP.amount||0):'-',true,true);

      expRow.appendChild(expTd);tbody.appendChild(expRow);

  function rebuildAll(){var d=getSorted();updateSum(d);buildHeader(d);renderRows(d);setTimeout(applyZoom,10);}

  var card=document.createElement('div');card.className='card';
  card.appendChild(topBar);card.appendChild(sumBar);card.appendChild(tblOuter);

}




function togglePayDetails(billId){
  var er=document.getElementById('exp-'+billId);
  if(!er)return;
  var td=er.firstChild;
  if(er.style.display!=='none'){er.style.display='none';return;}
  var bpays=payments.filter(function(p){return p.billId===billId;});
  if(!bpays.length){td.innerHTML='<div style="padding:10px 16px;color:#9ca3af;font-size:12px">No payment records yet</div>';}
  else{
    var html='<div style="padding:8px 16px"><table style="width:100%;border-collapse:collapse;font-size:11px">'+
      '<thead><tr style="background:#dcfce7">'+
      ['#','Date','Amount','Rebate','Net','Mode','Cheque','Receipt','Remarks'].map(function(h){return'<th style="padding:5px 8px;color:#166534;font-weight:700;text-align:left;font-size:10px">'+h+'</th>';}).join('')+
      '</tr></thead><tbody>';
    bpays.forEach(function(p,i){
      html+='<tr style="border-bottom:1px solid #e5e7eb">'+
        '<td style="padding:5px 8px">'+(i+1)+'</td><td style="padding:5px 8px">'+(p.date||'-')+'</td>'+
        '<td style="padding:5px 8px;text-align:right">₹'+fmt(p.amount||0)+'</td>'+
        '<td style="padding:5px 8px;text-align:right;color:#d97706">₹'+fmt(p.rebate||0)+'</td>'+
        '<td style="padding:5px 8px;text-align:right;font-weight:700;color:#166534">₹'+fmt((p.amount||0)+(p.rebate||0))+'</td>'+
        '<td style="padding:5px 8px">'+(p.mode||'-')+'</td><td style="padding:5px 8px">'+(p.chequeNo||'-')+'</td>'+
        '<td style="padding:5px 8px">'+(p.receiptNo||'-')+'</td><td style="padding:5px 8px;color:#6b7280">'+(p.remarks||'-')+'</td></tr>';

function printMultipleBills(billList){
  var html='<!DOCTYPE html><html><head><title>Print Bills</title>'+
    '<style>body{font-family:Arial,sans-serif;font-size:11px;padding:10px}'+
    '.bp{page-break-after:always;padding:12px;border:1px solid #ddd;margin-bottom:12px;border-radius:6px}'+
    '.bp:last-child{page-break-after:auto}'+
    'table{width:100%;border-collapse:collapse;font-size:10px;margin:6px 0}'+
    'th{background:#166534;color:#fff;padding:4px 6px;text-align:left}td{padding:4px 6px;border-bottom:1px solid #eee}'+
    'h3{color:#166534;margin:0 0 4px;font-size:13px}.net{background:#f0fdf4;padding:8px;text-align:right;border-radius:4px;margin-top:6px}'+
    '@media print{.np{display:none}}</style></head><body>'+
    '<div class="np" style="margin-bottom:10px">'+
    '<button onclick="window.print()" style="background:#166534;color:#fff;border:none;padding:7px 18px;border-radius:6px;cursor:pointer;margin-right:8px">🖨️ Print All</button>'+
    '<button onclick="window.close()" style="background:#f3f4f6;border:none;padding:7px 18px;border-radius:6px;cursor:pointer">Close</button>'+
    '</div>';
  billList.forEach(function(bill){
    var s=getBillStatus(bill);
    var gr=(bill.rows||[]).map(function(r,i){return'<tr><td>'+(i+1)+'</td><td>'+r.grade+'</td><td>'+(r.qty||0)+'</td><td>'+r.weight+' kg</td><td>&#8377;'+fmt(r.rate)+'</td><td>&#8377;'+fmt(r.taxable)+'</td></tr>';}).join('');
    html+='<div class="bp"><h3>'+bill.party+' — SL/'+(bill.billNo||'')+'</h3>'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>Date: '+bill.date+'</span><span>Broker: '+(bill.broker||'-')+'</span></div>'+
      '<table><thead><tr><th>#</th><th>Grade</th><th>Qty</th><th>Weight</th><th>Rate</th><th>Amount</th></tr></thead><tbody>'+gr+'</tbody></table>'+
      '<div class="net">Net: <strong>&#8377;'+fmt(bill.netAmt)+'</strong>'+(s.bal>0?' | Balance: <span style="color:#dc2626">&#8377;'+fmt(s.bal)+'</span>':' | Paid')+'</div></div>';
  });
  html+='</body></html>';
  var win=window.open('','_blank');
  if(!win){toast('Popup blocked!','err',5000);return;}
  win.document.write(html);win.document.close();
}


function deleteBill(id) {
  if (!confirm('Delete this bill?')) return;
  bills = bills.filter(function(b) { return b.id !== id; });
  DB.set('bills', bills);
  toast('Bill deleted');
  refresh();
}

function exportBillsExcel() {
  var data = bills.map(function(b) {
    var s = getBillStatus(b);
    return { BillNo:b.billNo, Date:b.date, Party:b.party, Broker:b.broker,
             Grade:(b.rows||[]).map(function(r){return r.grade;}).join(', '),
             NetAmt:b.netAmt, Received:s.recv, Balance:s.bal, Status:s.status };
  });
  var ws = XLSX.utils.json_to_sheet(data);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Bills');
  XLSX.writeFile(wb, 'Bills_' + today() + '.xlsx');
  toast('✅ Excel exported!');
}

// ── EDIT BILL ──
function openEditBill(bill) {
  gradeCounter = 0;
  var form = buildBillForm(bill);
  openModal('✏️ Edit Bill — ' + bill.party, form, [{
    label: '💾 Save Changes',
    fn: function() {
      var data = collectBillData(bill);
      if (!data) return;
      var idx = bills.findIndex(function(b) { return b.id === bill.id; });
      if (idx >= 0) bills[idx] = data;
      DB.set('bills', bills);
      toast('✅ Bill updated!');
      closeModal();
      refresh();
    }
  }], true);
}

// ── DUE LIST ──
function pgDueList() {
  var state = pageState.due = pageState.due || {q:'',sortKey:'bal',sortDir:-1,filters:{},printMode:false};
  if(!state.selectedSet) state.selectedSet=new Set();

  var dueBills=bills.filter(function(b){return getBillStatus(b).status!=='paid';});
  var uParty  =Array.from(new Set(dueBills.map(function(b){return b.party;}))).sort();
  var uBroker =Array.from(new Set(dueBills.map(function(b){return b.broker||'';}))).sort();
  var uStatus =['due','partial'];
  var uMonth  =Array.from(new Set(dueBills.map(function(b){return b.date?b.date.substring(0,7):'';}).filter(Boolean))).sort();

  function hasF(k){return state.filters[k]&&state.filters[k].size>0;}
  function passFilter(b){
    var s=getBillStatus(b),fs=state.filters;
    if(hasF('status')&&!fs.status.has(s.status))return false;
    if(hasF('broker')&&!fs.broker.has(b.broker||''))return false;
    if(hasF('party') &&!fs.party.has(b.party))return false;
    if(hasF('month')){var m=b.date?b.date.substring(0,7):'';if(!fs.month.has(m))return false;}
    var q=(state.q||'').toLowerCase();
    if(q&&!b.party.toLowerCase().includes(q)&&!(b.broker||'').toLowerCase().includes(q)&&!(b.billNo||'').includes(q))return false;
    return true;
  }
  function getSorted(){
    return dueBills.filter(passFilter).sort(function(a,b2){
      var av,bv;
      if(state.sortKey==='bal'){av=getBillStatus(a).bal;bv=getBillStatus(b2).bal;}
      else if(state.sortKey==='recv'){av=getBillStatus(a).recv;bv=getBillStatus(b2).recv;}
      else if(state.sortKey==='days'){av=Math.floor((new Date()-new Date(a.date))/86400000);bv=Math.floor((new Date()-new Date(b2.date))/86400000);}
      else if(state.sortKey==='status'){av=getBillStatus(a).status;bv=getBillStatus(b2).status;}
      else{av=a[state.sortKey]||'';bv=b2[state.sortKey]||'';}
      if(typeof av==='number'&&typeof bv==='number')return(av-bv)*state.sortDir;
      return String(av).localeCompare(String(bv))*state.sortDir;
    });
  }

  function mkHF(key,vals){
    var isOn=hasF(key);
    var fb=document.createElement('button');
    fb.style.cssText='background:none;border:none;cursor:pointer;font-size:10px;padding:0 2px;vertical-align:middle;color:'+(isOn?'#dc2626':'#9ca3af')+';font-weight:'+(isOn?'700':'400');
    fb.textContent=isOn?'▼':'▽';fb.title='Filter';
    fb.addEventListener('click',function(e){
      e.stopPropagation();document.querySelectorAll('[id^="cfd-"]').forEach(function(d){d.remove();});
      var drop=document.createElement('div');drop.id='cfd-'+key;
      drop.style.cssText='position:fixed;background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:9999;min-width:200px;overflow:hidden';
      var rect=fb.getBoundingClientRect();drop.style.top=(rect.bottom+2)+'px';drop.style.left=Math.min(rect.left,window.innerWidth-210)+'px';
      var si=document.createElement('input');si.type='text';si.placeholder='Search...';si.style.cssText='width:100%;padding:7px 10px;border:none;border-bottom:1px solid #e5e7eb;font-size:12px;outline:none;box-sizing:border-box';
      var listEl=document.createElement('div');listEl.style.maxHeight='200px';listEl.style.overflowY='auto';
      var cur=state.filters[key]?new Set(state.filters[key]):new Set(vals);
      function rl(q){
        listEl.innerHTML='';
        var fv=q?vals.filter(function(v){return String(v).toLowerCase().includes(q.toLowerCase());}):vals;
        var ai=document.createElement('div');ai.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-weight:600;border-bottom:1px solid #e5e7eb;font-size:12px';
        var ac=document.createElement('input');ac.type='checkbox';ac.style.accentColor='#166534';ac.checked=cur.size===vals.length;ac.indeterminate=cur.size>0&&cur.size<vals.length;
        ac.addEventListener('change',function(){if(this.checked)vals.forEach(function(v){cur.add(v);});else cur.clear();rl(si.value);});
        ai.appendChild(ac);ai.appendChild(document.createTextNode('(Select All)'));
        ai.addEventListener('click',function(e){if(e.target!==ac){ac.checked=!ac.checked;ac.dispatchEvent(new Event('change'));}});
        listEl.appendChild(ai);
        fv.forEach(function(v){
          var item=document.createElement('div');item.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:12px';
          item.addEventListener('mouseenter',function(){this.style.background='#fff1f2';});item.addEventListener('mouseleave',function(){this.style.background='';});
          var chk=document.createElement('input');chk.type='checkbox';chk.style.accentColor='#166534';chk.checked=cur.has(v);
          var lbl=document.createElement('span');lbl.textContent=v!==''&&v!=null?String(v):'(Blank)';
          chk.addEventListener('change',function(){if(this.checked)cur.add(v);else cur.delete(v);});
          item.appendChild(chk);item.appendChild(lbl);
          item.addEventListener('click',function(e){if(e.target!==chk){chk.checked=!chk.checked;chk.dispatchEvent(new Event('change'));}});
          listEl.appendChild(item);
        });
      }
      si.addEventListener('input',function(){rl(this.value);});rl('');
      var foot=document.createElement('div');foot.style.cssText='padding:7px 10px;border-top:1px solid #e5e7eb;display:flex;gap:6px;justify-content:flex-end;background:#fafafa';
      var clr=document.createElement('button');clr.className='btn btn-outline btn-sm';clr.textContent='Clear';
      var ok=document.createElement('button');ok.className='btn btn-green btn-sm';ok.textContent='OK';
      clr.addEventListener('click',function(){state.filters[key]=null;drop.remove();rebuildAll();});
      ok.addEventListener('click',function(){state.filters[key]=cur.size===vals.length?null:cur;drop.remove();rebuildAll();});
      foot.appendChild(clr);foot.appendChild(ok);drop.appendChild(si);drop.appendChild(listEl);drop.appendChild(foot);
      document.body.appendChild(drop);setTimeout(function(){si.focus();},50);
      var closeH=function(e){if(!drop.contains(e.target)&&e.target!==fb){drop.remove();document.removeEventListener('click',closeH);}};
      setTimeout(function(){document.addEventListener('click',closeH);},0);
    });
    return fb;
  }

  var topBar=document.createElement('div');topBar.style.cssText='display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:10px 14px;border-bottom:1px solid #e5e7eb;background:#fafafa';
  var searchInp=el('input',{cls:'inp-sm',type:'text',placeholder:'Search...',value:state.q||'',style:'width:160px'});
  var timer=null;
  searchInp.addEventListener('input',function(){state.q=this.value;var pos=this.selectionStart;var self=this;clearTimeout(timer);timer=setTimeout(function(){rebuildAll();self.focus();try{self.setSelectionRange(pos,pos);}catch(e){}},120);});
  var clearFilBtn=el('button',{cls:'btn btn-red btn-sm',text:'✕ Filters',style:'display:none'});
  clearFilBtn.addEventListener('click',function(){state.filters={};state.q='';searchInp.value='';rebuildAll();});
  var printSelBtn=el('button',{cls:'btn btn-outline btn-sm',text:'🖨 Select to Print'});
  var printNowBtn=el('button',{cls:'btn btn-green btn-sm',text:'🖨 Print (0)',style:'display:none'});
  printSelBtn.addEventListener('click',function(){state.printMode=!state.printMode;state.selectedSet.clear();printSelBtn.textContent=state.printMode?'✕ Cancel':'🖨 Select to Print';printSelBtn.className=state.printMode?'btn btn-amber btn-sm':'btn btn-outline btn-sm';printNowBtn.style.display='none';rebuildAll();});
  printNowBtn.addEventListener('click',function(){var sel=bills.filter(function(b){return state.selectedSet.has(b.id);});if(!sel.length){toast('Select bills first!','err');return;}printMultipleBills(sel);});
  var excelBtn=el('button',{cls:'btn btn-outline btn-sm',text:'📊 Excel',onclick:exportDueExcel});
  var waBtn=el('button',{cls:'btn btn-outline btn-sm',text:'📱 WA All',onclick:function(){if(!getSorted().length)return;var msg='*'+cfg.company+'*

Due Summary:
';getSorted().slice(0,10).forEach(function(b,i){msg+=(i+1)+'. '+b.party+' &#8377;'+fmt(getBillStatus(b).bal)+'
';});window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');}});
  topBar.appendChild(searchInp);topBar.appendChild(clearFilBtn);topBar.appendChild(printSelBtn);topBar.appendChild(printNowBtn);topBar.appendChild(excelBtn);topBar.appendChild(waBtn);

  var sumBar=document.createElement('div');sumBar.style.cssText='display:flex;gap:18px;flex-wrap:wrap;padding:8px 14px;background:#fff1f2;border-bottom:1px solid #fecaca;font-size:12px';
  function updateSum(d){
    var tB=d.reduce(function(s,b){return s+getBillStatus(b).bal;},0);
    var anyF=Object.keys(state.filters).some(function(k){return state.filters[k]!=null;})||!!state.q;
    clearFilBtn.style.display=anyF?'':'none';
    sumBar.innerHTML='<span>Pending: <strong>'+d.length+'</strong></span><span>Outstanding: <strong style="color:#dc2626">&#8377;'+fmt(tB)+'</strong></span>'+(anyF?'<span style="color:#d97706;font-size:11px">&#9888; Filters active</span>':'');
  }

  var tblOuter=document.createElement('div');tblOuter.style.overflow='auto';
  var table=document.createElement('table');var thead=document.createElement('thead');var tbody=document.createElement('tbody');
  table.appendChild(thead);table.appendChild(tbody);tblOuter.appendChild(table);

  var cols=[
    {l:'Date',k:'date',fk:'month',uv:uMonth,num:false},
    {l:'Party',k:'party',fk:'party',uv:uParty,num:false},
    {l:'Broker',k:'broker',fk:'broker',uv:uBroker,num:false},
    {l:'Grade',k:'rows',fk:null,uv:null,num:false,noSort:true},
    {l:'Bill Amt',k:'netAmt',fk:null,uv:null,num:true},
    {l:'Received',k:'recv',fk:null,uv:null,num:true},
    {l:'Balance',k:'bal',fk:null,uv:null,num:true},
    {l:'Days',k:'days',fk:null,uv:null,num:true},
    {l:'Status',k:'status',fk:'status',uv:uStatus,num:false},
    {l:'Actions',k:'id',fk:null,uv:null,num:false,noSort:true}
  ];

  function buildHeader(d){
    thead.innerHTML='';var htr=document.createElement('tr');
    if(state.printMode){var thS=document.createElement('th');thS.style.cssText='width:30px;text-align:center;background:#fef9c3;position:sticky;top:0;z-index:2';var sa=document.createElement('input');sa.type='checkbox';sa.addEventListener('change',function(){d.forEach(function(b){if(this.checked)state.selectedSet.add(b.id);else state.selectedSet.delete(b.id);}.bind(this));updatePrintBtn();renderRows(d);});thS.appendChild(sa);htr.appendChild(thS);}
    cols.forEach(function(c){
      var th=document.createElement('th');th.className=c.num?'num':'';th.style.cssText='white-space:nowrap;user-select:none;position:sticky;top:0;z-index:2'+(c.noSort?'':';cursor:pointer');
      var ns=document.createElement('span');ns.textContent=c.l;th.appendChild(ns);
      if(!c.noSort){var si=document.createElement('span');si.style.cssText='margin-left:2px;font-size:9px;opacity:'+(state.sortKey===c.k?'1':'0.3');si.textContent=state.sortKey===c.k?(state.sortDir>0?'↑':'↓'):'⇅';if(state.sortKey===c.k)si.style.color='#166534';th.appendChild(si);(function(key){th.addEventListener('click',function(e){if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return;state.sortDir=state.sortKey===key?-state.sortDir:-1;state.sortKey=key;var nd=getSorted();buildHeader(nd);renderRows(nd);});})(c.k);}
      if(c.fk&&c.uv&&c.uv.length)th.appendChild(mkHF(c.fk,c.uv));
      htr.appendChild(th);
    });
    thead.appendChild(htr);
  }

  function updatePrintBtn(){var cnt=state.selectedSet.size;printNowBtn.style.display=(state.printMode&&cnt>0)?'':'none';printNowBtn.textContent='🖨 Print ('+cnt+')';}

  function renderRows(d){
    tbody.innerHTML='';
    if(!d.length){var etr=document.createElement('tr');var etd=document.createElement('td');etd.setAttribute('colspan',cols.length+(state.printMode?1:0));etd.style.cssText='text-align:center;padding:40px;color:#9ca3af';etd.innerHTML='<div style="font-size:36px;margin-bottom:8px">&#127881;</div><div>No pending bills!</div>';etr.appendChild(etd);tbody.appendChild(etr);return;}
    d.forEach(function(row){
      var s=getBillStatus(row);var tr=document.createElement('tr');tr.id='drow-'+row.id;if(state.selectedSet.has(row.id))tr.style.background='#fefce8';
      if(state.printMode){var std=document.createElement('td');std.style.cssText='text-align:center;background:#fef9c3';var chk=document.createElement('input');chk.type='checkbox';chk.checked=state.selectedSet.has(row.id);chk.addEventListener('change',function(){if(this.checked)state.selectedSet.add(row.id);else state.selectedSet.delete(row.id);tr.style.background=this.checked?'#fefce8':'';updatePrintBtn();});std.appendChild(chk);tr.appendChild(std);}
      function addTd(val,num){var td=document.createElement('td');td.className=num?'num':'';if(val instanceof HTMLElement)td.appendChild(val);else td.innerHTML=(val!=null&&val!=='')?String(val):'-';tr.appendChild(td);}
      var days=Math.floor((new Date()-new Date(row.date))/86400000);
      var grade=(row.rows||[]).map(function(r){return r.grade;}).join(', ')||'-';
      addTd(row.date||'-');addTd('<strong>'+row.party+'</strong>');addTd(row.broker||'-');addTd(grade);addTd('&#8377;'+fmt(row.netAmt),true);
      addTd(el('span',{text:'&#8377;'+fmt(s.recv),style:'color:#166534'}),true);
      addTd(el('span',{text:'&#8377;'+fmt(s.bal),style:'color:#dc2626;font-weight:700'}),true);
      addTd(el('span',{text:days+'d',style:'color:'+(days>60?'#7f1d1d':days>30?'#dc2626':'#d97706')+';font-weight:700'}),true);
      addTd(badge(s.status));
      var actTd=document.createElement('td');actTd.appendChild(actionBtns([{label:'Pay',cls:'btn-xs btn-green',fn:function(){openPayModal(row.id);}},{label:'Print',cls:'btn-xs btn-outline',fn:function(){printBill(row);}},{label:'WA',cls:'btn-xs btn-outline',fn:function(){sendWA(row);}}]));tr.appendChild(actTd);tbody.appendChild(tr);
    });
  }

  function rebuildAll(){var d=getSorted();updateSum(d);buildHeader(d);renderRows(d);}
  rebuildAll();

  var card=document.createElement('div');card.className='card';card.appendChild(topBar);card.appendChild(sumBar);card.appendChild(tblOuter);

function sendWA(bill) {
  var s = getBillStatus(bill);
  var days = Math.floor((new Date() - new Date(bill.date)) / 86400000);
  var msg = '*' + cfg.company + '*\n\nDear ' + bill.party + ',\n\nPayment Reminder:\n' +
    'Bill Date: ' + bill.date + '\nBill Amount: ₹' + fmt(bill.netAmt) +
    '\nReceived: ₹' + fmt(s.recv) + '\n*Outstanding: ₹' + fmt(s.bal) + '*\n' +
    'Days Pending: ' + days + ' days\n\nKindly arrange payment.\nThank you.';
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function exportDueExcel() {
  var data = bills.filter(function(b){return getBillStatus(b).status!=='paid';}).map(function(b) {
    var s = getBillStatus(b);
    return { Date:b.date, Party:b.party, Broker:b.broker,
             Grade:(b.rows||[]).map(function(r){return r.grade;}).join(', '),
             BillAmt:b.netAmt, Received:s.recv, Balance:s.bal,
             Days:Math.floor((new Date()-new Date(b.date))/86400000) };
  });
  var ws = XLSX.utils.json_to_sheet(data);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'DueList');
  XLSX.writeFile(wb, 'DueList_' + today() + '.xlsx');
  toast('✅ Excel exported!');
}

// ── RECEIVE PAYMENT ──
function pgReceive() {
  var dueBills = bills.filter(function(b){return getBillStatus(b).status!=='paid';})
    .sort(function(a,b){return getBillStatus(b).bal-getBillStatus(a).bal;});

  var dateSel = inp('recv-date', 'date', '', today());
  var modeOpts = ['NEFT','RTGS','CHEQUE','IMPS','UPI','CASH'].map(function(m){return{l:m};});
  var modeSel = sel('recv-mode', modeOpts, 'NEFT');
  var totalSpan = el('strong', { text: '₹0', style: 'color:#166534' });

  function updateTotal() {
    var total = 0;
    dueBills.forEach(function(b) {
      var chk = document.getElementById('rc-' + b.id);
      if (chk && chk.checked) total += getBillStatus(b).bal;
    });
    totalSpan.textContent = '₹' + fmt(total);
  }

  var tbl = buildTable([
    { label: '', key: 'id', render: function(v) {
      var chk = el('input', { type: 'checkbox', id: 'rc-' + v });
      chk.addEventListener('change', updateTotal);
      return chk;
    }},
    { label: 'Party', key: 'party', render: function(v) { return '<strong>' + v + '</strong>'; } },
    { label: 'Grade', key: 'rows', render: function(v) { return (v||[]).map(function(r){return r.grade;}).join(', ')||'-'; } },
    { label: 'Balance', key: 'id', num: true, render: function(v,row) {
      return el('span', { text: '₹'+fmt(getBillStatus(row).bal), style:'color:#dc2626;font-weight:700' });
    }},
    { label: 'Status', key: 'id', render: function(v,row) { return badge(getBillStatus(row).status); } },
    { label: 'Pay', key: 'id', render: function(v) {
      return actionBtns([{ label: 'Pay', cls: 'btn-xs btn-green', fn: function() { openPayModal(v); } }]);
    }}
  ], dueBills);

  var saveBtn = btn('💾 Save Selected', 'btn-green', function() {
    var date = dateSel.value;
    var mode = modeSel.value;
    if (!date) { toast('Date required!', 'err'); return; }
    var selected = dueBills.filter(function(b) {
      var c = document.getElementById('rc-' + b.id);
      return c && c.checked;
    });
    if (!selected.length) { toast('Koi bill select nahi kiya!', 'err'); return; }
    selected.forEach(function(b) {
      var s = getBillStatus(b);
      payments.push({ id: uid(), billId: b.id, amount: s.bal, rebate: 0, date: date, mode: mode, chequeNo: '', remarks: 'Multi payment' });
    });
    DB.set('payments', payments);
    toast('✅ ' + selected.length + ' payments saved!');
    refresh();
  });

  var foot = el('div', { style: 'padding:12px 14px;border-top:1px solid #e5e7eb;display:flex;gap:10px;align-items:center;flex-wrap:wrap' }, [
    el('span', { style: 'font-size:12px' }, [document.createTextNode('Selected: '), totalSpan]),
    dateSel, modeSel, saveBtn
  ]);

  return el('div', { cls: 'card' }, [
    el('div', { cls: 'card-head' }, [el('h4', { text: '💰 Receive Payment' })]),
    tbl,
    foot
  ]);
}

function openAddModal(title, fields, onSave) {
  var body = el('div', { cls: 'grid g2' });
  fields.forEach(function(f) {
    var input;
    if (f.type === 'select') {
      input = sel(f.id, f.options.map(function(o){return typeof o==='string'?{l:o,v:o}:o;}), f.val);
    } else if (f.type === 'textarea') {
      input = el('textarea', { id: f.id, cls: 'inp', rows: 2, placeholder: f.placeholder || '', text: f.val || '' });
    } else {
      input = inp(f.id, f.type || 'text', f.placeholder || '', f.val || '', f.extra);
    }
    if (f.style) input.style.cssText += f.style;
    var fgEl = fg(f.label, input);

function pgPartyLedger(party) {
  var pb = bills.filter(function(b){return b.party===party;}).sort(function(a,b){return a.date>b.date?1:-1;});
  var totalDue  = pb.reduce(function(s,b){return s+getBillStatus(b).bal;},0);
  var totalAmt  = pb.reduce(function(s,b){return s+b.netAmt;},0);
  var totalRecv = pb.reduce(function(s,b){return s+getBillStatus(b).recv;},0);

  var backBtn = btn('← Back', 'btn-outline btn-sm', function() { pageState.ledgerParty = null; refresh(); });

  var sumGrid = el('div',{style:'display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0'});
  [{l:'Total Bills',v:pb.length,c:'#166534'},{l:'Total Sales',v:'₹'+fmt(totalAmt),c:'#1d4ed8'},
   {l:'Received',v:'₹'+fmt(totalRecv),c:'#166534'},{l:'Outstanding',v:'₹'+fmt(totalDue),c:totalDue>0?'#dc2626':'#166534'}
  ].forEach(function(s){
    var d=el('div',{style:'background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px 14px'});
    d.innerHTML='<div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;margin-bottom:4px">'+s.l+'</div>'+
      '<div style="font-size:20px;font-weight:700;color:'+s.c+'">'+s.v+'</div>';
    sumGrid.appendChild(d);
  });

  var tblWrap=el('div',{cls:'tbl-wrap'});
  var table=el('table',{});
  var thead=el('thead',{});var htr=el('tr',{});
  ['Date','Bill#','Grade','Qty','Taxable','GST','Net Amt','Received','Balance','Status','Remarks','Actions'].forEach(function(h){
    htr.appendChild(el('th',{text:h}));
  });
  thead.appendChild(htr);table.appendChild(thead);
  var tbody=el('tbody',{});

  pb.forEach(function(b){
    var s=getBillStatus(b);
    var grade=(b.rows||[]).map(function(r){return r.grade;}).join(', ')||'-';
    var qty=(b.rows||[]).map(function(r){return r.qty||0;}).filter(Boolean).join(', ')||'-';
    var gst=(b.cgst||0)+(b.sgst||0)+(b.igst||0);
    var tr=el('tr',{});
    [b.date||'-',b.billNo||'-',grade,qty,'₹'+fmt(b.taxable||0),'₹'+fmt(gst),'₹'+fmt(b.netAmt)].forEach(function(v){
      tr.appendChild(el('td',{text:v}));
    });
    var rTd=el('td',{cls:'num'});rTd.innerHTML='<span style="color:#166534;font-weight:600">₹'+fmt(s.recv)+'</span>';
    var bTd=el('td',{cls:'num'});bTd.innerHTML='<span style="color:'+(s.bal>0?'#dc2626':'#166534')+';font-weight:700">₹'+fmt(s.bal)+'</span>';
    var stTd=el('td',{});stTd.appendChild(badge(s.status));
    var rmTd=el('td',{text:b.remarks||'-',style:'font-size:11px;color:#6b7280'});
    var actTd=el('td',{});
    var bpays=payments.filter(function(p){return p.billId===b.id;});
    var dBtn=el('button',{cls:'btn btn-xs btn-blue',text:'▶ Payments ('+bpays.length+')'});
    var bid=b.id;
    dBtn.addEventListener('click',function(){
      var er=document.getElementById('expl-'+bid);
      if(er) er.style.display=er.style.display==='none'?'table-row':'none';
    });
    var pBtn=el('button',{cls:'btn btn-xs btn-green',style:'margin-left:4px',text:'Pay'});
    pBtn.addEventListener('click',function(){openPayModal(bid);});
    var prBtn=el('button',{cls:'btn btn-xs btn-outline',style:'margin-left:4px',text:'🖨️'});
    var bc=b;
    prBtn.addEventListener('click',function(){printBill(bc);});
    actTd.appendChild(dBtn);actTd.appendChild(pBtn);actTd.appendChild(prBtn);
    tr.appendChild(rTd);tr.appendChild(bTd);tr.appendChild(stTd);tr.appendChild(rmTd);tr.appendChild(actTd);
    tbody.appendChild(tr);
    // Payment expand row
    var eRow=el('tr',{id:'expl-'+b.id,style:'display:none;background:#f0fdf4'});
    var eTd=el('td',{});eTd.setAttribute('colspan',12);eTd.style.padding='0';
    if(!bpays.length){
      eTd.innerHTML='<div style="padding:10px 16px;color:#9ca3af;font-size:12px;font-style:italic">No payments yet</div>';
    } else {
      var ph='<div style="padding:8px 16px"><table style="width:100%;border-collapse:collapse;font-size:11px">'+
        '<thead><tr style="background:#dcfce7">'+
        ['#','Date','Amount','Rebate','Net','Mode','Cheque','Receipt','Remarks'].map(function(h){
          return '<th style="padding:5px 8px;color:#166534;font-weight:700;text-align:left;font-size:10px">'+h+'</th>';
        }).join('')+'</tr></thead><tbody>';
      bpays.forEach(function(p,pi){
        ph+='<tr style="border-bottom:1px solid #e5e7eb">'+
          '<td style="padding:5px 8px">'+(pi+1)+'</td>'+
          '<td style="padding:5px 8px">'+(p.date||'-')+'</td>'+
          '<td style="padding:5px 8px;text-align:right">₹'+fmt(p.amount||0)+'</td>'+
          '<td style="padding:5px 8px;text-align:right;color:#d97706">₹'+fmt(p.rebate||0)+'</td>'+
          '<td style="padding:5px 8px;text-align:right;font-weight:700;color:#166534">₹'+fmt((p.amount||0)+(p.rebate||0))+'</td>'+
          '<td style="padding:5px 8px">'+(p.mode||'-')+'</td>'+
          '<td style="padding:5px 8px">'+(p.chequeNo||'-')+'</td>'+
          '<td style="padding:5px 8px">'+(p.receiptNo||'-')+'</td>'+
          '<td style="padding:5px 8px;color:#6b7280">'+(p.remarks||'-')+'</td></tr>';
      });
      ph+='</tbody></table></div>';
      eTd.innerHTML=ph;
    }
    eRow.appendChild(eTd);tbody.appendChild(eRow);
  });

  if(!pb.length){
    var etr=el('tr',{});var etd=el('td',{});etd.setAttribute('colspan',12);
    etd.style.cssText='text-align:center;padding:40px;color:#9ca3af';
    etd.innerHTML='<div style="font-size:32px">📭</div><div>No bills</div>';
    etr.appendChild(etd);tbody.appendChild(etr);
  }
  table.appendChild(tbody);tblWrap.appendChild(table);

  var card=el('div',{cls:'card'},[
    el('div',{cls:'card-head'},[
      el('h4',{text:'📒 '+party}),
      el('span',{html:'Outstanding: <strong style="color:'+(totalDue>0?'#dc2626':'#166534')+'">₹'+fmt(totalDue)+'</strong>'})
    ]),
    tblWrap
  ]);
  var wrap=el('div',{});
  wrap.appendChild(backBtn);wrap.appendChild(sumGrid);wrap.appendChild(card);
  return wrap;
}

      { id: 'pu-grade', label: 'Grade', placeholder: 'W320', extra: { style: 'text-transform:uppercase' } },
      { id: 'pu-weight', label: 'Weight (kg)', type: 'number', placeholder: '0' },
      { id: 'pu-rate', label: 'Rate (₹/kg)', type: 'number', placeholder: '0' },
      { id: 'pu-amount', label: 'Net Amount', type: 'number', placeholder: '0' },
      { id: 'pu-status', label: 'Status', type: 'select', options: ['Unpaid','Paid'] },
    ], function(vals) {
      var supplier = (vals['pu-supplier']||'').toUpperCase();
      var grade = (vals['pu-grade']||'').toUpperCase();
      if (!vals['pu-date']||!supplier||!grade) { toast('Fill required fields!','err'); return; }
      var w = parseFloat(vals['pu-weight'])||0;
      var r = parseFloat(vals['pu-rate'])||0;
      var amt = parseFloat(vals['pu-amount'])||(w*r);
      purchases.push({ id:uid(), date:vals['pu-date'], supplier:supplier, grade:grade, weight:w, rate:r, netAmt:amt, status:vals['pu-status'], createdAt:new Date().toISOString() });
      DB.set('purchases', purchases);
      toast('✅ Purchase saved!');
      closeModal();
      refresh();
    });
  });

  return genericListPage('🛒 Purchases (' + data.length + ')', data, [
    { label: 'Date', key: 'date' },
    { label: 'Supplier', key: 'supplier', render: function(v) { return '<strong>' + v + '</strong>'; } },
    { label: 'Grade', key: 'grade' },
    { label: 'Weight', key: 'weight', num: true, render: function(v) { return v + ' kg'; } },
    { label: 'Net Amt', key: 'netAmt', num: true, render: function(v) { return '₹' + fmt(v); } },
    { label: 'Status', key: 'status', render: function(v) { return badge(v); } },
    { label: 'Action', key: 'id', render: function(v) {
      return actionBtns([{ label: '🗑️', cls: 'btn-xs btn-red', fn: function() {
        if (!confirm('Delete?')) return;
        purchases = purchases.filter(function(p){return p.id!==v;});
        DB.set('purchases', purchases);
        toast('Deleted');
        refresh();
      }}]);
    }}
  ], el('div', { cls: 'filters' }, [search, addBtn]));
}

// ── REPORTS ──
function pgReports() {
  var tab = pageState.reportTab || 'party';
  var tabs_ = [
    { id: 'party', label: 'Party Outstanding' },
    { id: 'broker', label: 'Broker Wise' },
    { id: 'grade', label: 'Grade Wise' },
    { id: 'sales', label: 'Monthly Sales' },
  ];

  var tabsEl = el('div', { cls: 'tabs' });
  tabs_.forEach(function(t) {
    var b = btn(t.label, 'btn-sm ' + (tab === t.id ? 'btn-green' : 'btn-outline'), function() {
      pageState.reportTab = t.id;
      refresh();
    });
    tabsEl.appendChild(b);
  });

  var content;

  if (tab === 'party') {
    var parties = Array.from(new Set(bills.map(function(b){return b.party;}))).sort();
    var data = parties.map(function(p) {
      var pb = bills.filter(function(b){return b.party===p;});
      return { party:p, bills:pb.length,
        total:pb.reduce(function(s,b){return s+b.netAmt;},0),
        recv:pb.reduce(function(s,b){return s+getBillStatus(b).recv;},0),
        due:pb.reduce(function(s,b){return s+getBillStatus(b).bal;},0) };
    }).sort(function(a,b){return b.due-a.due;});

    content = genericListPage('Party Outstanding', data, [
      { label: 'Party', key: 'party', render: function(v) { return '<strong>' + v + '</strong>'; } },
      { label: 'Bills', key: 'bills', num: true },
      { label: 'Total', key: 'total', num: true, render: function(v) { return '₹' + fmt(v); } },
      { label: 'Received', key: 'recv', num: true, render: function(v) { return el('span', { text:'₹'+fmt(v), style:'color:#166534' }); } },
      { label: 'Outstanding', key: 'due', num: true, render: function(v) {
        return el('span', { text:'₹'+fmt(v), style:'color:'+(v>0?'#dc2626':'#166534')+';font-weight:700' });
      }}
    ], btn('📊 Excel', 'btn-outline btn-sm', function() {
      var ws = XLSX.utils.json_to_sheet(data.map(function(d){return{Party:d.party,Bills:d.bills,Total:d.total,Received:d.recv,Outstanding:d.due};}));
      var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Party');
      XLSX.writeFile(wb,'PartyReport_'+today()+'.xlsx'); toast('✅ Excel exported!');
    }));
  }

  else if (tab === 'broker') {
    var bmap = {};
    bills.forEach(function(b) {
      var bk = b.broker || 'No Broker';
      if (!bmap[bk]) bmap[bk] = { broker:bk, bills:0, parties:new Set(), total:0, due:0 };
      bmap[bk].bills++;
      bmap[bk].parties.add(b.party);
      bmap[bk].total += b.netAmt;
      bmap[bk].due += getBillStatus(b).bal;
    });
    var data = Object.values(bmap).map(function(d){return { broker:d.broker, bills:d.bills, parties:d.parties.size, total:d.total, due:d.due };}).sort(function(a,b){return b.due-a.due;});

    content = genericListPage('Broker Wise Outstanding', data, [
      { label: 'Broker', key: 'broker', render: function(v) { return '<strong>' + v + '</strong>'; } },
      { label: 'Bills', key: 'bills', num: true },
      { label: 'Parties', key: 'parties', num: true },
      { label: 'Total Sales', key: 'total', num: true, render: function(v) { return '₹' + fmt(v); } },
      { label: 'Outstanding', key: 'due', num: true, render: function(v) {
        return el('span', { text:'₹'+fmt(v), style:'color:'+(v>0?'#dc2626':'#166534')+';font-weight:700' });
      }}
    ], btn('📊 Excel', 'btn-outline btn-sm', function() {
      var ws = XLSX.utils.json_to_sheet(data.map(function(d){return{Broker:d.broker,Bills:d.bills,Parties:d.parties,Total:d.total,Outstanding:d.due};}));
      var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Broker');
      XLSX.writeFile(wb,'BrokerReport_'+today()+'.xlsx'); toast('✅ Excel exported!');
    }));
  }

  else if (tab === 'grade') {
    var gmap = {};
    bills.forEach(function(b) {
      (b.rows||[]).forEach(function(r) {
        if (!gmap[r.grade]) gmap[r.grade] = { grade:r.grade, qty:0, amount:0, bills:0 };
        gmap[r.grade].qty += r.weight;
        gmap[r.grade].amount += r.taxable;
        gmap[r.grade].bills++;
      });
    });
    var data = Object.values(gmap).sort(function(a,b){return b.amount-a.amount;});

    content = genericListPage('Grade Wise Sales', data, [
      { label: 'Grade', key: 'grade', render: function(v) { return '<strong>' + v + '</strong>'; } },
      { label: 'Weight', key: 'qty', num: true, render: function(v) { return fmt(v) + ' kg'; } },
      { label: 'Amount', key: 'amount', num: true, render: function(v) { return '₹' + fmt(v); } },
      { label: 'Avg Rate', key: 'grade', num: true, render: function(v, row) {
        return '₹' + fmt(row.qty > 0 ? row.amount / row.qty : 0) + '/kg';
      }},
      { label: 'Bills', key: 'bills', num: true },
    ], el('span'));
  }

  else if (tab === 'sales') {
    var mmap = {};
    bills.forEach(function(b) {
      var m = b.date.substring(0, 7);
      if (!mmap[m]) mmap[m] = { month:m, bills:0, amount:0, recv:0, due:0 };
      mmap[m].bills++;
      mmap[m].amount += b.netAmt;
      mmap[m].recv += getBillStatus(b).recv;
      mmap[m].due += getBillStatus(b).bal;
    });
    var data = Object.values(mmap).sort(function(a,b){return b.month.localeCompare(a.month);});

    content = genericListPage('Monthly Sales', data, [
      { label: 'Month', key: 'month', render: function(v) { return '<strong>' + v + '</strong>'; } },
      { label: 'Bills', key: 'bills', num: true },
      { label: 'Sales', key: 'amount', num: true, render: function(v) { return '₹' + fmt(v); } },
      { label: 'Received', key: 'recv', num: true, render: function(v) { return el('span', { text:'₹'+fmt(v), style:'color:#166634' }); } },
      { label: 'Due', key: 'due', num: true, render: function(v) { return el('span', { text:'₹'+fmt(v), style:'color:#dc2626' }); } },
    ], el('span'));
  }

  return el('div', {}, [tabsEl, content]);
}

// ── SETTINGS ──
function pgSettings() {
  var gradesVal = (cfg.grades || []).join(', ');

  var form = el('div', { cls: 'grid g2' }, [
    fgInp('Company Name', 'sc-company', 'text', 'Company Name', cfg.company),
    fgInp('GSTIN', 'sc-gstin', 'text', 'GSTIN', cfg.gstin),
    fgInp('Phone', 'sc-phone', 'text', 'Phone', cfg.phone),
    fgInp('Address', 'sc-address', 'text', 'Address', cfg.address),
    fg('Grades (comma separated)', el('input', { id:'sc-grades', cls:'inp', value:gradesVal, style:'grid-column:span 2' })),
  ]);
  // Fix grades span
  form.children[4].style.gridColumn = 'span 2';

  var saveBtn = btn('💾 Save Settings', 'btn-green', function() {
    var grades = gv('sc-grades').split(',').map(function(g){return g.trim();}).filter(Boolean);
    cfg.company = gv('sc-company');
    cfg.gstin   = gv('sc-gstin');
    cfg.phone   = gv('sc-phone');
    cfg.address = gv('sc-address');
    cfg.grades  = grades;
    DB.setObj('settings', cfg);
    toast('✅ Settings saved!');
  });

  // Import JSON
  var importArea = el('textarea', { cls:'inp', rows:'5', placeholder:'Paste JSON from Claude here...', style:'font-family:monospace;font-size:12px' });
  var importBtn = btn('📥 Import Bills', 'btn-green', function() {
    var raw = importArea.value.trim();
    if (!raw) { toast('Paste JSON first!','err'); return; }
    try {
      var match = raw.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('JSON array not found');
      var data = JSON.parse(match[0]);
      if (!Array.isArray(data) || !data.length) throw new Error('Empty array');
      if (!confirm(data.length + ' bills import karni hain?')) return;
      data.forEach(function(b) {
        bills.unshift({
          id: uid(), billNo: b.billNo||'', date: b.date||today(),
          party: (b.party||'').toString().toUpperCase().trim(),
          broker: (b.broker||'').toString().toUpperCase(),
          transport: (b.transport||'').toString().toUpperCase(),
          station: (b.station||'').toString().toUpperCase(),
          pymt: b.pymt||'', billType: b.billType||'credit',
          stp: parseFloat(b.stp)||0, remarks: b.remarks||'',
          rows: b.rows || [{ grade:(b.grade||'').toUpperCase(), weight:parseFloat(b.weight)||0, rate:parseFloat(b.rate)||0, taxable:parseFloat(b.taxable)||0 }],
          taxable:parseFloat(b.taxable)||0, cgst:parseFloat(b.cgst)||0, sgst:parseFloat(b.sgst)||0,
          igst:parseFloat(b.igst)||0, packing:parseFloat(b.packing)||0, round:parseFloat(b.round)||0,
          netAmt:parseFloat(b.netAmt)||0, payments:[], createdAt:new Date().toISOString()
        });
      });
      DB.set('bills', bills);
      toast('✅ ' + data.length + ' bills imported!');
      importArea.value = '';
      go('all-bills');
    } catch(e) { toast('Error: ' + e.message, 'err'); }
  });

  // Backup / Restore
  var backupBtn = btn('📤 Backup JSON', 'btn-outline', function() {
    var data = { bills:bills, payments:payments, cheques:cheques, advances:advances, expenses:expenses, returns:returns_, purchases:purchases, settings:cfg, date:new Date().toISOString() };
    var blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
    var a = el('a', { href: URL.createObjectURL(blob), download: 'CashewPro_Backup_' + today() + '.json' });
    a.click();
    toast('✅ Backup downloaded!');
  });

  var restoreInput = el('input', { type:'file', accept:'.json', style:'display:none' });
  restoreInput.addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!confirm('Restore karega — existing data replace ho jaayega. Confirm?')) return;
        if (data.bills)     { bills     = data.bills;     DB.set('bills',     bills); }
        if (data.payments)  { payments  = data.payments;  DB.set('payments',  payments); }
        if (data.cheques)   { cheques   = data.cheques;   DB.set('cheques',   cheques); }
        if (data.advances)  { advances  = data.advances;  DB.set('advances',  advances); }
        if (data.expenses)  { expenses  = data.expenses;  DB.set('expenses',  expenses); }
        if (data.returns)   { returns_  = data.returns;   DB.set('returns',   returns_); }
        if (data.purchases) { purchases = data.purchases; DB.set('purchases', purchases); }
        if (data.settings)  { cfg = data.settings;        DB.setObj('settings', cfg); }
        toast('✅ Data restored!');
        go('dashboard');
      } catch(ex) { toast('Error: ' + ex.message, 'err'); }
    };
    reader.readAsText(file);
  });

  var restoreBtn = btn('📥 Restore', 'btn-outline', function() { restoreInput.click(); });

  return el('div', {}, [
    el('div', { cls: 'card', style:'margin-bottom:12px' }, [
      el('div', { cls: 'card-head' }, [el('h4', { text:'⚙️ Company Settings' }), saveBtn]),
      el('div', { style:'padding:16px' }, [form])
    ]),
    el('div', { cls: 'card', style:'margin-bottom:12px' }, [
      el('div', { cls: 'card-head' }, [el('h4', { text:'📥 Import Bills (JSON)' })]),
      el('div', { style:'padding:16px' }, [
        el('p', { text:'Claude se JSON copy karo → yahan paste karo → import karo', style:'color:#6b7280;font-size:12px;margin-bottom:8px' }),
        importArea,
        el('div', { style:'margin-top:8px' }, [importBtn])
      ])
    ]),
    el('div', { cls: 'card' }, [
      el('div', { cls: 'card-head' }, [el('h4', { text:'💾 Backup & Restore' })]),
      el('div', { style:'padding:14px;display:flex;gap:8px' }, [backupBtn, restoreBtn, restoreInput])
    ])
  ]);
}

buildNav();

document.getElementById('btn-new-bill').addEventListener('click', function() { go('new-bill'); });

go('dashboard');
</script>
