  function buildBillOptions(bSel,row){
    while(bSel.options.length)bSel.remove(0);
    var eo=document.createElement('option');eo.value='';
    eo.textContent=row._party?'-- Advance (no bill) --':'-- Select party first --';
    bSel.appendChild(eo);
    // Multi-bill option
    if(row._party){
      var mo=document.createElement('option');mo.value='__MULTI__';mo.textContent='⚡ Split across multiple bills...';
      bSel.appendChild(mo);
    }
    if(!row._party)return;
    var duePB=bills.filter(function(b){return b.party===row._party&&getBillStatus(b).status!=='paid';}).sort(function(a,b){return a.date<b.date?-1:1;});
    var paidPB=bills.filter(function(b){return b.party===row._party&&getBillStatus(b).status==='paid';}).sort(function(a,b){return b.date>a.date?1:-1;}).slice(0,5);
    if(duePB.length){
      var og=document.createElement('optgroup');og.label='Pending Bills';
      duePB.forEach(function(b){var s=getBillStatus(b);var o=document.createElement('option');o.value=b.id;o.textContent='#'+b.billNo+' ('+b.date+') Bal:₹'+fmt(s.bal);if(b.id===row._billId)o.selected=true;og.appendChild(o);});
      bSel.appendChild(og);
    }
    if(paidPB.length){
      var og2=document.createElement('optgroup');og2.label='Paid Bills';
      paidPB.forEach(function(b){var o=document.createElement('option');o.value=b.id+'|interest';o.textContent='#'+b.billNo+' ✅PAID — Interest/Misc';og2.appendChild(o);});
      bSel.appendChild(og2);
    }
    if(!row._billId&&duePB.length){
      var closest=duePB.slice().sort(function(a,b){return Math.abs(getBillStatus(a).bal-row.amount)-Math.abs(getBillStatus(b).bal-row.amount);})[0];
      row._billId=closest.id;bSel.value=closest.id;
    }
  }

  function rebuildBillSel(ri,row){var bSel=document.getElementById('bsel-'+ri);if(bSel)buildBillOptions(bSel,row);}

  function saveTxns(){
    var toSave=state.rows.filter(function(r){return r.type==='credit'&&r._include&&r._party&&!r._saved;});
    if(!toSave.length){toast('Party assign karo pehle!','err');return;}
    var cnt=0,advCnt=0;
    toSave.forEach(function(row){
      var bid=row._billId||'';
      var isInterest=bid.indexOf('|interest')>=0;
      var actualBid=isInterest?bid.replace('|interest',''):bid;
      if(actualBid&&!isInterest){
        payments.push({id:uid(),billId:actualBid,amount:row.amount,rebate:row.rebate||0,date:row.date,mode:row.mode||'NEFT',chequeNo:'',receiptNo:row.narration||'',remarks:'Bank Statement'});
      } else {
        var rmk=isInterest?('Interest on Bill #'+((bills.find(function(b){return b.id===actualBid;})||{billNo:''}).billNo)+' | '+row.narration):'Bank: '+row.narration;
        advances.push({id:uid(),party:row._party,amount:row.amount,date:row.date,mode:row.mode||'NEFT',remarks:rmk,linked:false,createdAt:new Date().toISOString()});
        advCnt++;
      }
      row._saved=true;cnt++;
    });
    DB.set('payments',payments);DB.set('advances',advances);
    toast('✅ '+cnt+' saved! ('+(cnt-advCnt)+' payments, '+advCnt+' advances)');
    refresh();
  }
  return wrap;
}


// ═══════════════════════════════════════
// BILL IMPORT (Excel + PDF)
// ═══════════════════════════════════════
function pgBillImport() {
  var state = pageState.billImp = pageState.billImp || {rows:[]};
  var wrap = document.createElement('div');

  var hdr=document.createElement('div');hdr.style.cssText='margin-bottom:14px';
  hdr.innerHTML='<h3 style="font-size:16px;font-weight:700;color:#166534;margin:0">📥 Bill Import</h3>'+
    '<p style="font-size:12px;color:#6b7280;margin:3px 0 0">Bulk import bills from Excel or PDF — select/deselect and save</p>';
  wrap.appendChild(hdr);

  // Format hint card
  var fmtCard=document.createElement('div');fmtCard.className='card';fmtCard.style.marginBottom='12px';
  var fmtH=document.createElement('div');fmtH.className='card-head';fmtH.innerHTML='<h4>📋 Expected Excel Format</h4>';
  fmtCard.appendChild(fmtH);
  var fmtB=document.createElement('div');fmtB.style.cssText='padding:12px 16px;font-size:11px;line-height:2;color:#374151';
  fmtB.innerHTML='<strong>Required columns (any order):</strong><br>'+
    '<code style="background:#f3f4f6;padding:2px 5px;border-radius:3px;font-size:11px">INVOICE NO.</code> &nbsp; '+
    '<code style="background:#f3f4f6;padding:2px 5px;border-radius:3px">DATE</code> &nbsp; '+
    '<code style="background:#f3f4f6;padding:2px 5px;border-radius:3px">BUYER NAME</code> &nbsp; '+
    '<code style="background:#f3f4f6;padding:2px 5px;border-radius:3px">NET AMOUNT</code> &nbsp; '+
    '<code style="background:#f3f4f6;padding:2px 5px;border-radius:3px">DELIVERY STATION</code><br>'+
    '<strong>Optional:</strong> BROKER, TRANSPORT, PYMT MODE, TAXABLE VALUE, CGST, SGST, GRADES SOLD, WEIGHT, RATE<br>'+
    '<span style="color:#166534">✅ Tumhara current format (INVOICE NO., DATE, BUYER NAME, ..., NET AMOUNT, PYMT MODE, BROKER, GRADES SOLD, TRANSPORT) direct import hoga</span>';
  fmtCard.appendChild(fmtB);wrap.appendChild(fmtCard);

  // Upload card
  var upCard=document.createElement('div');upCard.className='card';upCard.style.marginBottom='12px';
  var upH2=document.createElement('div');upH2.className='card-head';upH2.innerHTML='<h4>📂 Upload File</h4>';
  upCard.appendChild(upH2);
  var upB2=document.createElement('div');upB2.style.padding='16px';
  var zone2=document.createElement('div');
  zone2.style.cssText='border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center;cursor:pointer;background:#fafafa;margin-bottom:10px;transition:all .15s';
  zone2.innerHTML='<div style="font-size:26px;margin-bottom:6px">📊</div><div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:3px">Drag & drop Bill Excel or PDF or click to upload</div><div style="font-size:11px;color:#9ca3af">Excel (.xlsx/.xls) or multi-page Tax Invoice PDF</div>';
  zone2.addEventListener('mouseover',function(){this.style.borderColor='#166534';this.style.background='#f0fdf4';});
  zone2.addEventListener('mouseout',function(){this.style.borderColor='#d1d5db';this.style.background='#fafafa';});
  var fileInp2=document.createElement('input');fileInp2.type='file';fileInp2.accept='.xlsx,.xls,.pdf';fileInp2.style.display='none';
  fileInp2.addEventListener('change',function(){if(this.files[0])processBillFile(this.files[0]);});
  zone2.addEventListener('click',function(){fileInp2.click();});
  zone2.addEventListener('dragover',function(e){e.preventDefault();this.style.borderColor='#166534';});
  zone2.addEventListener('dragleave',function(){this.style.borderColor='#d1d5db';});
  zone2.addEventListener('drop',function(e){e.preventDefault();this.style.borderColor='#d1d5db';if(e.dataTransfer.files[0])processBillFile(e.dataTransfer.files[0]);});
  upB2.appendChild(zone2);upB2.appendChild(fileInp2);
  var statusDiv2=document.createElement('div');statusDiv2.id='bi-status';upB2.appendChild(statusDiv2);
  upCard.appendChild(upB2);wrap.appendChild(upCard);

  if(state.rows&&state.rows.length) wrap.appendChild(buildBillTable());

  function parseBillDate(s) {
    if(!s) return today();
    s=String(s).trim();
    // Handle "9-3-26-" or "10-3-26-" format
    var m=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})[\/\-\.]?$/);
    if(m){var y=m[3].length===2?'20'+m[3]:m[3];return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');}
    m=s.match(/^(\d{4})[\/\-](\d{2})[\/\-](\d{2})$/);if(m)return s;
    // Excel serial
    var n=parseFloat(s);if(!isNaN(n)&&n>40000){var d=new Date(Math.round((n-25569)*86400000));return d.toISOString().split('T')[0];}
    return today();
  }

  function processBillFile(file) {
    var ext=file.name.split('.').pop().toLowerCase();
    statusDiv2.innerHTML='<div style="padding:8px 12px;background:#f0fdf4;border-radius:6px;font-size:12px;color:#166534">⏳ Processing <strong>'+file.name+'</strong>...</div>';
    if(ext==='pdf') parseBillPDF(file); else parseBillExcel(file);
  }

  function parseBillExcel(file) {
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb2=XLSX.read(e.target.result,{type:'array',raw:false,cellDates:false});
        var ws=wb2.Sheets[wb2.SheetNames[0]];
        var raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});

        // Find header row
        var headerRow=0;
        for(var i=0;i<Math.min(5,raw.length);i++){
          var rowStr=(raw[i]||[]).join(' ').toLowerCase();
          if(/invoice|bill/.test(rowStr)&&/(buyer|party|name)/.test(rowStr)){headerRow=i;break;}
        }
        var headers=(raw[headerRow]||[]).map(function(c){return String(c||'').trim().toLowerCase();});

        function fc2(pats){
          for(var pi=0;pi<pats.length;pi++){
            for(var hi=0;hi<headers.length;hi++){
              var p=pats[pi];
              if(p instanceof RegExp?p.test(headers[hi]):headers[hi].indexOf(p)>=0)return hi;
            }
          }return -1;
        }

        var cols={
          billNo: fc2(['invoice no','bill no','sl no','invoice','bill']),
          date:   fc2(['date']),
          party:  fc2(['buyer name','buyer','party name','party','customer']),
          station:fc2(['delivery station','station','destination','delivery']),
          item:   fc2(['item description','item','description','goods']),
          weight: fc2(['weight','wt','qty']),
          stp:    fc2(['stp rate','stp']),
          rate:   fc2(['rate']),
          taxable:fc2(['taxable value','taxable','assessable']),
          bardhana:fc2(['bardhana','packing']),
          cgst:   fc2(['cgst']),
          sgst:   fc2(['sgst']),
          igst:   fc2(['igst']),
          round:  fc2(['round off','round']),
          netAmt: fc2(['net amount','net amt','net','amount']),
          pymt:   fc2(['pymt mode','payment mode','mode']),
          broker: fc2(['broker']),
          grades: fc2(['grades sold','grades','grade']),
          transport:fc2(['transport','transporter'])
        };

        var rows=[];
        for(var ri=headerRow+1;ri<raw.length;ri++){
          var row=raw[ri];
          if(!row||row.every(function(c){return !c||String(c).trim()==='';})|| /grand total/i.test(row[0]))continue;
          function gv2(col){return col>=0&&row[col]?String(row[col]).trim():'';}
          function gn2(col){var v=gv2(col);return parseFloat(String(v).replace(/[,\s]/g,''))||0;}

          var billNo=gv2(cols.billNo)||String(ri);
          var party=(gv2(cols.party)||'').toUpperCase().trim();
          if(!party)continue;
          var netAmt=gn2(cols.netAmt);
          if(!netAmt)continue;

          var gradeStr=gv2(cols.grades)||gv2(cols.item)||'';
          var wt=gn2(cols.weight);
          var rate=gn2(cols.rate);
          var stp=gn2(cols.stp);
          var taxable=gn2(cols.taxable)||Math.round(netAmt/(1.05)*100)/100;
          var cgst=gn2(cols.cgst);
          var sgst=gn2(cols.sgst);
          var igst=gn2(cols.igst);
          if(!cgst&&!sgst&&!igst){var gstTotal=netAmt-taxable-(gn2(cols.bardhana)||0);cgst=Math.round(gstTotal/2*100)/100;sgst=cgst;}

          rows.push({
            billNo:String(billNo),
            date:parseBillDate(gv2(cols.date)),
            party:party,
            station:(gv2(cols.station)||'').toUpperCase(),
            broker:(gv2(cols.broker)||'').toUpperCase(),
            transport:(gv2(cols.transport)||'').toUpperCase(),
            billType:(gv2(cols.pymt)||'credit').toLowerCase()==='cash'?'cash':'credit',
            rows:[{grade:gradeStr,qty:0,weight:wt,rate:rate,taxable:taxable}],
            taxable:taxable,cgst:cgst,sgst:sgst,igst:igst,
            packing:gn2(cols.bardhana),round:gn2(cols.round),stp:stp,
            netAmt:netAmt,remarks:'',
            _include:true,_dup:false
          });
        }

        // Check duplicates against existing bills
        rows.forEach(function(r){
          r._dup=bills.some(function(b){return b.billNo===r.billNo&&b.party===r.party;});
          if(r._dup)r._include=false;
        });

        state.rows=rows;
        statusDiv2.innerHTML='<div style="padding:8px 12px;background:#f0fdf4;border-radius:6px;font-size:12px;color:#166534">✅ <strong>'+rows.length+' bills extracted</strong> — '+rows.filter(function(r){return r._dup;}).length+' duplicates auto-unchecked</div>';
        refresh();
      }catch(ex){
        statusDiv2.innerHTML='<div style="padding:8px 12px;background:#fee2e2;border-radius:6px;font-size:12px;color:#dc2626">❌ Error: '+ex.message+'</div>';
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function parseBillPDF(file) {
    statusDiv2.innerHTML='<div style="padding:8px 12px;background:#f0fdf4;border-radius:6px;font-size:12px;color:#166534">⏳ PDF.js loading...</div>';
    function doParse2() {
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      var reader=new FileReader();
      reader.onload=function(e){
        pdfjsLib.getDocument({data:e.target.result}).promise.then(function(pdf){
          var pagePromises=[];
          for(var pi=1;pi<=pdf.numPages;pi++){pagePromises.push(pdf.getPage(pi).then(function(pg){return pg.getTextContent().then(function(tc){return tc.items.map(function(x){return x.str;}).join(' ');});}));}
          Promise.all(pagePromises).then(function(pages){
            var rows=[];
            pages.forEach(function(text,pageIdx){
              var bill=parseSingleInvoicePDF(text,pageIdx+1);
              if(bill){
                bill._dup=bills.some(function(b){return b.billNo===bill.billNo&&b.party===bill.party;});
                if(bill._dup)bill._include=false;
                bill._include=bill._include!==false?true:false;
                rows.push(bill);
              }
            });
            state.rows=rows;
            statusDiv2.innerHTML='<div style="padding:8px 12px;background:#f0fdf4;border-radius:6px;font-size:12px;color:#166534">✅ <strong>'+rows.length+' bills from PDF</strong> — '+rows.filter(function(r){return r._dup;}).length+' duplicates</div>';
            refresh();
          });
        }).catch(function(err){statusDiv2.innerHTML='<div style="padding:8px 12px;background:#fee2e2;border-radius:6px;font-size:12px;color:#dc2626">❌ '+err.message+'</div>';});
      };
      reader.readAsArrayBuffer(file);
    }
    if(typeof pdfjsLib!=='undefined'){doParse2();return;}
    var sc3=document.createElement('script');sc3.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    sc3.onload=doParse2;sc3.onerror=function(){statusDiv2.innerHTML='<div style="padding:8px 12px;background:#fee2e2;border-radius:6px;font-size:12px;color:#dc2626">❌ PDF.js load failed</div>';};
    document.head.appendChild(sc3);
  }

  function parseSingleInvoicePDF(text, pageNum) {
    // Extract invoice number: "SL/4160" pattern
    var invM=text.match(/Invoice\s+No[.\s]+SL[\/\s]*(\d+)/i)||text.match(/SL\/(\d+)/);
    if(!invM)return null;
    var billNo=invM[1]||invM[0];

    // Date: "11/03/2026" or "Dated 11/03/2026"
    var dateM=text.match(/Dated\s+(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i)||text.match(/(\d{2}[\/\-]\d{2}[\/\-]\d{4})/);
    var billDate=today();
    if(dateM){var dp=dateM[1].split(/[\/\-]/);if(dp.length===3)billDate=(dp[2].length===4?dp[2]:'20'+dp[2])+'-'+dp[1].padStart(2,'0')+'-'+dp[0].padStart(2,'0');}

    // Buyer name — after "Buyer" keyword
    var buyerM=text.match(/Buyer\s+([\w\s]+?)(?:JAIPUR|KOTA|ALWAR|DAUSA|JODHPUR|Pin\s*:|\d{6})/i);
    var party='UNKNOWN PARTY';
    if(buyerM){party=buyerM[1].replace(/\s+/g,' ').trim().toUpperCase();}

    // Net Amount
    var netM=text.match(/Net\s+Amount\s+([\d,]+\.?\d*)/i)||text.match(/Net\s+Amount[\s\n]+([\d,]+)/i);
    var netAmt=netM?parseFloat(netM[1].replace(/,/g,'')):0;
    if(!netAmt)return null;

    // Other amounts
    var taxM=text.match(/(?:Taxable|Total)\s+([\d,]+\.?\d*)\s/i);
    var taxable=taxM?parseFloat(taxM[1].replace(/,/g,'')):Math.round(netAmt/1.05*100)/100;
    var cgstM=text.match(/CGST\s+TAX\s+([\d,]+\.?\d*)/i);
    var sgstM=text.match(/SGST\s+TAX\s+([\d,]+\.?\d*)/i);
    var cgst=cgstM?parseFloat(cgstM[1].replace(/,/g,'')):0;
    var sgst=sgstM?parseFloat(sgstM[1].replace(/,/g,'')):0;
    var bardhanaM=text.match(/BARDHANA\s+([\d,]+\.?\d*)/i);
    var packing=bardhanaM?parseFloat(bardhanaM[1].replace(/,/g,'')):0;

    // Payment mode
    var pymtM=text.match(/Pymt\s+Mode\s*:\s*(CREDIT|CASH)/i);
    var billType=pymtM&&pymtM[1].toLowerCase()==='cash'?'cash':'credit';

    // Delivery station
    var stM=text.match(/Delivery\s+Station\s*:\s*(\w+)/i);
    var station=stM?stM[1].toUpperCase():'';

    // Broker
    var brokerM=text.match(/Broker\s+(?:DL\s+)?([\w\s]+?)(?:\n|Transporter|Vehicle)/i);
    var broker=brokerM?brokerM[1].replace(/\s+/g,' ').trim().toUpperCase():'';

    // Transporter
    var transM=text.match(/Transporter\s+([\w\s]+?)(?:\n|Vehicle|Eway)/i);
    var transport=transM?transM[1].replace(/\s+/g,' ').trim().toUpperCase():'';

    // Grades / description
    var gradeItems=[];
    var itemRegex=/(\d+)\s+([\w\s]+?)\s+(?:080\d+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d,]+\.?\d*)/g;
    var im;
    while((im=itemRegex.exec(text))!==null){
      var grade=im[2].trim().toUpperCase();
      var wt=parseFloat(im[4])||0;
      var rate=parseFloat(im[5])||0;
      var amt=parseFloat(im[6].replace(/,/g,''))||0;
      if(grade&&wt>0&&rate>0)gradeItems.push({grade:grade,qty:0,weight:wt,rate:rate,taxable:amt});
    }
    if(!gradeItems.length)gradeItems=[{grade:'',qty:0,weight:0,rate:0,taxable:taxable}];

    return{billNo:String(billNo),date:billDate,party:party,station:station,broker:broker,
      transport:transport,billType:billType,rows:gradeItems,
      taxable:taxable,cgst:cgst,sgst:sgst,igst:0,packing:packing,round:0,stp:0,
      netAmt:netAmt,remarks:'PDF Import p.'+pageNum,_include:true,_dup:false};
  }

  function buildBillTable() {
    var tCard=document.createElement('div');tCard.className='card';
    var tH=document.createElement('div');tH.className='card-head';
    var sel=state.rows.filter(function(r){return r._include;}).length;
    var dup=state.rows.filter(function(r){return r._dup;}).length;
    tH.innerHTML='<h4>'+state.rows.length+' Bills — <span style="color:#166534">'+sel+' selected</span>'+(dup?' <span style="color:#d97706">('+dup+' duplicates auto-unchecked)</span>':'')+'</h4>';
    var btnD=document.createElement('div');btnD.style.cssText='display:flex;gap:6px';
    var impBtn=el('button',{cls:'btn btn-green btn-sm',text:'✅ Import Selected'});
    impBtn.addEventListener('click',importBills);
    var clrBtn=el('button',{cls:'btn btn-outline btn-sm',text:'🗑 Clear'});
    clrBtn.addEventListener('click',function(){if(confirm('Clear?')){state.rows=[];refresh();}});
    btnD.appendChild(impBtn);btnD.appendChild(clrBtn);tH.appendChild(btnD);tCard.appendChild(tH);

    var tB=document.createElement('div');tB.style.overflow='auto';
    var tbl3=document.createElement('table');tbl3.style.cssText='width:100%;min-width:900px';
    var th3=document.createElement('thead');var hr3=document.createElement('tr');hr3.style.background='#f9fafb';
    var thck3=document.createElement('th');thck3.style.cssText='padding:8px 10px;width:34px';
    var allck3=document.createElement('input');allck3.type='checkbox';allck3.checked=true;
    allck3.style.cssText='width:15px;height:15px;accent-color:#166534;cursor:pointer';
    allck3.addEventListener('change',function(){
      state.rows.forEach(function(r){r._include=allck3.checked;});refresh();
    });
    thck3.appendChild(allck3);hr3.appendChild(thck3);
    ['Bill#','Date','Party','Station','Grades/Items','Wt(kg)','Net Amount','Mode','Broker','Status'].forEach(function(h){
      hr3.appendChild(el('th',{text:h,style:'padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#6b7280;font-weight:700;white-space:nowrap'}));
    });
    th3.appendChild(hr3);tbl3.appendChild(th3);
    var tb3=document.createElement('tbody');

    state.rows.forEach(function(bill,bi){
      var tr3=document.createElement('tr');
      var bg3=!bill._include?'#fafafa':bill._dup?'#fffbeb':'#fff';
      tr3.style.cssText='border-bottom:1px solid #f3f4f6;background:'+bg3+';opacity:'+(bill._include?'1':'0.6');

      var tdck3=document.createElement('td');tdck3.style.padding='6px 10px';
      var rck3=document.createElement('input');rck3.type='checkbox';rck3.checked=bill._include;
      rck3.style.cssText='width:15px;height:15px;accent-color:#166534;cursor:pointer';
      rck3.title=bill._dup?'Duplicate — already exists':'Include this bill';
      rck3.addEventListener('change',function(){
        bill._include=this.checked;
        tr3.style.opacity=this.checked?'1':'0.6';
        tr3.style.background=this.checked?(bill._dup?'#fffbeb':'#fff'):'#fafafa';
      });
      tdck3.appendChild(rck3);tr3.appendChild(tdck3);

      var gradeStr=(bill.rows||[]).map(function(r){return(r.grade||'')+(r.weight?'('+r.weight+'kg)':'');}).filter(Boolean).join(', ')||'-';
      var totalWt=(bill.rows||[]).reduce(function(s,r){return s+(r.weight||0);},0);

      [bill.billNo,bill.date,bill.party,bill.station||'-',gradeStr,totalWt?totalWt+'kg':'-','₹'+fmt(bill.netAmt),bill.billType,bill.broker||'-'].forEach(function(v,vi){
        var td=document.createElement('td');
        td.style.cssText='padding:6px 10px;font-size:'+(vi===4?'11px':'12px')+';'+(vi===2?'font-weight:600;':'')+(vi===6?'color:#166534;font-weight:700;':'');
        td.textContent=String(v);tr3.appendChild(td);
      });

      var tdSt3=document.createElement('td');tdSt3.style.padding='6px 10px';
      if(bill._dup)tdSt3.innerHTML='<span style="background:#fef9c3;color:#92400e;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700">⚠ DUP</span>';
      else if(bill._include)tdSt3.innerHTML='<span style="background:#dcfce7;color:#166534;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700">✓ NEW</span>';
      else tdSt3.innerHTML='<span style="background:#f3f4f6;color:#9ca3af;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700">SKIP</span>';
      tr3.appendChild(tdSt3);
      tb3.appendChild(tr3);
    });

    if(!state.rows.length){var etr3=document.createElement('tr');var etd3=document.createElement('td');etd3.setAttribute('colspan',11);etd3.style.cssText='text-align:center;padding:30px;color:#9ca3af;font-size:12px';etd3.textContent='Koi bills nahi mili.';etr3.appendChild(etd3);tb3.appendChild(etr3);}
    tbl3.appendChild(tb3);tB.appendChild(tbl3);tCard.appendChild(tB);return tCard;
  }

  function importBills() {
    var toImport=state.rows.filter(function(r){return r._include;});
    if(!toImport.length){toast('Koi bill select nahi!','err');return;}
    if(!confirm(toImport.length+' bills to import?'))return;
    toImport.forEach(function(b){
      bills.unshift({id:uid(),billNo:b.billNo,date:b.date,party:b.party,station:b.station||'',
        broker:b.broker||'',transport:b.transport||'',billType:b.billType||'credit',
        gstRate:5,remarks:b.remarks||'',rows:b.rows||[],
        taxable:b.taxable||0,cgst:b.cgst||0,sgst:b.sgst||0,igst:b.igst||0,
        packing:b.packing||0,round:b.round||0,stp:b.stp||0,
        netAmt:b.netAmt||0,createdAt:new Date().toISOString()});
    });
    DB.set('bills',bills);
    toast('✅ '+toImport.length+' bills imported!');
    state.rows=[];
    go('all-bills');
  }
  return wrap;
}


// ═══════════════════════════════════════
// ISSUES & DUPLICATES PAGE
// ═══════════════════════════════════════
function pgDuplicates() {
  var wrap = document.createElement('div');

  // ── Header ──
  var hdr = document.createElement('div');
  hdr.style.cssText = 'margin-bottom:16px';
  hdr.innerHTML = '<h3 style="font-size:16px;font-weight:700;color:#dc2626;margin:0">⚠️ Issues & Duplicates</h3>'+
    '<p style="font-size:12px;color:#6b7280;margin:3px 0 0">Detect and fix duplicate bills, payments, cheques and receipt numbers</p>';
  wrap.appendChild(hdr);

  // ── DETECT ALL ISSUES ──
  var issues = {
    dupBills: [],        // Same bill# or same party+date+amount
    dupPayments: [],     // Same billId + same amount + same date
    dupChequeNo: [],     // Same cheque number in payments or cheques table
    dupReceiptNo: [],    // Same receipt number in payments
    dupChequeRec: [],    // Same cheque# in cheques table
    orphanPayments: [],  // Payments with no matching bill
    billsNoAmt: []       // Bills with netAmt=0 or missing
  };

  // 1. Duplicate Bills (same billNo)
  var billNos = {};
  bills.forEach(function(b){
    var key = String(b.billNo||'').trim();
    if(!key) return;
    if(!billNos[key]) billNos[key] = [];
    billNos[key].push(b);
  });
  Object.keys(billNos).forEach(function(k){
    if(billNos[k].length > 1) issues.dupBills = issues.dupBills.concat(billNos[k]);
  });

  // 2. Duplicate Bills (same party + date + close amount)
  var dupPartyDate = [];
  for(var i=0;i<bills.length;i++){
    for(var j=i+1;j<bills.length;j++){
      var a=bills[i],b2=bills[j];
      if(a.party===b2.party && a.date===b2.date && Math.abs(a.netAmt-b2.netAmt)<1){
        if(dupPartyDate.indexOf(a)===-1)dupPartyDate.push(a);
        if(dupPartyDate.indexOf(b2)===-1)dupPartyDate.push(b2);
      }
    }
  }
  // Merge into dupBills only if not already there
  dupPartyDate.forEach(function(b3){if(issues.dupBills.indexOf(b3)===-1)issues.dupBills.push(b3);});

  // 3. Duplicate Payments (same billId + same amount + same date)
  var payKeys = {};
  payments.forEach(function(p){
    var key = (p.billId||'')+':'+Math.round(p.amount||0)+':'+p.date;
    if(!payKeys[key]) payKeys[key]=[];
    payKeys[key].push(p);
  });
  Object.keys(payKeys).forEach(function(k){
    if(payKeys[k].length>1) issues.dupPayments = issues.dupPayments.concat(payKeys[k]);
  });

  // 4. Duplicate Cheque No in payments
  var chqNos = {};
  payments.forEach(function(p){
    var c=(p.chequeNo||'').trim();
    if(!c||c==='-')return;
    if(!chqNos[c])chqNos[c]=[];
    chqNos[c].push(p);
  });
  Object.keys(chqNos).forEach(function(k){
    if(chqNos[k].length>1) issues.dupChequeNo = issues.dupChequeNo.concat(chqNos[k]);
  });

  // 5. Duplicate Receipt No in payments
  var rcptNos = {};
  payments.forEach(function(p){
    var r=(p.receiptNo||'').trim();
    if(!r||r==='-'||r.length<4)return;
    if(!rcptNos[r])rcptNos[r]=[];
    rcptNos[r].push(p);
  });
  Object.keys(rcptNos).forEach(function(k){
    if(rcptNos[k].length>1) issues.dupReceiptNo = issues.dupReceiptNo.concat(rcptNos[k]);
  });

  // 6. Duplicate cheque# in cheques table
  var chqTabNos = {};
  cheques.forEach(function(c){
    var cn=(c.chequeNo||'').trim();
    if(!cn)return;
    if(!chqTabNos[cn])chqTabNos[cn]=[];
    chqTabNos[cn].push(c);
  });
  Object.keys(chqTabNos).forEach(function(k){
    if(chqTabNos[k].length>1) issues.dupChequeRec = issues.dupChequeRec.concat(chqTabNos[k]);
  });

  // 7. Orphan payments (billId not in bills)
  var billIds = new Set(bills.map(function(b){return b.id;}));
  payments.forEach(function(p){
    if(p.billId && !billIds.has(p.billId)) issues.orphanPayments.push(p);
  });

  // 8. Bills with zero/missing amount
  bills.forEach(function(b){
    if(!b.netAmt || b.netAmt<=0) issues.billsNoAmt.push(b);
  });

  // ── Summary cards ──
  var total = issues.dupBills.length + issues.dupPayments.length + issues.dupChequeNo.length +
    issues.dupReceiptNo.length + issues.dupChequeRec.length + issues.orphanPayments.length + issues.billsNoAmt.length;

  var sumGrid = document.createElement('div');
  sumGrid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px';
  [
    {l:'Total Issues', v:total, c:total>0?'#dc2626':'#166534', bg:total>0?'#fff1f2':'#f0fdf4'},
    {l:'Duplicate Bills', v:issues.dupBills.length, c:'#dc2626', bg:'#fff1f2'},
    {l:'Duplicate Payments', v:issues.dupPayments.length, c:'#d97706', bg:'#fffbeb'},
    {l:'Cheque/Receipt Dup', v:issues.dupChequeNo.length+issues.dupChequeRec.length+issues.dupReceiptNo.length, c:'#7c3aed', bg:'#f5f3ff'},
  ].forEach(function(s){
    var d=document.createElement('div');
    d.style.cssText='background:'+s.bg+';border:1px solid '+s.c+';border-radius:10px;padding:14px;';
    d.innerHTML='<div style="font-size:10px;font-weight:700;color:'+s.c+';text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">'+s.l+'</div>'+
      '<div style="font-size:24px;font-weight:700;color:'+s.c+'">'+s.v+'</div>';
    sumGrid.appendChild(d);
  });
  wrap.appendChild(sumGrid);

  if(total===0){
    var okDiv=document.createElement('div');
    okDiv.style.cssText='background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:40px;text-align:center;color:#166534';
    okDiv.innerHTML='<div style="font-size:40px;margin-bottom:10px">✅</div><div style="font-size:16px;font-weight:700">No issues found!</div><div style="font-size:13px;margin-top:4px;opacity:.7">All data is clean.</div>';
    wrap.appendChild(okDiv);
    return wrap;
  }

  // ── Helper: build issue section ──
  function mkSection(title, icon, color, bg, rows, cols, onDelete, onEdit) {
    if(!rows.length) return null;
    var selected=new Set();
    var sec = document.createElement('div');
    sec.className = 'card';
    sec.style.marginBottom = '14px';
    var head = document.createElement('div');
    head.className = 'card-head';
    head.style.cssText='display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 14px';

    var titleEl=document.createElement('div');
    titleEl.innerHTML='<h4 style="color:'+color+';margin:0">'+icon+' '+title+' <span style="background:'+bg+';color:'+color+';padding:2px 8px;border-radius:12px;font-size:11px;margin-left:6px">'+rows.length+'</span></h4>';

    var headBtns=document.createElement('div');headBtns.style.cssText='display:flex;gap:6px;align-items:center';
    var selCountSpan=document.createElement('span');selCountSpan.style.cssText='font-size:12px;color:#6b7280;display:none';

    if(onDelete){
      var bulkDelBtn=el('button',{cls:'btn btn-red btn-sm',text:'🗑 Delete Selected',style:'display:none'});
      bulkDelBtn.addEventListener('click',function(){
        if(!selected.size)return;
        if(!confirm('Selected '+selected.size+' items delete karne chahte ho?'))return;
        var toDelete=Array.from(selected);
        toDelete.forEach(function(i){onDelete(rows[i],i);});
        refresh();
      });
      headBtns.appendChild(selCountSpan);
      headBtns.appendChild(bulkDelBtn);
    }

    head.appendChild(titleEl);head.appendChild(headBtns);sec.appendChild(head);

    function updateSelUI(){
      var n=selected.size;
      if(selCountSpan)selCountSpan.style.display=n>0?'':'none';
      if(selCountSpan)selCountSpan.textContent=n+' selected';
      if(onDelete&&bulkDelBtn)bulkDelBtn.style.display=n>0?'':'none';
    }

    var tOuter = document.createElement('div');tOuter.style.overflow='auto';
    var tbl = document.createElement('table');tbl.style.width='100%';
    var th2 = document.createElement('thead');var htr = document.createElement('tr');
    htr.style.background = '#f9fafb';

    // Checkbox header
    if(onDelete){
      var thChk=document.createElement('th');
      thChk.style.cssText='padding:8px 10px;width:34px;position:sticky;top:0;z-index:2;background:#f9fafb';
      var allChk2=document.createElement('input');allChk2.type='checkbox';
      allChk2.style.cssText='accent-color:#dc2626;width:14px;height:14px;cursor:pointer';
      allChk2.title='Select All';
      allChk2.addEventListener('change',function(){
        if(this.checked)rows.forEach(function(r,i){selected.add(i);});
        else selected.clear();
        tbl.querySelectorAll('.dup-row-chk').forEach(function(c,i){c.checked=selected.has(i);});
        updateSelUI();
      });
      thChk.appendChild(allChk2);htr.appendChild(thChk);
    }

    cols.concat([{l:'Actions'}]).forEach(function(c){
      var th3=document.createElement('th');
      th3.style.cssText='padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#6b7280;font-weight:700;white-space:nowrap;position:sticky;top:0;z-index:2;background:#f9fafb';
      th3.textContent=c.l;htr.appendChild(th3);
    });
    th2.appendChild(htr);tbl.appendChild(th2);
    var tb2 = document.createElement('tbody');

    rows.forEach(function(row, ri){
      var tr2 = document.createElement('tr');
      tr2.style.cssText='border-bottom:1px solid #f3f4f6;background:'+(ri%2?'#fafafa':'#fff');

      // Row checkbox
      if(onDelete){
        var tdChk=document.createElement('td');tdChk.style.cssText='padding:7px 10px';
        var rchk=document.createElement('input');rchk.type='checkbox';rchk.className='dup-row-chk';
        rchk.style.cssText='accent-color:#dc2626;width:14px;height:14px;cursor:pointer';
        rchk.addEventListener('change',function(){
          if(this.checked)selected.add(ri);else selected.delete(ri);
          allChk2.checked=selected.size===rows.length;
          allChk2.indeterminate=selected.size>0&&selected.size<rows.length;
          updateSelUI();
        });
        tdChk.appendChild(rchk);tr2.appendChild(tdChk);
      }

      cols.forEach(function(c){
        var td=document.createElement('td');td.style.cssText='padding:7px 10px;font-size:12px';
        if(c.html) td.innerHTML=c.html(row);
        else td.textContent=c.val(row)||'-';
        if(c.num)td.style.textAlign='right';
        tr2.appendChild(td);
      });
      // Actions td
      var actTd=document.createElement('td');actTd.style.cssText='padding:7px 10px;white-space:nowrap';
      if(onEdit){
        var editBtn=el('button',{cls:'btn btn-xs btn-blue',text:'✏️ Edit'});
        editBtn.addEventListener('click',function(){onEdit(row,ri);});
        actTd.appendChild(editBtn);
      }
      if(onDelete){
        var delBtn=el('button',{cls:'btn btn-xs btn-red',style:'margin-left:4px',text:'🗑'});
        delBtn.title='Delete this entry';
        delBtn.addEventListener('click',function(){
          if(!confirm('Delete karna chahte ho?')) return;
          onDelete(row,ri);
          refresh();
        });
        actTd.appendChild(delBtn);
      }
      tr2.appendChild(actTd);
      tb2.appendChild(tr2);
    });
    tbl.appendChild(tb2);tOuter.appendChild(tbl);sec.appendChild(tOuter);
    return sec;
  }

  // ── 1. DUPLICATE BILLS ──
  var dupBillSec = mkSection(
    'Duplicate Bills', '📋', '#dc2626', '#fee2e2',
    issues.dupBills,
    [
      {l:'Bill#', val:function(b){return b.billNo||'-';}},
      {l:'Date', val:function(b){return fmtDate(b.date);}},
      {l:'Party', html:function(b){return '<strong>'+b.party+'</strong>';}},
      {l:'Net Amount', val:function(b){return '₹'+fmt(b.netAmt);}, num:true},
      {l:'Status', html:function(b){var bs=getBillStatus(b);return '<span class="badge b-'+bs.status+'">'+bs.status.toUpperCase()+'</span>';}},
    ],
    function(b){ // delete
      bills = bills.filter(function(x){return x.id!==b.id;});
      // also delete related payments
      payments = payments.filter(function(p){return p.billId!==b.id;});
      DB.set('bills',bills); DB.set('payments',payments);
      toast('Bill deleted');
    },
    function(b){ // edit
      openEditBill(b);
    }
  );
  if(dupBillSec) wrap.appendChild(dupBillSec);

  // ── 2. DUPLICATE PAYMENTS ──
  var dupPaySec = mkSection(
    'Duplicate Payments', '💰', '#d97706', '#fef9c3',
    issues.dupPayments,
    [
      {l:'Bill#', val:function(p){var b=bills.find(function(x){return x.id===p.billId;});return b?b.billNo:'-';}},
      {l:'Party', html:function(p){var b=bills.find(function(x){return x.id===p.billId;});return '<strong>'+(b?b.party:'-')+'</strong>';}},
      {l:'Date', val:function(p){return fmtDate(p.date);}},
      {l:'Amount', val:function(p){return '₹'+fmt(p.amount||0);}, num:true},
      {l:'Mode', val:function(p){return p.mode||'-';}},
      {l:'Cheque No', val:function(p){return p.chequeNo||'-';}},
      {l:'Receipt No', val:function(p){return p.receiptNo||'-';}},
    ],
    function(p){ // delete
      payments = payments.filter(function(x){return x.id!==p.id;});
      DB.set('payments',payments); toast('Payment deleted');
    },
    function(p){ // edit
      openEditPayment(p);
    }
  );
  if(dupPaySec) wrap.appendChild(dupPaySec);

  // ── 3. DUPLICATE CHEQUE NO IN PAYMENTS ──
  var dupChqPaySec = mkSection(
    'Duplicate Cheque No. (Payments)', '🔢', '#7c3aed', '#f5f3ff',
    issues.dupChequeNo,
    [
      {l:'Cheque No', html:function(p){return '<strong style="color:#7c3aed">'+(p.chequeNo||'-')+'</strong>';}},
      {l:'Party', val:function(p){var b=bills.find(function(x){return x.id===p.billId;});return b?b.party:'-';}},
      {l:'Date', val:function(p){return fmtDate(p.date);}},
      {l:'Amount', val:function(p){return '₹'+fmt(p.amount||0);}, num:true},
    ],
    function(p){payments=payments.filter(function(x){return x.id!==p.id;});DB.set('payments',payments);toast('Payment deleted');},
    function(p){openEditPayment(p);}
  );
  if(dupChqPaySec) wrap.appendChild(dupChqPaySec);

  // ── 4. DUPLICATE RECEIPT NO ──
  var dupRcptSec = mkSection(
    'Duplicate Receipt No. (Payments)', '🧾', '#0369a1', '#e0f2fe',
    issues.dupReceiptNo,
    [
      {l:'Receipt No', html:function(p){return '<strong style="color:#0369a1">'+(p.receiptNo||'-')+'</strong>';}},
      {l:'Party', val:function(p){var b=bills.find(function(x){return x.id===p.billId;});return b?b.party:'-';}},
      {l:'Date', val:function(p){return fmtDate(p.date);}},
      {l:'Amount', val:function(p){return '₹'+fmt(p.amount||0);}, num:true},
      {l:'Mode', val:function(p){return p.mode||'-';}},
    ],
    function(p){payments=payments.filter(function(x){return x.id!==p.id;});DB.set('payments',payments);toast('Payment deleted');},
    function(p){openEditPayment(p);}
  );
  if(dupRcptSec) wrap.appendChild(dupRcptSec);

  // ── 5. DUPLICATE CHEQUE# IN CHEQUES TABLE ──
  var dupChqTabSec = mkSection(
    'Duplicate Cheque No. (Cheques Register)', '🏦', '#7c3aed', '#f5f3ff',
    issues.dupChequeRec,
    [
      {l:'Cheque No', html:function(c){return '<strong style="color:#7c3aed">'+(c.chequeNo||'-')+'</strong>';}},
      {l:'Party', html:function(c){return '<strong>'+c.party+'</strong>';}},
      {l:'Date', val:function(c){return fmtDate(c.date);}},
      {l:'Amount', val:function(c){return '₹'+fmt(c.amount||0);}, num:true},
      {l:'Bank', val:function(c){return c.bank||'-';}},
      {l:'Status', html:function(c){return '<span class="badge b-'+(c.status==='Cleared'?'paid':c.status==='Bounced'?'bounced':c.status==='Deposited'?'partial':'pending')+'">'+c.status+'</span>';}},
    ],
    function(c){cheques=cheques.filter(function(x){return x.id!==c.id;});DB.set('cheques',cheques);toast('Cheque deleted');},
    function(c){openEditCheque(c);}
  );
  if(dupChqTabSec) wrap.appendChild(dupChqTabSec);

  // ── 6. ORPHAN PAYMENTS ──
  var orphanSec = mkSection(
    'Orphan Payments (Bill not found)', '👻', '#6b7280', '#f3f4f6',
    issues.orphanPayments,
    [
      {l:'Bill ID (missing)', val:function(p){return (p.billId||'-').substring(0,12)+'...';}},
      {l:'Date', val:function(p){return fmtDate(p.date);}},
      {l:'Amount', val:function(p){return '₹'+fmt(p.amount||0);}, num:true},
      {l:'Mode', val:function(p){return p.mode||'-';}},
      {l:'Receipt', val:function(p){return p.receiptNo||'-';}},
    ],
    function(p){payments=payments.filter(function(x){return x.id!==p.id;});DB.set('payments',payments);toast('Orphan payment deleted');},
    null
  );
  if(orphanSec) wrap.appendChild(orphanSec);

  // ── 7. BILLS WITH ZERO AMOUNT ──
  var zeroAmtSec = mkSection(
    'Bills with Zero/Missing Amount', '🚫', '#374151', '#f9fafb',
    issues.billsNoAmt,
    [
      {l:'Bill#', val:function(b){return b.billNo||'-';}},
      {l:'Date', val:function(b){return fmtDate(b.date);}},
      {l:'Party', html:function(b){return '<strong>'+b.party+'</strong>';}},
      {l:'Net Amount', val:function(b){return '₹'+fmt(b.netAmt||0);}, num:true},
    ],
    function(b){bills=bills.filter(function(x){return x.id!==b.id;});DB.set('bills',bills);toast('Bill deleted');},
    function(b){openEditBill(b);}
  );
  if(zeroAmtSec) wrap.appendChild(zeroAmtSec);

  return wrap;
}

// ── EDIT PAYMENT MODAL ──
function openEditPayment(p) {
  var b = bills.find(function(x){return x.id===p.billId;})||{};
  var body = document.createElement('div');
  body.className = 'grid g2';
  body.style.gap = '10px';

  function mkF3(lbl,id,type,val,ph){
    var d=document.createElement('div');d.className='fg';
    var l=document.createElement('label');l.textContent=lbl;
    var i=el('input',{cls:'inp',type:type||'text',id:id});
    if(val!==undefined)i.value=val;if(ph)i.placeholder=ph;
    d.appendChild(l);d.appendChild(i);return d;
  }
  function mkFS3(lbl,id,opts,val){
    var d=document.createElement('div');d.className='fg';
    var l=document.createElement('label');l.textContent=lbl;
    var s2=document.createElement('select');s2.className='inp';s2.id=id;
    opts.forEach(function(o){var opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o===val)opt.selected=true;s2.appendChild(opt);});
    d.appendChild(l);d.appendChild(s2);return d;
  }

  // Info bar
  var info=document.createElement('div');
  info.style.cssText='grid-column:span 2;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:4px';
  info.innerHTML='<strong>Bill:</strong> '+(b.billNo||'-')+' &nbsp;|&nbsp; <strong>Party:</strong> '+(b.party||'-')+' &nbsp;|&nbsp; <strong>Bill Amt:</strong> ₹'+fmt(b.netAmt||0);
  body.appendChild(info);

  [mkF3('Amount (₹)','ep-amt','number',p.amount||0),
   mkF3('Rebate (₹)','ep-reb','number',p.rebate||0),
   mkF3('Date','ep-date','text',fmtDate(p.date),'DD-MM-YYYY'),
   mkFS3('Mode','ep-mode',['NEFT','RTGS','CHEQUE','IMPS','UPI','CASH'],p.mode||'NEFT'),
   mkF3('Cheque No','ep-chq','text',p.chequeNo||'','Optional'),
   mkF3('Receipt No','ep-rcpt','text',p.receiptNo||'','Optional')
  ].forEach(function(f){body.appendChild(f);});
  var rmkF=mkF3('Remarks','ep-rmk','text',p.remarks||'','Optional');rmkF.style.gridColumn='span 2';body.appendChild(rmkF);

  openModal('Edit Payment — '+(b.party||''), body, [{label:'Save', fn:function(){
    var amt=parseFloat(gv('ep-amt'))||0;
    if(!amt){toast('Amount required!','err');return;}
    p.amount=amt;
    p.rebate=parseFloat(gv('ep-reb'))||0;
    p.date=gv('ep-date');
    p.mode=gv('ep-mode');
    p.chequeNo=gv('ep-chq');
    p.receiptNo=gv('ep-rcpt');
    p.remarks=gv('ep-rmk');
    DB.set('payments',payments);
    toast('Payment updated!');
    closeModal();
    go('duplicates');
  }}]);
}

// ── EDIT CHEQUE MODAL ──
function openEditCheque(c) {
  var body=document.createElement('div');body.className='grid g2';body.style.gap='10px';
  function mkF4(lbl,id,type,val,ph){var d=document.createElement('div');d.className='fg';var l=document.createElement('label');l.textContent=lbl;var i=el('input',{cls:'inp',type:type||'text',id:id});if(val!==undefined)i.value=val;if(ph)i.placeholder=ph;d.appendChild(l);d.appendChild(i);return d;}
  function mkFS4(lbl,id,opts,val){var d=document.createElement('div');d.className='fg';var l=document.createElement('label');l.textContent=lbl;var s2=document.createElement('select');s2.className='inp';s2.id=id;opts.forEach(function(o){var opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o===val)opt.selected=true;s2.appendChild(opt);});d.appendChild(l);d.appendChild(s2);return d;}
  [mkF4('Party','ec-party','text',c.party||''),
   mkF4('Cheque No','ec-chqno','text',c.chequeNo||''),
   mkF4('Bank','ec-bank','text',c.bank||''),
   mkF4('Amount','ec-amt','number',c.amount||0),
   mkF4('Date','ec-date','text',fmtDate(c.date),'DD-MM-YYYY'),
   mkFS4('Status','ec-status',['Received','Deposited','Cleared','Bounced'],c.status||'Received')
  ].forEach(function(f){body.appendChild(f);});
  openModal('Edit Cheque',body,[{label:'Save',fn:function(){
    c.party=(gv('ec-party')||'').toUpperCase().trim();
    c.chequeNo=gv('ec-chqno');c.bank=gv('ec-bank');
    c.amount=parseFloat(gv('ec-amt'))||0;c.date=gv('ec-date');c.status=gv('ec-status');
    DB.set('cheques',cheques);toast('Cheque updated!');closeModal();go('duplicates');
  }}]);
}



// ═══════════════════════════════════════
// INTEREST CALCULATOR
// ═══════════════════════════════════════
function pgInterest() {
  var cfg2=DB.getObj('intCfg',{rate:24,freeDays:7});
  var state=pageState.int=pageState.int||{
    partyFilter:'',dateFrom:'',dateTo:'',
    showPaid:false,          // show paid bills too
    payDateAdj:{},           // per-payment adjusted date: payId -> DD-MM-YYYY
    selectedBills:new Set()  // empty = all, else only these billIds
  };
  var wrap=document.createElement('div');

  // ── SETTINGS CARD ──
  var setCard=document.createElement('div');setCard.className='card';setCard.style.marginBottom='12px';
  var setH=document.createElement('div');setH.className='card-head';
  setH.innerHTML='<h4>Interest Settings</h4>';
  setCard.appendChild(setH);
  var setB=document.createElement('div');setB.style.cssText='padding:14px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap';

  function mkFld(lbl,id,type,val,ph,w){
    var d=document.createElement('div');d.className='fg';d.style.minWidth=w||'130px';
    var l=document.createElement('label');l.textContent=lbl;
    var i2=el('input',{cls:'inp-sm',type:type||'text',id:id,style:'width:100%'});
    i2.value=val||'';if(ph)i2.placeholder=ph;
    d.appendChild(l);d.appendChild(i2);return d;
  }
  [mkFld('Interest Rate (% p.a.)','int-rate','number',cfg2.rate||24,'24','140px'),
   mkFld('Free Days (no interest)','int-free','number',cfg2.freeDays||7,'7','140px'),
   mkFld('Calculate As Of','int-asof','text',today(),'DD-MM-YYYY','140px'),
   mkFld('Bill Date From','int-dfrom','text',state.dateFrom||'','DD-MM-YYYY','140px'),
   mkFld('Bill Date To','int-dto','text',state.dateTo||'','DD-MM-YYYY','140px'),
  ].forEach(function(f){setB.appendChild(f);});

  // Show Paid Bills toggle
  var paidToggleDiv=document.createElement('div');paidToggleDiv.className='fg';paidToggleDiv.style.minWidth='150px';
  var paidLabel=document.createElement('label');paidLabel.textContent='Include Paid Bills';
  var paidChk=document.createElement('input');paidChk.type='checkbox';paidChk.id='int-show-paid';
  paidChk.checked=state.showPaid;paidChk.style.cssText='width:18px;height:18px;accent-color:var(--brand);cursor:pointer;margin-top:4px';
  var paidHint=document.createElement('div');paidHint.style.cssText='font-size:10px;color:#6b7280;margin-top:2px';
  paidHint.textContent='Paid bills: interest till last payment';
  paidToggleDiv.appendChild(paidLabel);paidToggleDiv.appendChild(paidChk);paidToggleDiv.appendChild(paidHint);
  setB.appendChild(paidToggleDiv);

  var applyBtn=el('button',{cls:'btn btn-green',text:'Apply'});
  applyBtn.addEventListener('click',function(){
    cfg2.rate=parseFloat(gv('int-rate'))||24;
    cfg2.freeDays=parseInt(gv('int-free'))||7;
    state.dateFrom=gv('int-dfrom')||'';
    state.dateTo=gv('int-dto')||'';
    state.showPaid=document.getElementById('int-show-paid').checked;
    DB.setObj('intCfg',cfg2);
    refresh();
  });
  setB.appendChild(applyBtn);setCard.appendChild(setB);wrap.appendChild(setCard);

  // ── FILTER BAR ──
  var fBar=document.createElement('div');fBar.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap';
  var allPartiesInt=Array.from(new Set(bills.filter(function(b){
    return state.showPaid?true:getBillStatus(b).status!=='paid';
  }).map(function(b){return b.party;}))).sort();
  var partySel=document.createElement('select');partySel.className='inp-sm';partySel.style.width='200px';
  var defOpt=document.createElement('option');defOpt.value='';defOpt.textContent='-- All Parties --';partySel.appendChild(defOpt);
  allPartiesInt.forEach(function(p){var opt=document.createElement('option');opt.value=p;opt.textContent=p;if(p===state.partyFilter)opt.selected=true;partySel.appendChild(opt);});
  partySel.addEventListener('change',function(){state.partyFilter=this.value;state.selectedBills=new Set();refresh();});
  var pSearch=el('input',{cls:'inp-sm',type:'text',placeholder:'Search party...',value:state.partyFilter||'',style:'width:150px'});
  var pTimer=null;
  pSearch.addEventListener('input',function(){state.partyFilter=this.value;partySel.value='';var pos=this.selectionStart;var self=this;clearTimeout(pTimer);pTimer=setTimeout(function(){refresh();setTimeout(function(){var e=document.querySelector('[placeholder="Search party..."]');if(e){e.focus();try{e.setSelectionRange(pos,pos);}catch(ex){}}},10);},150);});
  var viewLedgerBtn=el('button',{cls:'btn btn-outline btn-sm',text:'View Ledger'});
  viewLedgerBtn.addEventListener('click',function(){var party=partySel.value||state.partyFilter;if(!party){toast('Pehle party select karo!','err');return;}pageState.ledgerParty=party;pageState.ledgerReturnPage='interest';go('ledger');});
  var intPrintBtn=el('button',{cls:'btn btn-outline btn-sm',text:'Print'});
  intPrintBtn.addEventListener('click',function(){printInterestStatement();});
  var intExcelBtn=el('button',{cls:'btn btn-outline btn-sm',text:'Excel'});
  intExcelBtn.addEventListener('click',function(){exportInterestExcel();});
  fBar.appendChild(el('span',{text:'Party:',style:'font-size:12px;color:#6b7280'}));
  fBar.appendChild(partySel);fBar.appendChild(pSearch);fBar.appendChild(viewLedgerBtn);
  fBar.appendChild(intPrintBtn);fBar.appendChild(intExcelBtn);
  wrap.appendChild(fBar);

  // ── SETUP ──
  var asOfStr=gv('int-asof')||today();
  var asOf=new Date(toISO(asOfStr)||new Date().toISOString().split('T')[0]);
  var rate=cfg2.rate||24;
  var freeDays=cfg2.freeDays||7;
  var q2=(state.partyFilter||'').toLowerCase();
  var dfrom=state.dateFrom?toISO(state.dateFrom):'';
  var dto=state.dateTo?toISO(state.dateTo):'';

  // Filter bills: outstanding always, paid only if showPaid=true
  var filteredBills=bills.filter(function(b){
    var s=getBillStatus(b);
    if(!state.showPaid && s.status==='paid') return false;
    if(q2&&!b.party.toLowerCase().includes(q2)) return false;
    if(dfrom&&toISO(b.date||'')<dfrom) return false;
    if(dto&&toISO(b.date||'')>dto) return false;
    return true;
  });

  // Group by party
  var partyMap={};
  filteredBills.forEach(function(b){if(!partyMap[b.party])partyMap[b.party]=[];partyMap[b.party].push(b);});

  var grandTotBal=0,grandTotInt=0;

  // ── INTEREST CALCULATION FUNCTION ──
  // For a bill: calculate interest using running balance method
  // Paid bill: end date = last payment date (not asOf)
  // Outstanding: end date = asOf
  function calcBillInterest(b) {
    var s=getBillStatus(b);
    var bPays=payments.filter(function(p){return p.billId===b.id;})
      .map(function(p){
        var adjStr=state.payDateAdj[p.id]||'';
        return {
          id:p.id, amount:p.amount+(p.rebate||0),
          origDate:p.date, adjDate:adjStr,
          date:new Date(toISO(adjStr||p.date||today())),
          mode:p.mode||'', receipt:p.receiptNo||p.chequeNo||''
        };
      }).sort(function(a,b2){return a.date-b2.date;});

    var billDate=new Date(toISO(b.date||today()));
    // For paid bills: calculate till last payment date
    var isPaid=s.status==='paid';
    var endDate=asOf;
    if(isPaid && bPays.length>0){
      endDate=bPays[bPays.length-1].date;
    }

    var prevDate=new Date(billDate);
    var prevBal=b.netAmt;
    var totalInterest=0;
    var schedule=[];
    var freeDaysUsed=false;

    // Process each payment
    bPays.forEach(function(p){
      if(p.date<=prevDate) return; // skip if before bill date
      var days=Math.max(0,Math.floor((p.date-prevDate)/86400000));
      var fta=freeDaysUsed?0:freeDays;
      var intDays=Math.max(0,days-fta);
      if(days>0) freeDaysUsed=true;
      var periodInt=Math.round(prevBal*(rate/100)*(intDays/365)*100)/100;
      if(intDays>0&&prevBal>0) totalInterest+=periodInt;
      schedule.push({
        from:new Date(prevDate),to:new Date(p.date),
        bal:prevBal,days:days,intDays:intDays,int:periodInt,
        label:'Payment ₹'+fmt(p.amount)+(p.mode?' ('+p.mode+')':'')
      });
      prevBal=Math.max(0,prevBal-p.amount);
      prevDate=new Date(p.date);
    });

    // Final period: last event → endDate
    if(prevBal>0 && endDate>prevDate){
      var finalDays=Math.max(0,Math.floor((endDate-prevDate)/86400000));
      // Apply free days if not yet consumed (e.g. no payments at all)
      var finalFta=freeDaysUsed?0:freeDays;
      var finalIntDays=Math.max(0,finalDays-finalFta);
      var finalInt=Math.round(prevBal*(rate/100)*(finalIntDays/365)*100)/100;
      if(finalIntDays>0) totalInterest+=finalInt;
      schedule.push({
        from:new Date(prevDate),to:new Date(endDate),
        bal:prevBal,days:finalDays,intDays:finalIntDays,int:finalInt,
        label:isPaid?'(Closed)':'Outstanding'
      });
    }

    return {interest:totalInterest,schedule:schedule,bPays:bPays,isPaid:isPaid,endDate:endDate};
  }

  // ── RENDER EACH PARTY ──
  Object.keys(partyMap).sort().forEach(function(party){
    var pBills=partyMap[party].sort(function(a,b2){return toISO(a.date||'').localeCompare(toISO(b2.date||''));});
    var partyCard=document.createElement('div');partyCard.className='card';partyCard.style.marginBottom='10px';

    // Party header with outstanding + total interest
    var pDue=pBills.filter(function(b){return getBillStatus(b).status!=='paid';}).reduce(function(s,b){return s+getBillStatus(b).bal;},0);
    var pHead=document.createElement('div');pHead.className='card-head';
    pHead.innerHTML='<h4 style="color:var(--brand)">'+party+'</h4>'+
      '<span style="font-size:12px;color:var(--red)">Outstanding: <strong>₹'+fmt(pDue)+'</strong></span>';
    partyCard.appendChild(pHead);

    var tOuter=document.createElement('div');tOuter.style.overflow='auto';
    var tbl=document.createElement('table');tbl.style.width='100%';
    var thead=document.createElement('thead');var htr=document.createElement('tr');htr.style.background='#f9fafb';
    ['','Bill#','Date','Net Amt','Balance','Payment Dates (editable)','Period','Int Days','Interest (₹)','Action'].forEach(function(h){
      var th=document.createElement('th');th.style.cssText='padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:#6b7280;font-weight:700;white-space:nowrap';
      th.textContent=h;htr.appendChild(th);
    });
    thead.appendChild(htr);tbl.appendChild(thead);
    var tbody=document.createElement('tbody');
    var partyTotBal=0,partyTotInt=0;

    pBills.forEach(function(b){
      var s=getBillStatus(b);
      var calc=calcBillInterest(b);
      partyTotBal+=s.bal;partyTotInt+=calc.interest;

      var tr2=document.createElement('tr');
      var rowBg=calc.isPaid?'#f0fdf4':'#fff';
      tr2.style.cssText='border-bottom:1px solid #f3f4f6;background:'+rowBg;

      // Checkbox
      var chkTd=document.createElement('td');chkTd.style.cssText='padding:7px 8px;width:30px';
      var billChk=document.createElement('input');billChk.type='checkbox';
      billChk.checked=state.selectedBills.size===0||state.selectedBills.has(b.id);
      billChk.style.cssText='accent-color:var(--brand);width:14px;height:14px;cursor:pointer';
      billChk.addEventListener('change',function(){
        if(this.checked){state.selectedBills.delete(b.id);}
        else{state.selectedBills.add(b.id);}
        tr2.style.opacity=this.checked?'1':'0.4';
      });
      chkTd.appendChild(billChk);tr2.appendChild(chkTd);

      // Bill# + paid badge
      var td0=document.createElement('td');td0.style.cssText='padding:7px 10px;font-weight:600;font-size:12px;white-space:nowrap';
      td0.innerHTML=b.billNo||'-';
      if(calc.isPaid){td0.innerHTML+=' <span style="font-size:9px;background:#dcfce7;color:#166534;padding:1px 5px;border-radius:8px;font-weight:700">PAID</span>';}
      tr2.appendChild(td0);

      // Bill Date
      var td1=document.createElement('td');td1.style.cssText='padding:7px 10px;font-size:12px;white-space:nowrap';td1.textContent=fmtDate(b.date);tr2.appendChild(td1);
      // Net Amt
      var td2=document.createElement('td');td2.style.cssText='padding:7px 10px;text-align:right;font-size:12px';td2.textContent='₹'+fmt(b.netAmt);tr2.appendChild(td2);
      // Balance
      var td3=document.createElement('td');td3.style.cssText='padding:7px 10px;text-align:right;font-size:12px;color:'+(s.bal>0.5?'var(--red)':'var(--brand)')+';font-weight:700';
      td3.textContent=s.bal>0.5?'₹'+fmt(s.bal):'CLEAR';tr2.appendChild(td3);

      // Payment dates — editable for interest calc
      var td4=document.createElement('td');td4.style.cssText='padding:7px 10px;min-width:200px';
      var payHist=document.createElement('div');
      if(calc.bPays.length===0){
        payHist.innerHTML='<span style="color:#9ca3af;font-size:11px">No payments</span>';
      } else {
        calc.bPays.forEach(function(p){
          var pRow=document.createElement('div');pRow.style.cssText='display:flex;align-items:center;gap:5px;margin-bottom:4px';
          var adjInp=document.createElement('input');adjInp.type='text';adjInp.className='inp-sm';
          adjInp.style.cssText='width:95px;font-size:11px;height:24px;'+(p.adjDate?'border-color:var(--brand);background:#f0fdf4':'');
          adjInp.value=p.adjDate||fmtDate(p.origDate);
          adjInp.title='Interest calculation ke liye date adjust karo (cheque clearing date, etc.)';
          adjInp.addEventListener('change',function(){
            var newDate=this.value.trim();
            var origFmt=fmtDate(p.origDate);
            if(newDate===origFmt){delete state.payDateAdj[p.id];this.style.borderColor='';this.style.background='';}
            else{state.payDateAdj[p.id]=newDate;this.style.borderColor='var(--brand)';this.style.background='#f0fdf4';}
            refresh();
          });
          var pAmt=document.createElement('span');pAmt.style.cssText='font-size:11px;color:#374151;white-space:nowrap';
          pAmt.innerHTML='₹'+fmt(p.amount)+(p.mode?' <span style="background:#e0f2fe;color:#0369a1;padding:1px 4px;border-radius:6px;font-size:9px;font-weight:600">'+p.mode+'</span>':'');
          if(p.adjDate){
            var revert=document.createElement('button');revert.textContent='↩';revert.style.cssText='background:none;border:none;cursor:pointer;color:var(--red);font-size:12px;padding:0 2px';revert.title='Original date';
            revert.addEventListener('click',function(){delete state.payDateAdj[p.id];refresh();});
            pRow.appendChild(revert);
          }
          pRow.appendChild(adjInp);pRow.appendChild(pAmt);payHist.appendChild(pRow);
        });
      }
      td4.appendChild(payHist);tr2.appendChild(td4);

      // Period info — from/to
      var td5=document.createElement('td');td5.style.cssText='padding:7px 10px;font-size:11px;color:#6b7280;white-space:nowrap';
      td5.textContent=fmtDate(b.date)+' → '+fmtDate(calc.endDate.toISOString().split('T')[0].replace(/(\d{4})-(\d{2})-(\d{2})/,'$3-$2-$1'));
      tr2.appendChild(td5);

      // Total interest days
      var totIntDays=calc.schedule.reduce(function(s2,e){return s2+e.intDays;},0);
      var td6=document.createElement('td');td6.style.cssText='padding:7px 10px;text-align:right;font-size:12px';
      // Show schedule tooltip
      var schTip=calc.schedule.filter(function(s2){return s2.intDays>0;}).map(function(s2){
        var fd=s2.from.toISOString().split('T')[0];var td2=s2.to.toISOString().split('T')[0];
        return fmtDate(fd.replace(/(\d{4})-(\d{2})-(\d{2})/,'$3-$2-$1'))+' → '+fmtDate(td2.replace(/(\d{4})-(\d{2})-(\d{2})/,'$3-$2-$1'))+': '+s2.intDays+'d @₹'+fmt(s2.bal);
      }).join('\n');
      td6.textContent=totIntDays+'d';td6.title=schTip||'No interest period';
      tr2.appendChild(td6);

      // Interest amount
      var td7=document.createElement('td');td7.style.cssText='padding:7px 10px;text-align:right;font-size:12px';
      if(calc.interest>0.5){td7.innerHTML='<strong style="color:var(--amber)">₹'+fmt(calc.interest)+'</strong>';}
      else{td7.innerHTML='<span style="color:var(--brand)">—</span>';}
      tr2.appendChild(td7);

      // Action
      var td8=document.createElement('td');td8.style.cssText='padding:7px 10px;white-space:nowrap';
      if(!calc.isPaid){var pb=el('button',{cls:'btn btn-xs btn-green',text:'Pay'});pb.addEventListener('click',function(){openPayModal(b.id);});td8.appendChild(pb);}
      tr2.appendChild(td8);
      tbody.appendChild(tr2);
    });

    // Party totals footer
    var tfoot=document.createElement('tfoot');
    var tftr=document.createElement('tr');tftr.style.cssText='background:#fffbeb;font-weight:700;border-top:2px solid var(--amber)';
    [('Total ('+pBills.length+' bills)'),'','','₹'+fmt(partyTotBal),'','','','',
     partyTotInt>0?'₹'+fmt(partyTotInt):'—',''].forEach(function(v,vi){
      var td=document.createElement('td');td.style.cssText='padding:8px 10px;font-size:12px;'+(vi>=3?'text-align:right':'');
      if(vi===3)td.style.color='var(--red)';
      if(vi===8&&partyTotInt>0)td.innerHTML='<strong style="color:var(--amber)">₹'+fmt(partyTotInt)+'</strong>';
      else td.textContent=v;
      tftr.appendChild(td);
    });
    tfoot.appendChild(tftr);tbl.appendChild(tbody);tbl.appendChild(tfoot);
    tOuter.appendChild(tbl);partyCard.appendChild(tOuter);
    wrap.appendChild(partyCard);
    grandTotBal+=partyTotBal;grandTotInt+=partyTotInt;
  });

  // Grand total card
  if(Object.keys(partyMap).length>0){
    var gtCard=document.createElement('div');
    gtCard.style.cssText='background:#fff7ed;border:2px solid var(--amber);border-radius:var(--radius-lg);padding:16px 20px;display:flex;gap:24px;flex-wrap:wrap;margin-top:8px';
    gtCard.innerHTML='<div><div style="font-size:10px;color:#92400e;text-transform:uppercase;font-weight:700;margin-bottom:4px">Total Outstanding</div><div style="font-size:22px;font-weight:700;color:var(--red)">₹'+fmt(grandTotBal)+'</div></div>'+
      '<div><div style="font-size:10px;color:#92400e;text-transform:uppercase;font-weight:700;margin-bottom:4px">Total Interest</div><div style="font-size:22px;font-weight:700;color:var(--amber)">₹'+fmt(grandTotInt)+'</div></div>'+
      '<div><div style="font-size:10px;color:#92400e;text-transform:uppercase;font-weight:700;margin-bottom:4px">Total Payable (O/S + Int.)</div><div style="font-size:22px;font-weight:700;color:var(--brand)">₹'+fmt(grandTotBal+grandTotInt)+'</div></div>';
    wrap.appendChild(gtCard);
  }

  if(!Object.keys(partyMap).length){
    var emDiv=document.createElement('div');emDiv.style.cssText='text-align:center;padding:40px;color:#9ca3af';
    emDiv.innerHTML='<div style="font-size:32px;margin-bottom:8px">✓</div><div style="font-size:15px;font-weight:600">Koi bills nahi filter mein!</div><div style="font-size:12px;margin-top:4px">Settings mein "Include Paid Bills" check karo ya filter change karo.</div>';
    wrap.appendChild(emDiv);
  }

  // ── PRINT STATEMENT ──
  function printInterestStatement(){
    var h='<!DOCTYPE html><html><head><title>Interest Statement</title>'+
      '<style>body{font-family:Arial,sans-serif;font-size:11px;padding:20px;color:#111}'+
      'h2{color:#1a6b3c;margin:0 0 4px}.co{font-size:10px;color:#6b7280;margin-bottom:12px}'+
      'h3{color:#374151;margin:10px 0 3px;border-bottom:1px solid #e5e7eb;padding-bottom:3px;font-size:12px}'+
      'table{width:100%;border-collapse:collapse;margin-bottom:10px}'+
      'th{background:#1a6b3c;color:#fff;padding:5px 8px;font-size:10px;text-align:left}'+
      'td{padding:4px 8px;border-bottom:1px solid #e5e7eb}.num{text-align:right}'+
      '.paid{color:#166534;font-size:9px;background:#dcfce7;padding:1px 5px;border-radius:8px;font-weight:700}'+
      '.total{background:#fffbeb;font-weight:700;border-top:2px solid #d97706}'+
      '.grand{background:#fff7ed;padding:12px;border:2px solid #d97706;border-radius:6px;margin-top:10px;display:flex;gap:20px}'+
      '.grand-item{text-align:center}.grand-label{font-size:9px;text-transform:uppercase;color:#92400e;font-weight:700}'+
      '.grand-val{font-size:18px;font-weight:700}@media print{.no-print{display:none}}</style></head><body>';
    h+='<div class="no-print" style="margin-bottom:12px"><button onclick="window.print()" style="background:#1a6b3c;color:#fff;border:none;padding:6px 16px;border-radius:5px;cursor:pointer">Print</button></div>';
    h+='<h2>'+cfg.company+'</h2><div class="co">'+cfg.address+' | '+cfg.phone+'</div>';
    h+='<div style="background:#fff1f2;border:1px solid #fecaca;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:11px">'+
      'Interest Rate: <strong>'+rate+'% p.a.</strong> | Free Days: <strong>'+freeDays+' days</strong> | As of: <strong>'+asOfStr+'</strong>'+
      (state.showPaid?' | Including paid bills':'')+'</div>';
    var gBal=0,gInt=0;
    Object.keys(partyMap).sort().forEach(function(party){
      h+='<h3>'+party+'</h3>';
      h+='<table><thead><tr><th>Bill#</th><th>Date</th><th class="num">Net Amt</th><th class="num">Balance</th><th>Period</th><th class="num">Int Days</th><th class="num">Interest</th></tr></thead><tbody>';
      var pBal=0,pInt=0;
      partyMap[party].forEach(function(b){
        var s=getBillStatus(b);var calc=calcBillInterest(b);
        var totIntDays2=calc.schedule.reduce(function(s2,e){return s2+e.intDays;},0);
        pBal+=s.bal;pInt+=calc.interest;
        var period=fmtDate(b.date)+' → '+fmtDate(calc.endDate.toISOString().split('T')[0].replace(/(\d{4})-(\d{2})-(\d{2})/,'$3-$2-$1'));
        h+='<tr><td>'+(b.billNo||'-')+(calc.isPaid?' <span class="paid">PAID</span>':'')+'</td>'+
          '<td>'+fmtDate(b.date)+'</td><td class="num">₹'+fmt(b.netAmt)+'</td>'+
          '<td class="num" style="color:'+(s.bal>0.5?'#dc2626':'#166534')+'">'+( s.bal>0.5?'₹'+fmt(s.bal):'CLEAR')+'</td>'+
          '<td style="font-size:10px">'+period+'</td>'+
          '<td class="num">'+totIntDays2+'d</td>'+
          '<td class="num" style="color:#d97706;font-weight:700">'+(calc.interest>0.5?'₹'+fmt(calc.interest):'—')+'</td></tr>';
      });
      h+='<tr class="total"><td colspan="3">Subtotal</td><td class="num">₹'+fmt(pBal)+'</td><td colspan="2"></td><td class="num">₹'+fmt(pInt)+'</td></tr></tbody></table>';

// ── MULTI-BILL SPLIT MODAL (Bank Upload + Receive Payment) ──
function openMultiBillSplit(row) {
  var party=row._party;
  if(!party){toast('Party select karo pehle!','err');return;}
  var duePB=bills.filter(function(b){return b.party===party&&getBillStatus(b).status!=='paid';})
    .sort(function(a,b){return toISO(a.date||'').localeCompare(toISO(b.date||''));});
  if(!duePB.length){toast('Koi pending bill nahi!','err');return;}

  var body=document.createElement('div');
  body.style.cssText='min-width:500px';

  var info=document.createElement('div');
  info.style.cssText='background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:10px 14px;font-size:12px;margin-bottom:12px;display:flex;justify-content:space-between';
  info.innerHTML='<span>Party: <strong>'+party+'</strong></span>'+
    '<span>Amount: <strong style="color:#166534">₹'+fmt(row.amount)+'</strong></span>'+
    '<span id="mbsplit-rem">Remaining: <strong style="color:#dc2626">₹'+fmt(row.amount)+'</strong></span>';
  body.appendChild(info);

  var hint=document.createElement('div');hint.style.cssText='font-size:11px;color:#6b7280;margin-bottom:8px';
  hint.textContent='Bills select karo aur amount enter karo. Total amount match hona chahiye.';
  body.appendChild(hint);

  var tbl2=document.createElement('table');tbl2.style.width='100%';
  var thead2=document.createElement('thead');var htr2=document.createElement('tr');htr2.style.background='#f9fafb';
  ['Select','Bill#','Date','Balance','Allot Amount'].forEach(function(h){
    var th=document.createElement('th');th.style.cssText='padding:6px 8px;font-size:10px;text-transform:uppercase;color:#6b7280;font-weight:700';
    th.textContent=h;htr2.appendChild(th);
  });
  thead2.appendChild(htr2);tbl2.appendChild(thead2);
  var tbody2=document.createElement('tbody');

  var allocations={};
  function updateRemaining(){
    var used=Object.values(allocations).reduce(function(s,v){return s+(parseFloat(v)||0);},0);
    var rem=row.amount-used;
    var remEl=document.getElementById('mbsplit-rem');
    if(remEl)remEl.innerHTML='Remaining: <strong style="color:'+(Math.abs(rem)<0.5?'#166534':rem<0?'#dc2626':'#d97706')+'">₹'+fmt(rem)+'</strong>';
  }

  duePB.forEach(function(b){
    var s=getBillStatus(b);
    var tr2=document.createElement('tr');tr2.style.borderBottom='1px solid #f3f4f6';
    var chkTd=document.createElement('td');chkTd.style.padding='6px 8px';
    var chk=document.createElement('input');chk.type='checkbox';chk.style.cssText='width:15px;height:15px;accent-color:#166534;cursor:pointer';
    var amtInp=document.createElement('input');amtInp.type='number';amtInp.className='inp-sm';amtInp.style.width='100px';
    amtInp.placeholder='0';amtInp.disabled=true;
    chk.addEventListener('change',function(){
      amtInp.disabled=!this.checked;
      if(this.checked){
        // Auto-fill with balance
        var used=Object.values(allocations).reduce(function(s2,v){return s2+(parseFloat(v)||0);},0);
        var rem2=row.amount-used;
        var suggested=Math.min(s.bal,Math.max(0,rem2));
        amtInp.value=Math.round(suggested*100)/100;
        allocations[b.id]=amtInp.value;
      } else {
        delete allocations[b.id];amtInp.value='';
      }
      updateRemaining();
    });
    amtInp.addEventListener('input',function(){
      if(allocations[b.id]!==undefined)allocations[b.id]=this.value;
      updateRemaining();
    });
    chkTd.appendChild(chk);tr2.appendChild(chkTd);
    [b.billNo||'-',fmtDate(b.date),'₹'+fmt(s.bal)].forEach(function(v){
      var td=document.createElement('td');td.style.cssText='padding:6px 8px;font-size:12px';
      td.textContent=v;tr2.appendChild(td);
    });
    var amtTd=document.createElement('td');amtTd.style.padding='6px 8px';amtTd.appendChild(amtInp);tr2.appendChild(amtTd);
    tbody2.appendChild(tr2);
  });
  tbl2.appendChild(tbody2);body.appendChild(tbl2);

  openModal('Split Payment across Bills — '+party, body, [{label:'✅ Save Split',fn:function(){
    var entries=Object.keys(allocations).filter(function(bid){return parseFloat(allocations[bid])>0;});
    if(!entries.length){toast('Koi bill select nahi!','err');return;}
    var total=entries.reduce(function(s,bid){return s+(parseFloat(allocations[bid])||0);},0);
    if(Math.abs(total-row.amount)>1){
      if(!confirm('Total allotted ₹'+fmt(total)+' ≠ received ₹'+fmt(row.amount)+'. Phir bhi save karein?'))return;
    }
    // Save each as separate payment
    entries.forEach(function(bid){
      var amt=parseFloat(allocations[bid])||0;
      payments.push({id:uid(),billId:bid,amount:amt,rebate:row.rebate||0,
        date:row.date,mode:row.mode||'NEFT',chequeNo:'',receiptNo:row.narration||'',
        remarks:'Bank Statement (Split)'});
    });
    DB.set('payments',payments);
    row._saved=true;row._billId='__MULTI_DONE__';
    closeModal();toast('✅ '+entries.length+' payments saved!');refresh();
  }}]);
}

// ── STYLED REPORT AS EXCEL ──
function exportStyledReportExcel(data) {
  if(!data)data=bills;
  var wb=XLSX.utils.book_new();
  // Sheet 1: Bills with all details
  var billRows=data.map(function(b){
    var s=getBillStatus(b);
    var bPays=payments.filter(function(p){return p.billId===b.id;});
    var lastPay=bPays.sort(function(a,b2){return (b2.date||'').localeCompare(a.date||'');})[0]||{};
    var grade=(b.rows||[]).map(function(r){return r.grade;}).join(', ')||'-';
    return{
      'Bill#':b.billNo||'','Date':fmtDate(b.date),'Party':b.party||'','Broker':b.broker||'',
      'Grade':grade,'Bill Type':b.billType||'credit',
      'Taxable':b.taxable||0,'CGST':b.cgst||0,'SGST':b.sgst||0,'IGST':b.igst||0,
      'Net Amount':b.netAmt||0,'Received':s.recv,'Balance':s.bal,'Status':s.status.toUpperCase(),
      'Last Payment Date':lastPay.date?fmtDate(lastPay.date):'',
      'Last Paid':lastPay.amount||0,'Last Mode':lastPay.mode||'',
      'Last Receipt':lastPay.receiptNo||lastPay.chequeNo||'',
      'Remarks':b.remarks||''
    };
  });
  var ws1=XLSX.utils.json_to_sheet(billRows);
  ws1['!cols']=[{wch:8},{wch:12},{wch:22},{wch:16},{wch:16},{wch:10},{wch:10},{wch:8},{wch:8},{wch:8},{wch:12},{wch:12},{wch:12},{wch:10},{wch:14},{wch:10},{wch:10},{wch:14},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws1,'Bills Detail');
  // Sheet 2: Party Summary
  var parties=Array.from(new Set(data.map(function(b){return b.party;}))).sort();
  var partyRows=parties.map(function(p){
    var pb=data.filter(function(b){return b.party===p;});
    var recv=pb.reduce(function(s,b){return s+getBillStatus(b).recv;},0);
    var bal=pb.reduce(function(s,b){return s+getBillStatus(b).bal;},0);
    var total=pb.reduce(function(s,b){return s+b.netAmt;},0);
    return{Party:p,'Bills':pb.length,'Total Sales':total,'Received':recv,'Outstanding':bal,'Status':bal<=0.5?'CLEAR':'OUTSTANDING'};
  }).sort(function(a,b){return b['Outstanding']-a['Outstanding'];});
  var ws2=XLSX.utils.json_to_sheet(partyRows);
  XLSX.utils.book_append_sheet(wb,ws2,'Party Summary');
  // Sheet 3: Outstanding
  var dueRows=data.filter(function(b){return getBillStatus(b).status!=='paid';}).map(function(b){
    var s=getBillStatus(b);
    var days=Math.floor((new Date()-new Date(toISO(b.date||'')))/(86400000));
    return{'Bill#':b.billNo,'Date':fmtDate(b.date),'Party':b.party,'Broker':b.broker||'','Grade':(b.rows||[]).map(function(r){return r.grade;}).join(', '),'Net Amt':b.netAmt,'Received':s.recv,'Balance':s.bal,'Days Old':days,'Status':s.status.toUpperCase()};
  }).sort(function(a,b){return b['Balance']-a['Balance'];});
  if(dueRows.length){var ws3=XLSX.utils.json_to_sheet(dueRows);XLSX.utils.book_append_sheet(wb,ws3,'Outstanding');}
  XLSX.writeFile(wb,'CashewPro_StyledReport_'+today()+'.xlsx');
  toast('✅ Styled Excel exported: '+data.length+' bills, '+parties.length+' parties');
}

function pgSuspense() {

             (s.remarks||'').toLowerCase().includes(q) ||
             (s.party||'').toLowerCase().includes(q) ||
             (s.refNo||'').toLowerCase().includes(q);
