function openAddSuspense() {
  var allP=Array.from(new Set(bills.map(function(b){return b.party;}))).sort();
  var body=document.createElement('div'); body.className='grid g2'; body.style.gap='12px';

  var hint=document.createElement('div');
  hint.style.cssText='grid-column:span 2;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:10px 12px;font-size:12px;color:#92400e';
  hint.textContent='Unidentified / unclear payment — party pata nahi ya confirm nahi. Baad mein clear karein.';
  body.appendChild(hint);

  function mkF(lbl,id,type,val,ph,full){
    var d=document.createElement('div');d.className='fg';if(full)d.style.gridColumn='span 2';
    var l=document.createElement('label');l.textContent=lbl;
    var i2=el('input',{cls:'inp',type:type||'text',id:id}); i2.value=val||''; if(ph)i2.placeholder=ph;
    d.appendChild(l); d.appendChild(i2); return d;
  }
  function mkSel(lbl,id,opts,val){
    var d=document.createElement('div');d.className='fg';
    var l=document.createElement('label');l.textContent=lbl;
    var s2=document.createElement('select');s2.className='inp';s2.id=id;
    opts.forEach(function(o){var opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o===val)opt.selected=true;s2.appendChild(opt);});
    d.appendChild(l); d.appendChild(s2); return d;
  }

  [mkF('Date','sp-date','text',today(),'DD-MM-YYYY'),
   mkF('Amount (₹)','sp-amount','number','','0'),
   mkF('Narration / Description','sp-narr','text','','Bank statement ya description',true),
   mkF('Reference No. / UTR / Cheque','sp-ref','text','','Optional'),
   mkSel('Mode','sp-mode',['NEFT','RTGS','IMPS','UPI','CASH','CHEQUE','Unknown'],'NEFT'),
  ].forEach(function(f){body.appendChild(f);});

  // Party datalist
  var pFg=document.createElement('div');pFg.className='fg';
  pFg.innerHTML='<label>Party Hint (optional)</label>';
  var pInp=el('input',{cls:'inp',id:'sp-party'});pInp.placeholder='Party ka guess ya hint...';pInp.style.textTransform='uppercase';pInp.setAttribute('list','sp-dl');
  var dl=document.createElement('datalist');dl.id='sp-dl';
  allP.forEach(function(p){var o=document.createElement('option');o.value=p;dl.appendChild(o);});
  pFg.appendChild(pInp);pFg.appendChild(dl);body.appendChild(pFg);

  body.appendChild(mkF('Remarks / Notes','sp-rmk','text','','Kuch bhi note karo',true));

  openModal('Add Suspense Entry', body, [{label:'Save', fn:function(){
    var amt=parseFloat(gv('sp-amount'))||0;
    if(!amt){toast('Amount required!','err');return;}
    suspense.push({
      id:uid(), date:gv('sp-date')||today(), amount:amt,
      narration:gv('sp-narr'), refNo:gv('sp-ref'), mode:gv('sp-mode'),
      party:(gv('sp-party')||'').toUpperCase().trim(),
      remarks:gv('sp-rmk'), cleared:false, clearedTo:'',
      createdAt:new Date().toISOString()
    });
    DB.set('suspense',suspense);
    toast('✅ Suspense entry saved!'); closeModal(); refresh();
  }}]);
}

// ── EDIT SUSPENSE MODAL ──
function openEditSuspense(entry) {
  var body=document.createElement('div');body.className='grid g2';body.style.gap='12px';
  function mkF2(lbl,id,type,val,full){
    var d=document.createElement('div');d.className='fg';if(full)d.style.gridColumn='span 2';
    var l=document.createElement('label');l.textContent=lbl;
    var i2=el('input',{cls:'inp',type:type||'text',id:id});i2.value=val||'';
    d.appendChild(l);d.appendChild(i2);return d;
  }
  function mkS2(lbl,id,opts,val){
    var d=document.createElement('div');d.className='fg';
    var l=document.createElement('label');l.textContent=lbl;
    var s2=document.createElement('select');s2.className='inp';s2.id=id;
    opts.forEach(function(o){var opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o===val)opt.selected=true;s2.appendChild(opt);});
    d.appendChild(l);d.appendChild(s2);return d;
  }
  [mkF2('Date','se-date','text',fmtDate(entry.date)),
   mkF2('Amount','se-amount','number',entry.amount||0),
   mkF2('Narration','se-narr','text',entry.narration||'',true),
   mkF2('Reference No.','se-ref','text',entry.refNo||''),
   mkS2('Mode','se-mode',['NEFT','RTGS','IMPS','UPI','CASH','CHEQUE','Unknown'],entry.mode||'NEFT'),
   mkF2('Party Hint','se-party','text',entry.party||''),
   mkF2('Remarks','se-rmk','text',entry.remarks||'',true),
  ].forEach(function(f){body.appendChild(f);});
  openModal('Edit Suspense Entry', body, [{label:'Save', fn:function(){
    entry.date=gv('se-date'); entry.amount=parseFloat(gv('se-amount'))||entry.amount;
    entry.narration=gv('se-narr'); entry.refNo=gv('se-ref'); entry.mode=gv('se-mode');
    entry.party=(gv('se-party')||'').toUpperCase().trim(); entry.remarks=gv('se-rmk');
    DB.set('suspense',suspense); toast('Updated!'); closeModal(); refresh();
  }}]);
}

// ── CLEAR SUSPENSE — Apply to Bill or Advance ──
function openClearSuspense(entry) {
  var allP2=Array.from(new Set(bills.map(function(b){return b.party;}))).sort();
  var body=document.createElement('div');body.style.cssText='display:flex;flex-direction:column;gap:12px';

  var infoBox=document.createElement('div');
  infoBox.style.cssText='background:var(--brand-pale);border:1px solid var(--brand-light);border-radius:8px;padding:10px 14px;font-size:12px';
  infoBox.innerHTML='<strong>Suspense:</strong> ₹'+fmt(entry.amount)+' | '+fmtDate(entry.date)+
    (entry.narration?'<br><span style="color:#6b7280">'+entry.narration+'</span>':'')+
    (entry.refNo?'<br><span style="color:#9ca3af;font-family:monospace">Ref: '+entry.refNo+'</span>':'');
  body.appendChild(infoBox);

  // Party select
  var pFg2=document.createElement('div');pFg2.className='fg';
  pFg2.innerHTML='<label>Party</label>';
  var pSel=document.createElement('select');pSel.className='inp';pSel.id='sc-party2';
  var dO=document.createElement('option');dO.value='';dO.textContent='-- Select Party --';pSel.appendChild(dO);
  allP2.forEach(function(p){var o=document.createElement('option');o.value=p;o.textContent=p;if(p===entry.party)o.selected=true;pSel.appendChild(o);});
  pFg2.appendChild(pSel);body.appendChild(pFg2);

  // Bill select
  var bFg2=document.createElement('div');bFg2.className='fg';
  bFg2.innerHTML='<label>Bill (blank = add as Advance)</label>';
  var bSel=document.createElement('select');bSel.className='inp';bSel.id='sc-bill2';
  bFg2.appendChild(bSel);body.appendChild(bFg2);

  function updateBillSel(){
    bSel.innerHTML='';
    var bo=document.createElement('option');bo.value='';bo.textContent='-- Advance only (no specific bill) --';bSel.appendChild(bo);
    var party=pSel.value; if(!party)return;
    bills.filter(function(b){return b.party===party&&getBillStatus(b).status!=='paid';})
      .sort(function(a,b2){return toISO(a.date||'').localeCompare(toISO(b2.date||''));})
      .forEach(function(b){
        var s=getBillStatus(b);
        var o=document.createElement('option');o.value=b.id;
        o.textContent='#'+b.billNo+' '+fmtDate(b.date)+' — Bal:₹'+fmt(s.bal);
        bSel.appendChild(o);
      });
  }
  pSel.addEventListener('change',updateBillSel);updateBillSel();

  // Grid for mode + date
  var g2=document.createElement('div');g2.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px';
  var mFg=document.createElement('div');mFg.className='fg';mFg.innerHTML='<label>Mode</label>';
  var mSel=document.createElement('select');mSel.className='inp';mSel.id='sc-mode2';
  ['NEFT','RTGS','IMPS','UPI','CASH','CHEQUE'].forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;if(m===(entry.mode||'NEFT'))o.selected=true;mSel.appendChild(o);});
  mFg.appendChild(mSel);g2.appendChild(mFg);
  var dFg=document.createElement('div');dFg.className='fg';dFg.innerHTML='<label>Date</label>';
  var dInp=el('input',{cls:'inp',type:'text',id:'sc-date2'});dInp.value=fmtDate(entry.date);
  dFg.appendChild(dInp);g2.appendChild(dFg);
  body.appendChild(g2);

  openModal('Clear Suspense Entry', body, [{label:'✅ Clear & Apply', fn:function(){
    var party=document.getElementById('sc-party2').value;
    if(!party){toast('Party select karo!','err');return;}
    var billId=document.getElementById('sc-bill2').value;
    var mode=document.getElementById('sc-mode2').value;
    var date=document.getElementById('sc-date2').value||fmtDate(entry.date);
    if(billId){
      payments.push({id:uid(),billId:billId,amount:entry.amount,rebate:0,date:date,
        mode:mode,chequeNo:'',receiptNo:entry.refNo||'',
        remarks:'From Suspense: '+(entry.narration||'')});
      DB.set('payments',payments);
      entry.cleared=true; entry.clearedTo=party+' (Bill payment)';
    } else {
      advances.push({id:uid(),party:party,amount:entry.amount,date:date,
        mode:mode,remarks:'From Suspense: '+(entry.narration||entry.refNo||''),
        linked:false,createdAt:new Date().toISOString()});
      DB.set('advances',advances);
      entry.cleared=true; entry.clearedTo=party+' (Advance)';
    }
    DB.set('suspense',suspense);
    toast('✅ Suspense cleared — applied to '+party+'!'); closeModal(); refresh();
  }}]);
}

// UNDO SYSTEM
// ═══════════════════════════════════════
var _undoStack = [];
var _undoTimer = null;

function saveUndo(label) {
  _undoStack.push({
    label: label || 'Action',
    time: Date.now(),
    snapshot: {
      bills:     JSON.parse(JSON.stringify(bills)),
      payments:  JSON.parse(JSON.stringify(payments)),
      cheques:   JSON.parse(JSON.stringify(cheques)),
      advances:  JSON.parse(JSON.stringify(advances)),
      expenses:  JSON.parse(JSON.stringify(expenses)),
      returns_:  JSON.parse(JSON.stringify(returns_)),
      purchases: JSON.parse(JSON.stringify(purchases)),
      suspense:  JSON.parse(JSON.stringify(suspense)),
    }
  });
  if(_undoStack.length > 20) _undoStack.shift();
  showUndoBtn(label);
}

function performUndo() {
  if(!_undoStack.length){ toast('Nothing to undo!', 'err'); return; }
  var last = _undoStack.pop();
  var snap = last.snapshot;
  bills=snap.bills; payments=snap.payments; cheques=snap.cheques;
  advances=snap.advances; expenses=snap.expenses; returns_=snap.returns_;
  purchases=snap.purchases; suspense=snap.suspense;
  DB.set('bills',bills); DB.set('payments',payments); DB.set('cheques',cheques);
  DB.set('advances',advances); DB.set('expenses',expenses); DB.set('returns',returns_);
  DB.set('purchases',purchases); DB.set('suspense',suspense);
  toast('Undo: "' + last.label + '" restored!');
  hideUndoBtn(); refresh();
}

function showUndoBtn(label) {
  var btn = document.getElementById('undo-fab');
  if(!btn) return;
  btn.style.display = 'flex';
  var lbl = btn.querySelector('.undo-label');
  if(lbl) lbl.textContent = 'Undo: ' + (label||'Action');
  clearTimeout(_undoTimer);
  _undoTimer = setTimeout(function(){ hideUndoBtn(); }, 10000);
}

function hideUndoBtn() {
  var btn = document.getElementById('undo-fab');
  if(btn) btn.style.display = 'none';
  clearTimeout(_undoTimer);
}

document.addEventListener('keydown', function(e) {
  if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) {
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
    e.preventDefault(); performUndo();
  }
});

// YEAR-WISE EXPORT & DATA FETCH
// ══════════════════════════════════════════
function getFinancialYears() {
  // Extract all unique financial years from bills
  // FY = April-March, e.g. FY 2024-25 = Apr 2024 - Mar 2025
  var years = new Set();
  bills.forEach(function(b) {
    if(!b.date) return;
    var iso = toISO(b.date);
    if(!iso) return;
    var yr = parseInt(iso.substring(0,4));
    var mo = parseInt(iso.substring(5,7));
    // If month is Jan-Mar, FY is previous year
    var fyStart = mo >= 4 ? yr : yr-1;
    years.add(fyStart);
  });
  return Array.from(years).sort().reverse();
}

function getFYLabel(fyStart) {
  return 'FY ' + fyStart + '-' + String(fyStart+1).slice(2);
}

function getFYBills(fyStart) {
  var startISO = fyStart+'-04-01';
  var endISO   = (fyStart+1)+'-03-31';
  return bills.filter(function(b) {
    var iso = toISO(b.date||'');
    return iso >= startISO && iso <= endISO;
  });
}

function getFYPayments(fyBills) {
  var billIds = new Set(fyBills.map(function(b){return b.id;}));
  return payments.filter(function(p){ return billIds.has(p.billId); });
}

function exportYearWise(fyStart) {
  var fyLabel = getFYLabel(fyStart);
  var fyBills = getFYBills(fyStart);
  var fyPays  = getFYPayments(fyBills);
  var fyExps  = expenses.filter(function(e){
    var iso=toISO(e.date||'');
    return iso>=(fyStart+'-04-01') && iso<=((fyStart+1)+'-03-31');
  });
  var fyPurs  = purchases.filter(function(p){
    var iso=toISO(p.date||'');
    return iso>=(fyStart+'-04-01') && iso<=((fyStart+1)+'-03-31');
  });

  if(!fyBills.length && !fyPays.length) {
    toast('Is year mein koi data nahi!', 'err'); return;
  }

  var wb = XLSX.utils.book_new();

  // Sheet 1: Bills
  var billRows = fyBills.map(function(b) {
    var s=getBillStatus(b);
    var lastPay=fyPays.filter(function(p){return p.billId===b.id;}).sort(function(a,b2){return (b2.date||'').localeCompare(a.date||'');})[0]||{};
    return {
      'Bill#':b.billNo||'', 'Date':fmtDate(b.date), 'Party':b.party,
      'Broker':b.broker||'', 'Grade':(b.rows||[]).map(function(r){return r.grade;}).join(', '),
      'Taxable':b.taxable||0, 'CGST':b.cgst||0, 'SGST':b.sgst||0,
      'Net Amount':b.netAmt||0, 'Received':s.recv, 'Balance':s.bal,
      'Status':s.status.toUpperCase(),
      'Last Pay Date':lastPay.date?fmtDate(lastPay.date):'',
      'Last Mode':lastPay.mode||'', 'Remarks':b.remarks||''
    };
  });
  var ws1 = XLSX.utils.json_to_sheet(billRows);
  ws1['!cols']=[{wch:8},{wch:12},{wch:22},{wch:16},{wch:14},{wch:10},{wch:8},{wch:8},{wch:12},{wch:12},{wch:12},{wch:10},{wch:14},{wch:10},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Bills');

  // Sheet 2: Payments
  var payRows = fyPays.map(function(p) {
    var b=bills.find(function(x){return x.id===p.billId;})||{};
    return {
      'Bill#':b.billNo||'', 'Party':b.party||'', 'Pay Date':fmtDate(p.date),
      'Amount':p.amount||0, 'Rebate':p.rebate||0,
      'Mode':p.mode||'', 'Cheque/Receipt':p.chequeNo||p.receiptNo||'',
      'Remarks':p.remarks||''
    };
  });
  if(payRows.length) {
    var ws2=XLSX.utils.json_to_sheet(payRows);
    ws2['!cols']=[{wch:8},{wch:22},{wch:12},{wch:12},{wch:10},{wch:10},{wch:16},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws2, 'Payments');
  }

  // Sheet 3: Party Summary
  var parties = Array.from(new Set(fyBills.map(function(b){return b.party;}))).sort();
  var partyRows = parties.map(function(p) {
    var pb=fyBills.filter(function(b){return b.party===p;});
    var recv=pb.reduce(function(s,b){return s+getBillStatus(b).recv;},0);
    var bal=pb.reduce(function(s,b){return s+getBillStatus(b).bal;},0);
    var total=pb.reduce(function(s,b){return s+b.netAmt;},0);
    return {Party:p,'Bills':pb.length,'Total Sales':total,'Received':recv,'Outstanding':bal};
  }).sort(function(a,b){return b['Total Sales']-a['Total Sales'];});
  var ws3=XLSX.utils.json_to_sheet(partyRows);
  XLSX.utils.book_append_sheet(wb, ws3, 'Party Summary');

  // Sheet 4: Expenses (if any)
  if(fyExps.length) {
    var expRows=fyExps.map(function(e){return{Date:fmtDate(e.date),Category:e.category||'',Vendor:e.vendor||'',Amount:e.amount||0,Remarks:e.remarks||''};});
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(expRows), 'Expenses');
  }

  // Sheet 5: Purchases (if any)
  if(fyPurs.length) {
    var purRows=fyPurs.map(function(p){return{Date:fmtDate(p.date),Supplier:p.supplier,Grade:p.grade||'',Weight:p.weight||0,Rate:p.rate||0,Amount:p.amount||0};});
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(purRows), 'Purchases');
  }

  // Sheet 6: Summary stats
  var totSales=fyBills.reduce(function(s,b){return s+b.netAmt;},0);
  var totRecv=fyBills.reduce(function(s,b){return s+getBillStatus(b).recv;},0);
  var totBal=fyBills.reduce(function(s,b){return s+getBillStatus(b).bal;},0);
  var totGST=fyBills.reduce(function(s,b){return s+(b.cgst||0)+(b.sgst||0)+(b.igst||0);},0);
  var totExp=fyExps.reduce(function(s,e){return s+(e.amount||0);},0);
  var totPur=fyPurs.reduce(function(s,p){return s+(p.amount||0);},0);
  var summaryData=[
    {Metric:'Financial Year',Value:fyLabel},
    {Metric:'Period',Value:'01-04-'+fyStart+' to 31-03-'+(fyStart+1)},
    {Metric:'',Value:''},
    {Metric:'Total Bills',Value:fyBills.length},
    {Metric:'Total Sales (Net)',Value:totSales},
    {Metric:'Total Received',Value:totRecv},
    {Metric:'Outstanding',Value:totBal},
    {Metric:'Total GST Collected',Value:totGST},
    {Metric:'',Value:''},
    {Metric:'Total Payments',Value:fyPays.length},
    {Metric:'Total Expenses',Value:totExp},
    {Metric:'Total Purchases',Value:totPur},
    {Metric:'Unique Parties',Value:parties.length},
  ];
  var wsSumm=XLSX.utils.json_to_sheet(summaryData);
  wsSumm['!cols']=[{wch:25},{wch:20}];
  XLSX.utils.book_append_sheet(wb, wsSumm, 'Summary');

  XLSX.writeFile(wb, 'CashewPro_'+fyLabel.replace(' ','_')+'_Export.xlsx');
  toast('✅ '+fyLabel+' export ready! Bills: '+fyBills.length+', Payments: '+fyPays.length);
}

function archiveYear(fyStart) {
  var fyLabel = getFYLabel(fyStart);
  var fyBills = getFYBills(fyStart);
  if(!fyBills.length){ toast('Koi data nahi is year mein!','err'); return; }
  if(!confirm(fyLabel+' ka data export + archive karna chahte ho?\n\nExport ho jayega aur phir ye bills current data se hide hongi.\n(Data delete nahi hoga, sirf archive mein jayega)')) return;

  // First export
  exportYearWise(fyStart);

  // Archive — move to a separate key
  var archived = DB.getObj('archived_bills', {});
  archived[fyStart] = {
    bills: fyBills,
    payments: getFYPayments(fyBills),
    archivedAt: new Date().toISOString()
  };
  DB.setObj('archived_bills', archived);

  // Remove from active
  var archivedIds = new Set(fyBills.map(function(b){return b.id;}));
  bills = bills.filter(function(b){ return !archivedIds.has(b.id); });
  payments = payments.filter(function(p){ return !archivedIds.has(p.billId); });
  DB.set('bills', bills); DB.set('payments', payments);
  toast('✅ '+fyLabel+' archived! '+fyBills.length+' bills moved to archive.');
  refresh();
}

function restoreArchivedYear(fyStart) {
  var fyLabel = getFYLabel(fyStart);
  var archived = DB.getObj('archived_bills', {});
  var arch = archived[fyStart];
  if(!arch){ toast('Archive nahi mili!','err'); return; }
  if(!confirm(fyLabel+' ka data wapas active mein restore karna chahte ho?')) return;
  saveUndo('Restore '+fyLabel);
  bills = bills.concat(arch.bills);
  payments = payments.concat(arch.payments);
  DB.set('bills', bills); DB.set('payments', payments);
  delete archived[fyStart];
  DB.setObj('archived_bills', archived);
  toast('✅ '+fyLabel+' restored! '+arch.bills.length+' bills wapas aaye.');
  refresh();
}

  var w=window.open('','_blank','width=1000,height=750');if(!w){toast('Popup blocked','err');return;}

          Received:s.recv,Balance:s.bal,Status:s.status.toUpperCase()});
      });
    });
    var ws1=XLSX.utils.json_to_sheet(rows);
    ws1['!cols']=[{wch:20},{wch:8},{wch:12},{wch:22},{wch:14},{wch:12},{wch:8},{wch:12},{wch:12},{wch:12},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws1,'Brokerage Detail');

var BACKUP_VERSION = 'v10.1';

// ── Build full backup object ──
function buildBackupData() {
  var now = new Date();
  var pad = function(n){return String(n).padStart(2,'0');};
  var ts = now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+
           '_'+pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds());
  return {
    _meta: {
      version:   BACKUP_VERSION,
      app:       'CashewPro',
      company:   cfg.company||'',
      createdAt: now.toISOString(),
      timestamp: ts,
      label:     (cfg.company||'CashewPro')+' Backup '+today()+' '+pad(now.getHours())+':'+pad(now.getMinutes()),
      counts: {
        bills:     bills.length,
        payments:  payments.length,
        cheques:   cheques.length,
        advances:  advances.length,
        expenses:  expenses.length,
        returns:   returns_.length,
        purchases: purchases.length,
        suspense:  suspense.length,
      }
    },
    bills:     bills,
    payments:  payments,
    cheques:   cheques,
    advances:  advances,
    expenses:  expenses,
    returns:   returns_,
    purchases: purchases,
    suspense:  suspense,
    settings:  cfg,
  };
}

// ── Save backup to history in localStorage ──
function saveBackupToHistory(label) {
  var history = DB.getObj('backupHistory', []);
  history.unshift({
    label: label,
    date: today(),
    time: new Date().toLocaleTimeString('en-IN'),
    timestamp: new Date().toISOString(),
    counts: {
      bills: bills.length,
      payments: payments.length,
    }
  });
  if(history.length > 15) history = history.slice(0,15);
  DB.setObj('backupHistory', history);
}

// GOOGLE DRIVE BACKUP
// One-click backup to ANY Google account's Drive
// ══════════════════════════════════════════════════════
var _driveToken = null;
var _driveTokenExpiry = 0;

function saveBackupToDrive() {
  var data = buildBackupData();
  var json = JSON.stringify(data, null, 2);
  var filename = 'CashewPro_Backup_' + data._meta.timestamp + '.json';

  // Check if Google Identity Services is loaded
  if (typeof google === 'undefined' || !google.accounts) {
    toast('Google API not loaded yet. Try again in 2 seconds.', 'err');
    return;
  }

  var now = Date.now();
  if (_driveToken && now < _driveTokenExpiry) {
    // Token still valid — upload directly
    _driveUpload(_driveToken, filename, json);
    return;
  }

  // Request token — Google will show account chooser popup
  // User can pick ANY Google account (dusri Gmail bhi)
  var tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: '335706191722-4j8tc2v5n3k7m1p9q2r6s8t0u1v2w3x4.apps.googleusercontent.com',
    scope: 'https://www.googleapis.com/auth/drive.file',
    prompt: 'select_account',  // Always show account chooser
    callback: function(response) {
      if (response.error) {
        toast('Drive auth failed: ' + response.error, 'err');
        return;
      }
      _driveToken = response.access_token;
      _driveTokenExpiry = Date.now() + (response.expires_in * 1000) - 60000;
      _driveUpload(_driveToken, filename, json);
    }
  });

  tokenClient.requestAccessToken();
}

function _driveUpload(token, filename, content2) {
  toast('☁️ Uploading to Google Drive...', 'ok');

  var metadata = JSON.stringify({
    name: filename,
    mimeType: 'application/json',
    description: 'CashewPro automatic backup — Jai Shree Cashew Industries'
  });

  var boundary = '-------cashewpro_boundary';
  var body = (
    '--' + boundary + '\r\n' +
    'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
    metadata + '\r\n' +
    '--' + boundary + '\r\n' +
    'Content-Type: application/json\r\n\r\n' +
    content2 + '\r\n' +
    '--' + boundary + '--'
  );

  fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'multipart/related; boundary=' + boundary
    },
    body: body
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(file) {
    if (file.id) {
      toast('✅ Saved to Google Drive: ' + filename);
      saveBackupToHistory('Drive Backup: ' + filename);
    } else {
      throw new Error('No file ID returned');
    }
  })
  .catch(function(err) {
    console.error('Drive upload error:', err);
    _driveToken = null; // Clear expired token
    toast('Drive upload failed. Try again.', 'err');
  });
}

// ── Export JSON Backup ──
function exportBackupJSON() {

// ── Export Excel Backup ──
function exportBackupExcel() {
  var wb = XLSX.utils.book_new();
  var now = new Date();
  var pad = function(n){return String(n).padStart(2,'0');};

  // Sheet: Bills
  var bRows = bills.map(function(b){
    var s=getBillStatus(b);
    return{ID:b.id,'Bill#':b.billNo,Date:fmtDate(b.date),Party:b.party,
      Broker:b.broker||'',Grade:(b.rows||[]).map(function(r){return r.grade;}).join(','),
      'Net Amt':b.netAmt,'GST':((b.cgst||0)+(b.sgst||0)+(b.igst||0)),
      Received:s.recv,Balance:s.bal,Status:s.status,Remarks:b.remarks||''};
  });
  var ws1=XLSX.utils.json_to_sheet(bRows); XLSX.utils.book_append_sheet(wb,ws1,'Bills');

  // Sheet: Payments
  var pRows = payments.map(function(p){
    var b=bills.find(function(x){return x.id===p.billId;})||{};
    return{ID:p.id,BillID:p.billId,'Bill#':b.billNo||'',Party:b.party||'',
      Date:fmtDate(p.date),Amount:p.amount,Rebate:p.rebate||0,
      Mode:p.mode||'',ChequeNo:p.chequeNo||'',ReceiptNo:p.receiptNo||'',Remarks:p.remarks||''};
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(pRows),'Payments');

  // Sheet: Cheques
  var cRows=cheques.map(function(c){return{ID:c.id,Date:fmtDate(c.date),Party:c.party,ChequeNo:c.chequeNo||'',Bank:c.bank||'',Amount:c.amount,Status:c.status||''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cRows.length?cRows:[{note:'No data'}]),'Cheques');

  // Sheet: Advances
  var aRows=advances.map(function(a){return{ID:a.id,Date:fmtDate(a.date),Party:a.party,Amount:a.amount,Mode:a.mode||'',Linked:a.linked?'Yes':'No',Remarks:a.remarks||''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(aRows.length?aRows:[{note:'No data'}]),'Advances');

  // Sheet: Expenses
  var eRows=expenses.map(function(e){return{ID:e.id,Date:fmtDate(e.date),Category:e.category||'',Vendor:e.vendor||'',Amount:e.amount,Remarks:e.remarks||''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(eRows.length?eRows:[{note:'No data'}]),'Expenses');

  // Sheet: Purchases
  var puRows=purchases.map(function(p){return{ID:p.id,Date:fmtDate(p.date),Supplier:p.supplier,Grade:p.grade||'',Weight:p.weight||0,Rate:p.rate||0,Amount:p.amount,Remarks:p.remarks||''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(puRows.length?puRows:[{note:'No data'}]),'Purchases');

  // Sheet: Suspense
  var suRows=suspense.map(function(s){return{ID:s.id,Date:fmtDate(s.date),Amount:s.amount,Narration:s.narration||'',Party:s.party||'',RefNo:s.refNo||'',Mode:s.mode||'',Cleared:s.cleared?'Yes':'No',ClearedTo:s.clearedTo||''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(suRows.length?suRows:[{note:'No data'}]),'Suspense');

  // Sheet: Meta/Summary
  var ts=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes());
  var metaRows=[
    {Field:'App',Value:'CashewPro'},{Field:'Version',Value:BACKUP_VERSION},
    {Field:'Company',Value:cfg.company||''},{Field:'Export Date',Value:today()},
    {Field:'Export Time',Value:ts},{Field:'',Value:''},
    {Field:'Bills',Value:bills.length},{Field:'Payments',Value:payments.length},
    {Field:'Cheques',Value:cheques.length},{Field:'Advances',Value:advances.length},
    {Field:'Expenses',Value:expenses.length},{Field:'Purchases',Value:purchases.length},
    {Field:'Suspense',Value:suspense.length},
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(metaRows),'Meta');

  var ts2=now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'_'+pad(now.getHours())+pad(now.getMinutes());
  XLSX.writeFile(wb,'CashewPro_Backup_'+ts2+'.xlsx');
  saveBackupToHistory('Excel Backup '+today());
  toast('✅ Excel backup downloaded! 7 sheets');
}

// ── Validate backup data before restore ──
function validateBackupData(data) {
  var errors = [];
  if(!data||typeof data!=='object') return ['Invalid file — not a valid backup'];
  // Check meta or legacy format
  var isLegacy = !data._meta;
  if(!isLegacy&&data._meta.app!=='CashewPro') errors.push('This backup is not from CashewPro!');

  // Check required arrays
  ['bills','payments'].forEach(function(arr){
    if(!Array.isArray(data[arr])) errors.push(arr+' data missing or invalid');
  });
  if(errors.length) return errors;

  // Check bill fields
  var sampleBills=(data.bills||[]).slice(0,3);
  sampleBills.forEach(function(b,i){
    REQUIRED_FIELDS.bills.forEach(function(f){
      if(b[f]===undefined) errors.push('Bill #'+i+' missing field: '+f);
    });
  });
  return errors;
}

// ── Restore from JSON ──
function restoreFromJSON(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var data;
    try { data = JSON.parse(e.target.result); }
    catch(ex) { toast('JSON parse error: '+ex.message,'err'); return; }

    var errs = validateBackupData(data);
    if(errs.length) {
      alert('Backup validation failed:\n\n'+errs.join('\n')+'\n\nRestore cancelled.');
      return;
    }

    var meta = data._meta||{};
    var msg = 'Backup restore karna chahte ho?\n\n'+
      (meta.label||'Backup file')+'\n'+
      'Bills: '+(data.bills||[]).length+'\n'+
      'Payments: '+(data.payments||[]).length+'\n\n'+
      'Current data REPLACE ho jayega. Ek auto-backup pehle save hoga.';
    if(!confirm(msg)) return;

    // Save current data as safety backup first
    exportBackupJSON();

    setTimeout(function(){
      saveUndo('Before Restore');
      bills     = data.bills     || [];
      payments  = data.payments  || [];
      cheques   = data.cheques   || [];
      advances  = data.advances  || [];
      expenses  = data.expenses  || [];
      returns_  = data.returns   || data.returns_ || [];
      purchases = data.purchases || [];
      suspense  = data.suspense  || [];
      if(data.settings) { Object.assign(cfg, data.settings); DB.setObj('settings',cfg); }
      DB.set('bills',bills); DB.set('payments',payments); DB.set('cheques',cheques);
      DB.set('advances',advances); DB.set('expenses',expenses); DB.set('returns',returns_);
      DB.set('purchases',purchases); DB.set('suspense',suspense);
      saveBackupToHistory('Restored from: '+(meta.label||'backup'));
      toast('✅ Data restored! Bills: '+bills.length+', Payments: '+payments.length);
      refresh();
    }, 1500);
  };
  reader.readAsText(file);
}

// ── Restore from Excel ──
function restoreFromExcel(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result,{type:'array'});
      // Need Bills and Payments sheets at minimum
      if(!wb.SheetNames.includes('Bills')||!wb.SheetNames.includes('Payments')){
        alert('Invalid Excel backup!\n\nRequired sheets not found: Bills, Payments\n\nRestore cancelled.');
        return;
      }
      var rawBills  = XLSX.utils.sheet_to_json(wb.Sheets['Bills']);
      var rawPays   = XLSX.utils.sheet_to_json(wb.Sheets['Payments']);
      var rawChqs   = wb.SheetNames.includes('Cheques')  ? XLSX.utils.sheet_to_json(wb.Sheets['Cheques'])  : [];
      var rawAdvs   = wb.SheetNames.includes('Advances') ? XLSX.utils.sheet_to_json(wb.Sheets['Advances']) : [];
      var rawExps   = wb.SheetNames.includes('Expenses') ? XLSX.utils.sheet_to_json(wb.Sheets['Expenses']) : [];
      var rawPurs   = wb.SheetNames.includes('Purchases')? XLSX.utils.sheet_to_json(wb.Sheets['Purchases']): [];
      var rawSusp   = wb.SheetNames.includes('Suspense') ? XLSX.utils.sheet_to_json(wb.Sheets['Suspense']) : [];

      // Validate
      if(!rawBills.length&&!rawPays.length){ alert('Empty backup file!'); return; }
      var sampleB = rawBills[0]||{};
      if(!sampleB.ID&&!sampleB.id&&!sampleB['Bill#']){ alert('Bills sheet format unrecognized!'); return; }

      var msg='Excel Restore:\n\nBills: '+rawBills.length+'\nPayments: '+rawPays.length+'\n\nCurrent data REPLACE hoga. Pehle JSON backup save hoga.';
      if(!confirm(msg)) return;

      // Save current as backup first
      exportBackupJSON();

      setTimeout(function(){
        saveUndo('Before Excel Restore');

        // Map Excel rows back to internal format
        function mapBill(r){return{id:r.ID||r.id||uid(),billNo:r['Bill#']||'',date:r.Date||today(),party:r.Party||'',broker:r.Broker||'',netAmt:parseFloat(r['Net Amt'])||0,remarks:r.Remarks||'',rows:[],taxable:0,cgst:0,sgst:0,igst:0};}
        function mapPay(r){return{id:r.ID||r.id||uid(),billId:r.BillID||r.billId||'',amount:parseFloat(r.Amount)||0,rebate:parseFloat(r.Rebate)||0,date:r.Date||today(),mode:r.Mode||'',chequeNo:r.ChequeNo||'',receiptNo:r.ReceiptNo||'',remarks:r.Remarks||''};}

        bills     = rawBills.filter(function(r){return !r.note;}).map(mapBill);
        payments  = rawPays.filter(function(r){return !r.note;}).map(mapPay);
        cheques   = rawChqs.filter(function(r){return !r.note;}).map(function(r){return{id:r.ID||uid(),date:r.Date||today(),party:r.Party||'',chequeNo:r.ChequeNo||'',bank:r.Bank||'',amount:parseFloat(r.Amount)||0,status:r.Status||'Pending'};});
        advances  = rawAdvs.filter(function(r){return !r.note;}).map(function(r){return{id:r.ID||uid(),date:r.Date||today(),party:r.Party||'',amount:parseFloat(r.Amount)||0,mode:r.Mode||'',linked:r.Linked==='Yes',remarks:r.Remarks||''};});
        expenses  = rawExps.filter(function(r){return !r.note;}).map(function(r){return{id:r.ID||uid(),date:r.Date||today(),category:r.Category||'Other',vendor:r.Vendor||'',amount:parseFloat(r.Amount)||0,remarks:r.Remarks||''};});
        purchases = rawPurs.filter(function(r){return !r.note;}).map(function(r){return{id:r.ID||uid(),date:r.Date||today(),supplier:r.Supplier||'',grade:r.Grade||'',weight:parseFloat(r.Weight)||0,rate:parseFloat(r.Rate)||0,amount:parseFloat(r.Amount)||0,remarks:r.Remarks||''};});
        suspense  = rawSusp.filter(function(r){return !r.note;}).map(function(r){return{id:r.ID||uid(),date:r.Date||today(),amount:parseFloat(r.Amount)||0,narration:r.Narration||'',party:r.Party||'',refNo:r.RefNo||'',mode:r.Mode||'',cleared:r.Cleared==='Yes',clearedTo:r.ClearedTo||''};});

        DB.set('bills',bills); DB.set('payments',payments); DB.set('cheques',cheques);
        DB.set('advances',advances); DB.set('expenses',expenses); DB.set('returns',returns_);
        DB.set('purchases',purchases); DB.set('suspense',suspense);
        saveBackupToHistory('Restored from Excel');
        toast('✅ Excel restore done! Bills: '+bills.length+', Payments: '+payments.length);
        refresh();
      }, 1500);
    } catch(ex) { alert('Excel parse error: '+ex.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ── GLOBAL SEARCH ──
(function(){
  var gsInp=document.getElementById('global-search');
  var gsRes=document.getElementById('gs-results');
  if(!gsInp||!gsRes)return;
  var gsTimer=null;
  function closeGs(){gsRes.style.display='none';gsRes.innerHTML='';}
  function mkGsRow(icon,title,sub,badge2,onClick){
    var row=document.createElement('div');
    row.style.cssText='padding:8px 12px;cursor:pointer;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:10px';
    row.addEventListener('mouseenter',function(){this.style.background='#f0fdf4';});
    row.addEventListener('mouseleave',function(){this.style.background='';});
    var ic=document.createElement('span');ic.style.cssText='font-size:16px;flex-shrink:0';ic.textContent=icon;
    var info=document.createElement('div');info.style.cssText='flex:1;min-width:0';
    info.innerHTML='<div style="font-size:12px;font-weight:600;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+title+'</div>'+
      '<div style="font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+sub+'</div>';
    row.appendChild(ic);row.appendChild(info);
    if(badge2){var bd=document.createElement('span');bd.style.cssText='font-size:10px;padding:2px 7px;border-radius:10px;background:'+badge2.bg+';color:'+badge2.c+';font-weight:700;flex-shrink:0';bd.textContent=badge2.t;row.appendChild(bd);}
    row.addEventListener('click',function(){closeGs();gsInp.value='';onClick();});
    return row;
  }
  gsInp.addEventListener('input',function(){
    var q=this.value.trim().toLowerCase();
    clearTimeout(gsTimer);
    if(!q||q.length<2){closeGs();return;}
    gsTimer=setTimeout(function(){
      gsRes.innerHTML='';
      var results=[];
      var q2=q;
      // Search bills
      bills.forEach(function(b){
        var score=0;
        var party=(b.party||'').toLowerCase();
        var billNo=(b.billNo||'').toLowerCase();
        var remarks=(b.remarks||'').toLowerCase();
        var broker=(b.broker||'').toLowerCase();
        var amtStr=fmt(b.netAmt).replace(/,/g,'');
        var balStr=fmt(getBillStatus(b).bal).replace(/,/g,'');
        if(party.includes(q2))score+=3;
        if(billNo.includes(q2))score+=5;
        if(remarks.includes(q2))score+=1;
        if(broker.includes(q2))score+=1;
        // Amount search — match if query is a number and close to amount
        if(/^\d+$/.test(q2.replace(/,/g,''))){
          var qn=parseInt(q2.replace(/,/g,''));
          if(amtStr.startsWith(q2.replace(/,/g,''))||balStr.startsWith(q2.replace(/,/g,'')))score+=3;
          if(Math.abs(b.netAmt-qn)<100||Math.abs(getBillStatus(b).bal-qn)<100)score+=2;
        }
        if(score>0){
          var s=getBillStatus(b);
          results.push({score:score,type:'bill',icon:'📋',
            title:b.party+' — #'+b.billNo,
            sub:fmtDate(b.date)+' | ₹'+fmt(b.netAmt)+' | Bal: ₹'+fmt(s.bal),
            badge:{t:s.status.toUpperCase(),bg:s.status==='paid'?'#dcfce7':s.status==='partial'?'#fef9c3':'#fee2e2',c:s.status==='paid'?'#166534':s.status==='partial'?'#92400e':'#dc2626'},
            fn:function(bid){return function(){pageState.ledgerParty=bills.find(function(x){return x.id===bid;}).party;go('ledger');};}(b.id)
          });
        }
      });
      // Search payments
      payments.forEach(function(p){
        var b=bills.find(function(x){return x.id===p.billId;})||{};
        var q3=q;
        var party=(b.party||'').toLowerCase();
        var rcpt=(p.receiptNo||'').toLowerCase();
        var chqNo=(p.chequeNo||'').toLowerCase();
        if(party.includes(q3)||rcpt.includes(q3)||chqNo.includes(q3)){
          results.push({score:2,type:'payment',icon:'💰',
            title:'Payment: '+(b.party||'-'),
            sub:fmtDate(p.date)+' | ₹'+fmt(p.amount||0)+' | '+p.mode+(p.chequeNo?' | Chq: '+p.chequeNo:'')+(p.receiptNo?' | Rcpt: '+p.receiptNo:''),
            badge:{t:p.mode||'NEFT',bg:'#e0f2fe',c:'#0369a1'},
            fn:function(bid2){return function(){pageState.ledgerParty=(bills.find(function(x){return x.id===bid2;})||{}).party;go('ledger');};}(p.billId)
          });
        }
      });
      // Search parties in ledger
      var partyResults={};
      bills.forEach(function(b){if((b.party||'').toLowerCase().includes(q2)&&!partyResults[b.party]){partyResults[b.party]=true;}});
      Object.keys(partyResults).forEach(function(p2){
        var pb=bills.filter(function(b){return b.party===p2;});
        var due=pb.reduce(function(s,b){return s+getBillStatus(b).bal;},0);
        results.push({score:10,type:'party',icon:'👤',
          title:p2,
          sub:'Bills: '+pb.length+' | Outstanding: ₹'+fmt(due),
          badge:due>0?{t:'DUE',bg:'#fee2e2',c:'#dc2626'}:{t:'CLEAR',bg:'#dcfce7',c:'#166534'},
          fn:function(pty){return function(){pageState.ledgerParty=pty;go('ledger');};}(p2)
        });
      });
      // Sort by score desc
      results.sort(function(a,b){return b.score-a.score;});
      var shown=results.slice(0,12);
      if(!shown.length){
        var noRes=document.createElement('div');noRes.style.cssText='padding:16px;text-align:center;color:#9ca3af;font-size:13px';
        noRes.textContent='No results for "'+gsInp.value+'"';gsRes.appendChild(noRes);
      } else {
        // Group by type
        var types={party:'Parties',bill:'Bills',payment:'Payments'};
        var groups={};
        shown.forEach(function(r){if(!groups[r.type])groups[r.type]=[];groups[r.type].push(r);});
        Object.keys(groups).forEach(function(type){
          var gh=document.createElement('div');gh.style.cssText='padding:5px 12px 3px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;background:#f9fafb';
          gh.textContent=types[type]||type;gsRes.appendChild(gh);
          groups[type].forEach(function(r){gsRes.appendChild(mkGsRow(r.icon,r.title,r.sub,r.badge,r.fn));});
        });
      }
      gsRes.style.display='block';
    },200);
  });
  gsInp.addEventListener('keydown',function(ev){if(ev.key==='Escape'){closeGs();this.value='';}});
  document.addEventListener('click',function(ev){if(!gsInp.contains(ev.target)&&!gsRes.contains(ev.target))closeGs();});
})();

    if(!_autoOn) return;  // toggle OFF hai
    var _lbak=localStorage.getItem('cp_lastBackup');

    setTimeout(function(){
      try{
        var _bd={bills:bills,payments:payments,cheques:cheques,advances:advances,
          expenses:expenses,returns:returns_,settings:cfg,exportDate:new Date().toISOString()};

        _el.download='CashewPro_AutoBackup_'+_td+'.json';

        setTimeout(function(){try{document.body.removeChild(_el);URL.revokeObjectURL(_el.href);}catch(e){}},2000);
        localStorage.setItem('cp_lastBackup',_td);

      }catch(ex){console.warn('Backup err',ex);}
    },4000);
  }catch(ex2){console.warn('Backup init err',ex2);}
}
