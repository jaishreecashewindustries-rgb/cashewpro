  var upCard = document.createElement('div'); upCard.className='card'; upCard.style.marginBottom='12px';
  var upHead = document.createElement('div'); upHead.className='card-head';
  var upTitle = document.createElement('h4'); upTitle.textContent='Bank Statement Upload & Auto-Match';
  upHead.appendChild(upTitle); upCard.appendChild(upHead);
  var upBody = document.createElement('div'); upBody.style.padding='16px';

  var info = document.createElement('div');
  info.style.cssText='background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:10px 14px;font-size:12px;margin-bottom:12px;color:#1e40af';
  info.innerHTML='<strong>How to use:</strong><br>'+
    '1. Bank statement JSON paste karo niche<br>'+
    '2. Format: <code>[{"party":"SHARMA","amount":75000,"date":"2026-03-10","mode":"NEFT","ref":"TXN123"}]</code><br>'+
    '3. Load karo → har credit ke liye party select karo → Apply';
  upBody.appendChild(info);

  var jArea = document.createElement('textarea'); jArea.className='inp';
  jArea.rows=5; jArea.style.cssText='font-family:monospace;font-size:12px;margin-bottom:8px';
  jArea.placeholder='[{"party":"RAMESH JI","amount":75000,"date":"2026-03-10","mode":"NEFT","ref":"TXN123456"},...]';
  upBody.appendChild(jArea);

  var btnRow = document.createElement('div'); btnRow.style.cssText='display:flex;gap:8px;margin-top:4px';
  var loadBtn = el('button',{cls:'btn btn-green',text:'Load Credits'});
  var clearAllBtn = el('button',{cls:'btn btn-red btn-sm',text:'Clear All'});

  loadBtn.addEventListener('click',function(){
    var raw=jArea.value.trim(); if(!raw){toast('Paste JSON first!','err');return;}
    try{
      var match=raw.match(/\[[\s\S]*\]/);
      if(!match)throw new Error('JSON array not found');
      var data=JSON.parse(match[0]);
      if(!Array.isArray(data)||!data.length)throw new Error('Empty array');
      state.credits = data.map(function(c){
        return {party:c.party||'',amount:parseFloat(c.amount)||0,date:c.date||today(),
                mode:c.mode||'NEFT',ref:c.ref||c.narration||'',_matched:false,_billId:null};
      });
      DB.setObj('bankCredits',state.credits);
      toast(data.length+' credits loaded!'); jArea.value='';
      refresh();
    }catch(e){toast('Error: '+e.message,'err');}
  });

  clearAllBtn.addEventListener('click',function(){
    if(!confirm('Clear all credits?'))return;
    state.credits=[];DB.setObj('bankCredits',[]);refresh();
  });

  btnRow.appendChild(loadBtn); btnRow.appendChild(clearAllBtn);
  upBody.appendChild(btnRow); upCard.appendChild(upBody); wrap.appendChild(upCard);

  if (!state.credits.length) return wrap;

  // ── Match Table ──
  var matchCard = document.createElement('div'); matchCard.className='card';
  var mHead = document.createElement('div'); mHead.className='card-head';
  var pending = state.credits.filter(function(c){return !c._matched;}).length;
  var mTitle = document.createElement('h4');
  mTitle.textContent = 'Match Credits ('+state.credits.length+' total, '+pending+' pending)';
  mHead.appendChild(mTitle); matchCard.appendChild(mHead);

  var tblOuter = document.createElement('div'); tblOuter.style.overflow='auto';
  var tbl = document.createElement('table');
  var thead = document.createElement('thead'); var htr = document.createElement('tr');
  ['Date','Amount','Mode','Reference / Party','Suggested Match','Assign Party','Type','Action'].forEach(function(h){
    var th=document.createElement('th');th.textContent=h;htr.appendChild(th);
  });
  thead.appendChild(htr); tbl.appendChild(thead);

  var allParties = Array.from(new Set(bills.map(function(b){return b.party;}))).sort();
  var tbody = document.createElement('tbody');

  state.credits.forEach(function(credit,ci){
    var tr = document.createElement('tr');
    tr.style.background = credit._matched ? '#f0fdf4' : '#fff';

    // Suggest matching bills by amount
    var suggested = bills.filter(function(b){
      var s=getBillStatus(b);
      return !credit._matched && s.status!=='paid' &&
        (Math.abs(s.bal - credit.amount) < 100 ||
         (credit.party && b.party.toLowerCase().includes((credit.party||'').substring(0,4).toLowerCase())));
    }).slice(0,3);

    var dateTd=document.createElement('td');dateTd.textContent=credit.date||'-';
    var amtTd=document.createElement('td');amtTd.className='num';
    amtTd.innerHTML='<strong style="color:#166534">₹'+fmt(credit.amount)+'</strong>';
    var modeTd=document.createElement('td');modeTd.textContent=credit.mode||'-';
    var refTd=document.createElement('td');
    refTd.style.cssText='max-width:140px;font-size:11px;word-break:break-all';
    refTd.textContent=(credit.party||credit.ref||'-').substring(0,30);

    // Suggested chips
    var sugTd=document.createElement('td');sugTd.style.minWidth='140px';
    if(credit._matched){
      var mb=bills.find(function(b){return b.id===credit._billId;})||{};
      sugTd.innerHTML='<span style="color:#166534;font-weight:600">'+mb.party+'</span>';
    } else {
      suggested.forEach(function(b){
        var s=getBillStatus(b);
        var chip=document.createElement('div');
        chip.style.cssText='background:#dbeafe;color:#1d4ed8;padding:2px 7px;border-radius:4px;cursor:pointer;margin-bottom:3px;font-size:11px;display:inline-block';
        chip.textContent=b.party.substring(0,18)+' (₹'+fmt(s.bal)+')';
        chip.addEventListener('click',function(){
          var pSel=document.getElementById('bmp-'+ci);
          if(pSel){for(var i=0;i<pSel.options.length;i++){if(pSel.options[i].value===b.party){pSel.selectedIndex=i;break;}}}
        });
        sugTd.appendChild(chip);
      });
      if(!suggested.length){sugTd.innerHTML='<span style="color:#9ca3af;font-size:11px">No match</span>';}
    }

    // Party selector
    var partyTd=document.createElement('td');
    if(credit._matched){
      var mb2=bills.find(function(b){return b.id===credit._billId;})||{};
      partyTd.innerHTML='<strong style="color:#166534">'+mb2.party+'</strong>';
    } else {
      var pSel=document.createElement('select');pSel.className='inp-sm';pSel.id='bmp-'+ci;pSel.style.width='160px';
      var emOpt=document.createElement('option');emOpt.value='';emOpt.textContent='-- Select Party --';pSel.appendChild(emOpt);
      allParties.forEach(function(p){var o=document.createElement('option');o.value=p;o.textContent=p;pSel.appendChild(o);});
      // Pre-select if party matches
      if(credit.party){for(var i=0;i<pSel.options.length;i++){if(pSel.options[i].value.toLowerCase().includes((credit.party||'').substring(0,6).toLowerCase())){pSel.selectedIndex=i;break;}}}
      partyTd.appendChild(pSel);
    }

    // Type selector
    var typeTd=document.createElement('td');
    if(!credit._matched){
      var tSel=document.createElement('select');tSel.className='inp-sm';tSel.id='bmt-'+ci;tSel.style.width='110px';
      [{v:'payment',l:'Bill Payment'},{v:'advance',l:'Advance'}].forEach(function(o){
        var opt=document.createElement('option');opt.value=o.v;opt.textContent=o.l;tSel.appendChild(opt);
      });
      typeTd.appendChild(tSel);
    } else {
      typeTd.textContent=credit._type||'payment';
    }

    // Action
    var actTd=document.createElement('td');
    if(credit._matched){
      actTd.innerHTML='<span class="badge b-paid">Applied</span>';
    } else {
      var applyBtn=el('button',{cls:'btn btn-xs btn-green',text:'Apply'});
      applyBtn.addEventListener('click',(function(idx_,cred){return function(){
        var pSel2=document.getElementById('bmp-'+idx_);
        var tSel2=document.getElementById('bmt-'+idx_);
        var party=pSel2?pSel2.value:'';
        var type=tSel2?tSel2.value:'payment';
        if(!party){toast('Party select karo pehle!','err');return;}

        if(type==='advance'){
          advances.push({id:uid(),party:party,amount:cred.amount,date:cred.date||today(),
            mode:cred.mode||'NEFT',remarks:'Bank: '+(cred.ref||''),linked:false,createdAt:new Date().toISOString()});
          DB.set('advances',advances);
          cred._matched=true;cred._type='advance';
          toast('Advance saved for '+party);
        } else {
          var matchBill=bills.filter(function(b){
            return b.party===party&&getBillStatus(b).status!=='paid';
          }).sort(function(a,b2){
            return Math.abs(getBillStatus(a).bal-cred.amount)-Math.abs(getBillStatus(b2).bal-cred.amount);
          })[0];
          if(!matchBill){toast('No pending bill for '+party,'err');return;}
          var bs=getBillStatus(matchBill);
          var amt=Math.min(cred.amount,bs.bal);
          payments.push({id:uid(),billId:matchBill.id,amount:amt,rebate:0,
            date:cred.date||today(),mode:cred.mode||'NEFT',chequeNo:'',
            receiptNo:cred.ref||'',remarks:'Bank auto-match'});
          DB.set('payments',payments);
          cred._matched=true;cred._billId=matchBill.id;cred._type='payment';
          toast('₹'+fmt(amt)+' applied to '+matchBill.party);
        }
        DB.setObj('bankCredits',state.credits);
        refresh();
      };})(ci,credit));
      actTd.appendChild(applyBtn);
    }

    [dateTd,amtTd,modeTd,refTd,sugTd,partyTd,typeTd,actTd].forEach(function(td){tr.appendChild(td);});
    tbody.appendChild(tr);
  });

  tbl.appendChild(tbody); tblOuter.appendChild(tbl);
  matchCard.appendChild(tblOuter); wrap.appendChild(matchCard);
  return wrap;
}


function exportPartyReportExcel() {
  var parties=Array.from(new Set(bills.map(function(b){return b.party;}))).sort();
  var data=parties.map(function(p){
    var pb=bills.filter(function(b){return b.party===p;});
    return{Party:p,Bills:pb.length,
      'Total Sales':pb.reduce(function(s,b){return s+b.netAmt;},0),
      'Received':pb.reduce(function(s,b){return s+getBillStatus(b).recv;},0),
      'Outstanding':pb.reduce(function(s,b){return s+getBillStatus(b).bal;},0)};
  }).filter(function(b){
    var fs4=plState.filters||{};
    if(fs4.status&&fs4.status.size>0&&!fs4.status.has(getBillStatus(b).status)) return false;
    if(fs4.grade&&fs4.grade.size>0){
      var bg=(b.rows||[]).map(function(r){return r.grade;});
      if(!bg.some(function(g){return fs4.grade.has(g);})) return false;
    }
    if(state.filters.date_from&&toISO(e.date||'')<toISO(state.filters.date_from)) return false;
    if(state.filters.date_to&&toISO(e.date||'')>toISO(state.filters.date_to)) return false;
    if(state.filters.amount_min!==undefined&&!isNaN(state.filters.amount_min)&&(e.amount||0)<state.filters.amount_min) return false;
    if(state.filters.amount_max!==undefined&&!isNaN(state.filters.amount_max)&&(e.amount||0)>state.filters.amount_max) return false;
    return true;
  }
  .sort(function(a,b){return b.Outstanding-a.Outstanding;});
  var ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=[{wch:24},{wch:8},{wch:14},{wch:14},{wch:14}];
  var wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Party Report');

}

function pgBankUpload() {
  var state = pageState.bankUp = pageState.bankUp || {rows:[]};
  var allParties = Array.from(new Set(bills.map(function(b){return b.party;}))).sort();
  var wrap = document.createElement('div');

  var hdr=document.createElement('div');hdr.style.cssText='margin-bottom:14px';
  hdr.innerHTML='<h3 style="font-size:16px;font-weight:700;color:#166534;margin:0">🏦 Bank Statement Upload</h3>'+
    '<p style="font-size:12px;color:#6b7280;margin:3px 0 0">ICICI/SBI/HDFC — Upload Excel or PDF. Only credit entries will be shown.</p>';
  wrap.appendChild(hdr);

  var upCard=document.createElement('div');upCard.className='card';upCard.style.marginBottom='12px';
  var upH=document.createElement('div');upH.className='card-head';upH.innerHTML='<h4>📂 File Upload</h4>';
  upCard.appendChild(upH);
  var upB=document.createElement('div');upB.style.padding='16px';
  var zone=document.createElement('div');
  zone.style.cssText='border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center;cursor:pointer;background:#fafafa;margin-bottom:10px;transition:all .15s';
  zone.innerHTML='<div style="font-size:26px;margin-bottom:6px">📄</div><div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:3px">Bank Statement drag/drop ya click karo</div><div style="font-size:11px;color:#9ca3af">Excel (.xlsx/.xls) or PDF (ICICI, SBI, HDFC, etc.)</div>';
  zone.addEventListener('mouseover',function(){this.style.borderColor='#166534';this.style.background='#f0fdf4';});
  zone.addEventListener('mouseout',function(){this.style.borderColor='#d1d5db';this.style.background='#fafafa';});
  var fileInp=document.createElement('input');fileInp.type='file';fileInp.accept='.xlsx,.xls,.pdf';fileInp.style.display='none';
  fileInp.addEventListener('change',function(){if(this.files[0])processFile(this.files[0]);});
  zone.addEventListener('click',function(){fileInp.click();});
  zone.addEventListener('dragover',function(e){e.preventDefault();this.style.borderColor='#166534';this.style.background='#f0fdf4';});
  zone.addEventListener('dragleave',function(){this.style.borderColor='#d1d5db';this.style.background='#fafafa';});
  zone.addEventListener('drop',function(e){e.preventDefault();this.style.borderColor='#d1d5db';this.style.background='#fafafa';if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);});
  upB.appendChild(zone);upB.appendChild(fileInp);
  var hint=document.createElement('div');
  hint.style.cssText='background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:8px 12px;font-size:11px;color:#1e40af;line-height:1.8;margin-bottom:10px';
  hint.innerHTML='<strong>✅ Only Credit entries shown</strong> — Uncheck unwanted entries &nbsp;|&nbsp; <strong>Party search</strong> karo, bill auto-suggest hoga &nbsp;|&nbsp; <strong>Mode + Rebate</strong> set karo';
  upB.appendChild(hint);
  var statusDiv=document.createElement('div');statusDiv.id='bu-status';upB.appendChild(statusDiv);
  upCard.appendChild(upB);wrap.appendChild(upCard);

  if(state.rows && state.rows.length) wrap.appendChild(buildTxnTable());

  function processFile(file) {
    var ext=file.name.split('.').pop().toLowerCase();
    statusDiv.innerHTML='<div style="padding:8px 12px;background:#f0fdf4;border-radius:6px;font-size:12px;color:#166534">⏳ Processing <strong>'+file.name+'</strong>...</div>';
    if(ext==='pdf') parsePDF(file); else parseExcel(file);
  }

  // ── ROBUST DATE PARSER ──
  function parseFlexDate(s) {
    if(!s&&s!==0) return null;
    s=String(s).trim().replace(/\u00a0/g,' ').replace(/\s+/g,' ');
    if(!s) return null;
    var mn={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
    var m;
    // DD/Mon/YYYY (ICICI: 19/Jul/2025)
    m=s.match(/^(\d{1,2})[\/\-\s]([a-zA-Z]{3})[\/\-\s](\d{2,4})$/);
    if(m&&mn[m[2].toLowerCase()]){var y=m[3].length===2?'20'+m[3]:m[3];return y+'-'+mn[m[2].toLowerCase()]+'-'+m[1].padStart(2,'0');}
    // DD/MM/YYYY
    m=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
    if(m){var y2=m[3].length===2?'20'+m[3]:m[3];return y2+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');}
    // YYYY-MM-DD
    m=s.match(/^(\d{4})[\/\-](\d{2})[\/\-](\d{2})$/);if(m)return m[1]+'-'+m[2]+'-'+m[3];
    // Excel serial
    var n=parseFloat(s);
    if(!isNaN(n)&&n>40000&&n<50000){var d=new Date(Math.round((n-25569)*86400000));return d.toISOString().split('T')[0];}
    return null;
  }

  // ── ROBUST AMOUNT PARSER — handles Indian format 1,08,560.00 ──
  function parseAmt(v) {
    if(v===null||v===undefined||v==='')return 0;
    if(typeof v==='number')return v<0?0:v;
    // Remove all non-numeric except decimal point and minus
    var s=String(v).replace(/[,\s\u20b9Rs.₹]/gi,'').trim();
    if(!s||s==='-')return 0;
    var n=parseFloat(s);
    return isNaN(n)||n<0?0:n;
  }

  // ── AUTO PARTY + BILL MATCH ──
  function autoMatch(rows) {
    rows.forEach(function(row){
      if(row.type!=='credit')return;
      var narr=(row.narration||'').toUpperCase();
      var best='',bestScore=0;
      allParties.forEach(function(p){
        var words=p.toUpperCase().split(/[\s\/\-]+/);var score=0;
        words.forEach(function(w){if(w.length>=4&&narr.indexOf(w)>=0)score+=w.length;});
        if(score>bestScore){bestScore=score;best=p;}
      });
      if(bestScore>=4)row._party=best;
    });
    rows.forEach(function(row){
      if(row.type!=='credit'||!row._party||row._billId)return;
      var pb=bills.filter(function(b){return b.party===row._party&&getBillStatus(b).status!=='paid';});
      if(!pb.length)return;
      var closest=pb.slice().sort(function(a,b2){return Math.abs(getBillStatus(a).bal-row.amount)-Math.abs(getBillStatus(b2).bal-row.amount);})[0];
      row._billId=closest.id;
    });
  }

  // ── EXCEL PARSER ──
  function parseExcel(file) {
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb2=XLSX.read(e.target.result,{type:'array',cellDates:false,raw:false});
        var ws=wb2.Sheets[wb2.SheetNames[0]];
        var raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
        // Find header row
        var headerRow=0;
        for(var i=0;i<Math.min(15,raw.length);i++){
          var rowStr=(raw[i]||[]).join(' ').toLowerCase();
          if(/date/.test(rowStr)&&/(credit|deposit|withdrawal|debit|amount)/.test(rowStr)){headerRow=i;break;}
        }
        var headers=(raw[headerRow]||[]).map(function(c){return String(c||'').trim().toLowerCase();});
        function fc(pats){
          for(var pi=0;pi<pats.length;pi++){
            for(var hi=0;hi<headers.length;hi++){
              var pat=pats[pi];
              if(pat instanceof RegExp?pat.test(headers[hi]):headers[hi].indexOf(pat)>=0)return hi;
            }
          }return -1;
        }
        var dC=fc(['value date','tran date','transaction date','date','dt']);
        var nC=fc(['transaction remarks','narration','description','particular','remark','cheque no','ref no']);
        var crC=fc([/^deposit/,/\bdeposit/,/^credit/,/\bcredit/,/\(cr\)/,'received']);
        var drC=fc([/^withdrawal/,/\bwithdrawal/,/^debit/,/\bdebit/,/\(dr\)/,'paid out']);
        var balC=fc(['balance']);
        if(crC===-1)crC=fc(['amount','amt']);
        var rows=[];
        for(var ri=headerRow+1;ri<raw.length;ri++){
          var row=raw[ri];
          if(!row||!row.length)continue;
          var allEmpty=row.every(function(c){return !c||String(c).trim()==='';});
          if(allEmpty)continue;
          var dv=dC>=0?String(row[dC]||'').trim():'';
          if(!dv)continue;
          var pd=parseFlexDate(dv);if(!pd)continue;
          var narr=nC>=0?String(row[nC]||'').trim():'';
          var cr=crC>=0?parseAmt(row[crC]):0;
          var dr=drC>=0?parseAmt(row[drC]):0;
          var bal=balC>=0?String(row[balC]||'').replace(/[^\d\.\-,]/g,'').replace(/,/g,''):'';
          if(!cr&&!dr)continue;
          if(cr>0)rows.push({date:pd,narration:narr,amount:cr,type:'credit',balance:bal,mode:'NEFT',rebate:0,_party:'',_billId:'',_include:true,_saved:false});
          if(dr>0)rows.push({date:pd,narration:narr,amount:dr,type:'debit',balance:bal,mode:'',rebate:0,_party:'',_billId:'',_include:false,_saved:false});
        }
        state.rows=rows; autoMatch(rows);
        var creds=rows.filter(function(r){return r.type==='credit';});
        statusDiv.innerHTML='<div style="padding:8px 12px;background:#f0fdf4;border-radius:6px;font-size:12px;color:#166534">✅ <strong>'+rows.length+' rows extracted</strong> ('+creds.length+' credits, '+(rows.length-creds.length)+' debits hidden)</div>';
        refresh();
      }catch(ex){
        statusDiv.innerHTML='<div style="padding:8px 12px;background:#fee2e2;border-radius:6px;font-size:12px;color:#dc2626">❌ Error: '+ex.message+'</div>';
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // ── PDF PARSER — ICICI column-based ──
  function parsePDF(file) {
    statusDiv.innerHTML='<div style="padding:8px 12px;background:#f0fdf4;border-radius:6px;font-size:12px;color:#166534">⏳ Loading PDF library...</div>';
    function doParse() {
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      var reader=new FileReader();
      reader.onload=function(e){
        pdfjsLib.getDocument({data:e.target.result}).promise.then(function(pdf){
          var pagePromises=[];
          for(var pi=1;pi<=pdf.numPages;pi++){
            pagePromises.push(pdf.getPage(pi).then(function(page){
              return page.getTextContent({normalizeWhitespace:false}).then(function(tc){
                return tc.items.map(function(item){
                  return {t:item.str,x:item.transform[4],y:item.transform[5],w:item.width};
                });
              });
            }));
          }
          Promise.all(pagePromises).then(function(pages){
            var rows=parseICICIPDF(pages);
            state.rows=rows; autoMatch(rows);
            var creds=rows.filter(function(r){return r.type==='credit';});
            statusDiv.innerHTML='<div style="padding:8px 12px;background:#f0fdf4;border-radius:6px;font-size:12px;color:#166534">✅ <strong>PDF: '+rows.length+' transactions</strong> ('+creds.length+' credits)</div>';
            refresh();
          });
        }).catch(function(err){
          statusDiv.innerHTML='<div style="padding:8px 12px;background:#fee2e2;border-radius:6px;font-size:12px;color:#dc2626">❌ '+err.message+'</div>';
        });
      };
      reader.readAsArrayBuffer(file);
    }
    if(typeof pdfjsLib!=='undefined'){doParse();return;}
    var sc2=document.createElement('script');sc2.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    sc2.onload=doParse;sc2.onerror=function(){statusDiv.innerHTML='<div style="padding:8px 12px;background:#fee2e2;border-radius:6px;font-size:12px;color:#dc2626">❌ PDF.js load failed</div>';};
    document.head.appendChild(sc2);
  }

  function parseICICIPDF(pages) {
    var mn={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
    var rows=[];

    pages.forEach(function(items){
      // Group items by Y coordinate (round to nearest 2)
      var yMap={};
      items.forEach(function(item){
        if(!item.t.trim())return;
        var yKey=Math.round(item.y/2)*2;
        if(!yMap[yKey])yMap[yKey]=[];
        yMap[yKey].push(item);
      });

      // Sort Y descending (top of page first in PDF coordinate system)
      var ys=Object.keys(yMap).map(Number).sort(function(a,b){return b-a;});

      // Find header row to calibrate column X positions
      var drX=380,crX=450,balX=520,narX=170;
      var headerFound=false;
      ys.forEach(function(y){
        if(headerFound)return;
        var rowItems=yMap[y];
        var rowText=rowItems.map(function(i){return i.t;}).join(' ');
        if(/withdrawal/i.test(rowText)&&/deposit/i.test(rowText)){
          rowItems.forEach(function(item){
            var t=item.t.toLowerCase().trim();
            if(/withdra/i.test(t))drX=item.x;
            if(/deposit/i.test(t)||/\(cr\)/i.test(t))crX=item.x;
            if(/balance/i.test(t))balX=item.x;
            if(/remark|narr|transaction.*r/i.test(t))narX=item.x;
          });
          headerFound=true;
        }
      });

      // Parse transaction rows
      // ICICI format: each transaction starts with a date like "19/Jul/2025" or "01/Aug/2025"
      // Multi-line narrations continue on next rows until next date
      var pendingDate=null,pendingNarr=[],pendingCr=0,pendingDr=0,pendingBal='';
      var afterHeader=false;

      ys.forEach(function(y){
        var rowItems=yMap[y].sort(function(a,b){return a.x-b.x;});
        var rowText=rowItems.map(function(i){return i.t;}).join(' ');

        // Skip header and above
        if(/withdrawal.*deposit|deposit.*withdrawal/i.test(rowText)){afterHeader=true;return;}
        if(!afterHeader)return;
        if(/page\s+\d+\s+of\s+\d+/i.test(rowText)||/end.of.statement/i.test(rowText)||/legends/i.test(rowText))return;
        if(/opening.bal|closing.bal|page.total/i.test(rowText))return;

        // Check if this row starts with a date
        var dateItem=null;
        for(var ri=0;ri<rowItems.length;ri++){
          var t=rowItems[ri].t.trim();
          var dm=t.match(/^(\d{1,2})[\/\-]([A-Za-z]{3})[\/\-](\d{2,4})$/);
          var dm2=t.match(/^(\d{1,2})[\/\-](\d{2})[\/\-](\d{4})$/);
          if(dm||dm2){dateItem=rowItems[ri];break;}
        }

        if(dateItem){
          // Save previous
          if(pendingDate&&(pendingCr>0||pendingDr>0)){
            var pd=parseFlexDate(pendingDate);
            if(pd){
              var narr=pendingNarr.join(' ').replace(/\s+/g,' ').trim();
              if(pendingCr>0)rows.push({date:pd,narration:narr,amount:pendingCr,type:'credit',balance:pendingBal,mode:'NEFT',rebate:0,_party:'',_billId:'',_include:true,_saved:false});
              if(pendingDr>0)rows.push({date:pd,narration:narr,amount:pendingDr,type:'debit',balance:pendingBal,mode:'',rebate:0,_party:'',_billId:'',_include:false,_saved:false});
            }
          }
          pendingDate=dateItem.t;pendingNarr=[];pendingCr=0;pendingDr=0;pendingBal='';

          // Process this row's amounts
          rowItems.forEach(function(item){
            var t=item.t.trim();
            if(!t||t===pendingDate)return;
            // Is this an amount? Remove commas and check
            var clean=t.replace(/,/g,'');
            var n=parseFloat(clean);
            if(!isNaN(n)&&n>0&&/^[\d,]+\.?\d*$/.test(t)){
              var xDiffCr=Math.abs(item.x-crX);
              var xDiffDr=Math.abs(item.x-drX);
              var xDiffBal=Math.abs(item.x-balX);
              var minDiff=Math.min(xDiffCr,xDiffDr,xDiffBal);
              if(xDiffBal===minDiff)pendingBal=t;
              else if(xDiffCr<=xDiffDr)pendingCr=n;
              else pendingDr=n;
            } else if(t.length>1&&!/^\d+$/.test(t)){
              // Don't add sl.no or tran id (short numbers)
              if(!t.match(/^[A-Z]\d{7,}$/)&&!t.match(/^\d{1,3}$/)){ // skip tran IDs and sl nos
                pendingNarr.push(t);
              }
            }
          });
        } else if(pendingDate){
          // Continuation row — may have more narration text or amounts
          rowItems.forEach(function(item){
            var t=item.t.trim();if(!t)return;
            var clean=t.replace(/,/g,'');
            var n=parseFloat(clean);
            if(!isNaN(n)&&n>0&&/^[\d,]+\.?\d*$/.test(t)){
              var xDiffCr=Math.abs(item.x-crX);
              var xDiffDr=Math.abs(item.x-drX);
              var xDiffBal=Math.abs(item.x-balX);
              var minDiff=Math.min(xDiffCr,xDiffDr,xDiffBal);
              if(xDiffBal===minDiff){if(!pendingBal)pendingBal=t;}
              else if(!pendingCr&&!pendingDr){
                if(xDiffCr<=xDiffDr)pendingCr=n;
                else pendingDr=n;
              }
            } else if(t.length>1&&!t.match(/^[A-Z]\d{7,}$/)&&!t.match(/^\d{1,3}$/)
              &&!/page\s*\d/i.test(t)&&t!==pendingDate){
              pendingNarr.push(t);
            }
          });
        }
      });
      // Last pending
      if(pendingDate&&(pendingCr>0||pendingDr>0)){
        var pd2=parseFlexDate(pendingDate);
        if(pd2){
          var narr2=pendingNarr.join(' ').replace(/\s+/g,' ').trim();
          if(pendingCr>0)rows.push({date:pd2,narration:narr2,amount:pendingCr,type:'credit',balance:pendingBal,mode:'NEFT',rebate:0,_party:'',_billId:'',_include:true,_saved:false});
          if(pendingDr>0)rows.push({date:pd2,narration:narr2,amount:pendingDr,type:'debit',balance:pendingBal,mode:'',rebate:0,_party:'',_billId:'',_include:false,_saved:false});
        }
      }
    });
    return rows;
  }
